name: tests

# Unit tests (headless Chrome) run on every push/PR — they have no side effects.
# Integration tests hit the LIVE Supabase backend and create throwaway accounts, so they run
# nightly (schedule) + manual dispatch only — never on push/PR — to keep account churn low.
on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: '0 8 * * *'   # nightly ~08:00 UTC — integration tests only
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests (browser)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'   # push / PR / manual dispatch (the nightly slot is integration-only)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Puppeteer (+ bundled Chromium)
        working-directory: tests
        run: npm install --no-audit --no-fund
      - name: Run unit tests
        working-directory: tests
        run: node run-unit.mjs

      - name: Check recipe_inputs seed is in sync with the client manifest
        run: node scripts/dump-recipes.mjs --check

  typecheck:
    name: Typecheck (checkJs, high-signal only)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    # ADVISORY for now (continue-on-error): the harness reports high-signal type issues in index.html's
    # inline script -- undefined identifiers, wrong-arity calls, use-before-def -- but doesn't gate the
    # build yet. Once the baseline is driven to zero, drop continue-on-error to make it blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install typescript
        run: npm install --no-audit --no-fund
      - name: Run high-signal typecheck
        run: npm run typecheck

  integration:
    name: Integration tests (live backend)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'   # nightly + manual only
    steps:
      - uses: actions/checkout@v4
      - name: Run backend integration tests
        # Point these at a STAGING Supabase project via repo secrets. There is NO production fallback:
        # if the secrets are unset the script SKIPS (exits 0) rather than churn throwaway accounts on
        # the live project. Set both to a dedicated/staging project to actually exercise the backend.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: bash tests/integration.sh
