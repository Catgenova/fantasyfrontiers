      rarityIds:['normal','rare','supreme','fantastic'],
      tierNames: function(){ return FARMING_NAMES; }, matItemPrefix:'farming', skillId:'tailoring',
      slotLabels: TAILORING_GARMENT_LABELS, slots: TAILORING_SLOTS
    }
  };
  var BODY_ARMOR_MATERIAL_IDS = Object.keys(BODY_ARMOR_MATERIALS);
  var ARMORSMITH_MATERIALS = ['chain','plate'];
  var LEATHERWORKING_MATERIALS = ['leather'];
  var TAILORING_MATERIALS = ['tailoring'];
  function getBodyArmorTierData(material, slot, tierIndex){
    var mat = BODY_ARMOR_MATERIALS[material];
    var inputs = {};
    inputs[mat.matItemPrefix+'_t'+tierIndex] = mat.matQty[slot];
    if(tierIndex > 0) inputs['bodyarmor_'+material+'_'+slot+'_t'+(tierIndex-1)+'_normal'] = 1;
    var namePrefix = mat.tierNames()[tierIndex];
    var slotLabel = mat.slotLabels[slot];
    var fullName = mat.label ? (namePrefix+' '+mat.label+' '+slotLabel) : (namePrefix+' '+slotLabel);
    return {
      tierIndex: tierIndex,
      name: fullName,
      levelReq: TIER_LEVELS[tierIndex],
      xp: tierXp(20, tierIndex),
      defense: tierStat(mat.baseDefense[slot], tierIndex),
      inputs: inputs,
      time: tierTime(7,0.3,tierIndex)
    };
  }
  var BODY_ARMOR_ITEMS = {};
  BODY_ARMOR_MATERIAL_IDS.forEach(function(material){
    var mat = BODY_ARMOR_MATERIALS[material];
    mat.slots.forEach(function(slot){
      mat.rarityIds.forEach(function(rarityId){
        var r = getRarity(rarityId);
        for(var i=0;i<TIER_COUNT;i++){
          var data = getBodyArmorTierData(material, slot, i);
          var id = 'bodyarmor_'+material+'_'+slot+'_t'+i+'_'+rarityId;
          BODY_ARMOR_ITEMS[id] = {
            id: id,
            name: r.label + data.name,
            icon: mat.icon,
            sell: tierSell(10, i) * r.mult,
            material: material,
            slot: slot,
            tierIndex: i,
            rarity: rarityId,
            defense: Math.round(data.defense * r.mult)
          };
        }
      });
    });
  });
  Object.assign(ALL_SELLABLE, BODY_ARMOR_ITEMS);
  // Leatherworking-only body armor bonus: each equipped Leather piece (any of the 4
  // Chain/Plate-style slots) adds a flat +5% Bow damage and +1% dodge chance, scaled by
  // that piece's own rarity multiplier. Flat per slot -- does not grow with tier.
  var LEATHER_SLOT_BOW_DMG_BONUS = 0.05;
  var LEATHER_SLOT_DODGE_BONUS = 0.01;
  function getLeatherArmorBonuses(state){
    var bowDmgBonus = 0, dodgeBonus = 0;
    CHAINPLATE_SLOTS.forEach(function(slot){
      var s = state.bodyArmor[slot];
      if(s && s.material==='leather' && s.tier > 0){
        var r = getRarity(s.rarity);
        bowDmgBonus += LEATHER_SLOT_BOW_DMG_BONUS * r.mult;
        dodgeBonus += LEATHER_SLOT_DODGE_BONUS * r.mult;
      }
    });
    return { bowDmgBonus: bowDmgBonus, dodgeBonus: Math.min(0.75, dodgeBonus) };
  }
  // Armorsmithing-only body armor bonus: each equipped Chain piece (any of the 4
  // Chain/Plate-style slots -- Chest, Helmet, Gauntlets, Boots) adds a flat +5% melee
  // damage, scaled by that piece's own rarity multiplier. Flat per slot -- does not
  // grow with tier, exactly like the Leather and Cloth bonuses above.
  var CHAIN_SLOT_MELEE_DMG_BONUS = 0.05;
  function getChainArmorMeleeBonus(state){
    var meleeDmgBonus = 0;
    CHAINPLATE_SLOTS.forEach(function(slot){
      var s = state.bodyArmor[slot];
      if(s && s.material==='chain' && s.tier > 0){
        var r = getRarity(s.rarity);
        meleeDmgBonus += CHAIN_SLOT_MELEE_DMG_BONUS * r.mult;
      }
    });
    return meleeDmgBonus;
  }
  // Armorsmithing-only body armor bonus: each equipped Plate piece in the Helmet,
  // Gauntlets, or Boots slot (Chest deliberately excluded) adds a flat +5% Block chance,
  // scaled by that piece's own rarity multiplier. Flat per slot -- does not grow with
  // tier. A successful Block halves incoming raw damage before armor/shield mitigation.
  var PLATE_SLOT_BLOCK_CHANCE = 0.05;
  var PLATE_BLOCK_SLOTS = ['helmet','gauntlets','boots'];
  function getPlateArmorBlockChance(state){
    var blockChance = 0;
    PLATE_BLOCK_SLOTS.forEach(function(slot){
      var s = state.bodyArmor[slot];
      if(s && s.material==='plate' && s.tier > 0){
        var r = getRarity(s.rarity);
        blockChance += PLATE_SLOT_BLOCK_CHANCE * r.mult;
      }
    });
    return Math.min(0.75, blockChance);
  }
  // Physique-driven combat bonuses -- layered on top of the equipment-driven Leather
  // dodge and Plate block bonuses above, plus two new mechanics of their own.
  var CRIT_DAMAGE_MULT = 1.5;        // base crit damage multiplier
  var MAX_CRIT_DAMAGE_MULT = 2.5;    // hard cap on crit damage
  var BASE_CRIT_CHANCE = 0.05;       // everyone crits at least this often
  var MAX_CRIT_CHANCE = 0.50;        // hard cap on crit chance
  function agilityDodgeBonus(state){ return Math.min(0.10, getLevel(state.physique.agility||0)*0.002); }
  function blockingBlockBonus(state){ return Math.min(0.10, getLevel(state.physique.blocking||0)*0.002); }
  function criticalEyeCritChance(state){ return Math.min(MAX_CRIT_CHANCE, BASE_CRIT_CHANCE + getLevel(state.physique.criticalEye||0)*0.0045); }
  function exploitationGoldBonus(state){ return Math.min(0.30, getLevel(state.physique.exploitation||0)*0.005); }
  var CLOTH_SLOT_SPELL_BONUS = 0.05;
  function getClothArmorSpellBonus(state){
    var spellBonus = 0;
    TAILORING_SLOTS.forEach(function(slot){
      var s = state.bodyArmor[slot];
      if(s && s.material==='tailoring' && s.tier > 0){
        var r = getRarity(s.rarity);
        spellBonus += CLOTH_SLOT_SPELL_BONUS * r.mult;
      }
    });
    return spellBonus;
  }
  // Blends every equipped body-armor piece's material type-mix, weighted by that piece's
  // own defense contribution -- a player in full Plate is mostly-blunt armor overall, one
  // mixing Chain gauntlets with a Leather chest gets a real blend of the two.
  function getPlayerArmorTypeMix(state){
    var weighted = {slashing:0, piercing:0, blunt:0};
    var totalDef = 0;
    BODY_ARMOR_SLOTS.forEach(function(slot){
      var s = state.bodyArmor && state.bodyArmor[slot];
      if(s && s.tier > 0 && s.material){
        var item = BODY_ARMOR_ITEMS['bodyarmor_'+s.material+'_'+slot+'_t'+(s.tier-1)+'_'+s.rarity];
        var mat = BODY_ARMOR_MATERIALS[s.material];
        if(item && mat && mat.armorTypes && item.defense > 0){
          DAMAGE_TYPES.forEach(function(t){ weighted[t] += (mat.armorTypes[t]||0) * item.defense; });
          totalDef += item.defense;
        }
      }
    });
    if(totalDef <= 0) return {slashing:1/3, piercing:1/3, blunt:1/3};
    DAMAGE_TYPES.forEach(function(t){ weighted[t] /= totalDef; });
    return weighted;
  }
  function getBodyArmorDefenseTotal(state){
    var sum = 0;
    BODY_ARMOR_SLOTS.forEach(function(slot){
      var s = state.bodyArmor && state.bodyArmor[slot];
      if(s && s.tier > 0){
        var item = BODY_ARMOR_ITEMS['bodyarmor_'+s.material+'_'+slot+'_t'+(s.tier-1)+'_'+s.rarity];
        if(item){
          var profId = MATERIAL_TO_PROFICIENCY[s.material];
          var profBonus = profId ? armorProficiencyBonus(state, profId) : 0;
          sum += item.defense * (1 + profBonus);
        }
      }
    });
    return sum + getEquippedBeltDefense(state);
  }
  function craftBodyArmor(material, slot, tierIndex){
    var mat = BODY_ARMOR_MATERIALS[material];
    if(!mat || mat.slots.indexOf(slot)===-1) return;
    var data = getBodyArmorTierData(material, slot, tierIndex);
    if(getLevel(state.xp[mat.skillId]) < data.levelReq) return;
    if(!hasInputs(data.inputs)){ addLog('Not enough materials to forge ' + data.name + '.', 'danger'); return; }
    placeNewCraftActivity(mat.skillId, null, 'bodyarmor', { type:'craft', craftKind:'bodyarmor', material:material, slot:slot, tierIndex:tierIndex, progress:0 });
  }

  // ---- Belts: also leather (Leatherworking), but rarity does something completely
  // different from every other equipment type. Instead of scaling stats harder, a
  // higher-rarity Belt unlocks additional simultaneous Crafting slots, as long as every
  // active slot shares the same category (e.g. two different ingots, or two different
  // armors -- never an ingot alongside an armor).
  var BELT_RARITY_SLOTS = { normal:1, rare:2, supreme:3, fantastic:4 };
  function getBeltTierData(tierIndex){
    var inputs = {};
    inputs['butchering_t'+tierIndex] = 2;
    if(tierIndex > 0) inputs['belt_t'+(tierIndex-1)+'_normal'] = 1;
    return {
      tierIndex: tierIndex,
      name: WILDLIFE_NAMES[tierIndex] + ' Belt',
      levelReq: TIER_LEVELS[tierIndex],
      xp: tierXp(20, tierIndex),
      defense: tierStat(1, tierIndex),
      inputs: inputs,
      time: tierTime(7,0.3,tierIndex)
    };
  }
  var BELT_ITEMS = {};
  ['normal','rare','supreme','fantastic'].forEach(function(rarityId){
    var r = getRarity(rarityId);
    for(var i=0;i<TIER_COUNT;i++){
      var data = getBeltTierData(i);
      var id = 'belt_t'+i+'_'+rarityId;
      BELT_ITEMS[id] = {
        id:id, name: r.label + data.name, icon:svgIcon('belt',BUTCHERING_COLORS[i]), sell: tierSell(8,i)*r.mult,
        tierIndex:i, rarity:rarityId, defense: Math.round(data.defense*r.mult)
      };
    }
  });
  Object.assign(ALL_SELLABLE, BELT_ITEMS);
  function getEquippedBeltDefense(state){
    if(!state.equippedBeltTier || state.equippedBeltTier<=0) return 0;
    var item = BELT_ITEMS['belt_t'+(state.equippedBeltTier-1)+'_'+state.equippedBeltRarity];
    return item ? item.defense : 0;
  }
  // Logic (a physique) grants +1 concurrent craft slot for every 10 levels, base +0.
  function logicSlotBonus(state){ return Math.floor(getLevel(state.physique.logic||0) / 10); }
  function getMaxCraftSlots(state){
    var beltSlots = (!state.equippedBeltTier || state.equippedBeltTier<=0) ? 1 : (BELT_RARITY_SLOTS[state.equippedBeltRarity] || 1);
    return beltSlots + logicSlotBonus(state);
  }
  // Craft slots beyond the primary live in state.extraCraftSlots. Belt rarity used to cap
  // that at 3 extra, so the array was a fixed length 3; Logic can push the total higher, so
  // we grow (never shrink) the array on demand to hold however many the player has unlocked.
  function ensureCraftSlotCapacity(){
    var need = Math.max(3, getMaxCraftSlots(state) - 1);
    while(state.extraCraftSlots.length < need) state.extraCraftSlots.push({type:null});
  }
  function craftBelt(tierIndex){
    var data = getBeltTierData(tierIndex);
    if(getLevel(state.xp.leatherworking) < data.levelReq) return;
    if(!hasInputs(data.inputs)){ addLog('Not enough materials to forge ' + data.name + '.', 'danger'); return; }
    placeNewCraftActivity('leatherworking', null, 'belt', { type:'craft', craftKind:'belt', tierIndex:tierIndex, progress:0 });
  }
  function equipBelt(itemId){
    var item = BELT_ITEMS[itemId];
    if(!item || (state.inventory[itemId]||0) <= 0) return;
    if(state.equippedBeltTier > 0){
      var oldId = 'belt_t'+(state.equippedBeltTier-1)+'_'+state.equippedBeltRarity;
      addItem(oldId, 1);
    }
    state.inventory[itemId] -= 1;
    state.equippedBeltTier = item.tierIndex+1;
    state.equippedBeltRarity = item.rarity;
    armorPanelExpanded = true;
    addLog('You equipped the ' + item.name + '.', 'important');
  }
  function unequipBelt(){
    if(!state.equippedBeltTier || state.equippedBeltTier <= 0) return;
    var oldId = 'belt_t'+(state.equippedBeltTier-1)+'_'+state.equippedBeltRarity;
    addItem(oldId, 1);
    state.equippedBeltTier = 0;
    state.equippedBeltRarity = 'normal';
  }

  // ---- Rings & Amulets (Jewelrycrafting): Twine (from Hide) + a matching Gem (same
  // ladder Mining already uses) make jewelry. Rings are named for damage types --
  // starting with Blunt/Slash/Pierce, more to come later -- and boost that type's
  // damage. Amulets instead add flat armor. Same Equipment treatment as everything
  // else: stackable, forge any unlocked tier, full rarity range, sacrificeable (rings
  // and amulets restore more Faith than typical gear when sacrificed).
  var RING_TYPES = [
    {id:'blunt',  name:'Ring of Blunt',  icon:svgIcon('ring','#8a8a8a'), damageType:'blunt'},
    {id:'slash',  name:'Ring of Slash',  icon:svgIcon('ring','#c9a227'), damageType:'slashing'},
    {id:'pierce', name:'Ring of Pierce', icon:svgIcon('ring','#8a97a6'), damageType:'piercing'}
  ];
  var RING_TYPE_MAP = {};
  RING_TYPES.forEach(function(rt){ RING_TYPE_MAP[rt.id] = rt; });
  function getRingTierData(typeId, tierIndex){
    var rt = RING_TYPE_MAP[typeId];
    var inputs = {};
    inputs['twine_t'+tierIndex] = 3;
    inputs[getGemForTier(tierIndex)] = 1;
    return {
      tierIndex: tierIndex,
      name: TIER_NAMES[tierIndex] + ' ' + rt.name,
      levelReq: TIER_LEVELS[tierIndex],
      xp: tierXp(20, tierIndex),
      dmgBonus: tierCappedBonus(0.02, 0.007, 0.16, tierIndex),
      inputs: inputs,
      time: tierTime(7,0.3,tierIndex)
    };
  }
  var RING_ITEMS = {};
  RING_TYPES.forEach(function(rt){
    ['normal','rare','supreme','fantastic'].forEach(function(rarityId){
      var r = getRarity(rarityId);
      for(var i=0;i<TIER_COUNT;i++){
        var data = getRingTierData(rt.id, i);
        var id = 'ring_'+rt.id+'_t'+i+'_'+rarityId;
        RING_ITEMS[id] = {
          id: id, name: r.label + data.name, icon: rt.icon, sell: tierSell(15,i)*r.mult,
          typeId: rt.id, damageType: rt.damageType, tierIndex: i, rarity: rarityId,
          dmgBonus: data.dmgBonus * r.mult
        };
      }
    });
  });
  function getAmuletTierData(tierIndex){
    var inputs = {};
    inputs['twine_t'+tierIndex] = 3;
    inputs[getGemForTier(tierIndex)] = 1;
    return {
      tierIndex: tierIndex,
      name: TIER_NAMES[tierIndex] + ' Amulet',
      levelReq: TIER_LEVELS[tierIndex],
      xp: tierXp(20, tierIndex),
      defense: tierStat(2, tierIndex),
      inputs: inputs,
      time: tierTime(7,0.3,tierIndex)
    };
  }
  var AMULET_ITEMS = {};
  ['normal','rare','supreme','fantastic'].forEach(function(rarityId){
    var r = getRarity(rarityId);
    for(var i=0;i<TIER_COUNT;i++){
      var data = getAmuletTierData(i);
      var id = 'amulet_t'+i+'_'+rarityId;
      AMULET_ITEMS[id] = {
        id: id, name: r.label + data.name, icon:svgIcon('amulet','#c9a227'), sell: tierSell(15,i)*r.mult,
        tierIndex: i, rarity: rarityId, defense: Math.round(data.defense*r.mult)
      };
    }
  });
  Object.assign(ALL_SELLABLE, RING_ITEMS, AMULET_ITEMS);
  function craftRing(typeId, tierIndex){
    if(!RING_TYPE_MAP[typeId]) return;
    var data = getRingTierData(typeId, tierIndex);
    if(getLevel(state.xp.jewelrycrafting) < data.levelReq) return;
    if(!hasInputs(data.inputs)){ addLog('Not enough materials to craft ' + data.name + '.', 'danger'); return; }
    placeNewCraftActivity('jewelrycrafting', null, 'ring', { type:'craft', craftKind:'ring', typeId:typeId, tierIndex:tierIndex, progress:0 });
  }
  function craftAmulet(tierIndex){
    var data = getAmuletTierData(tierIndex);
    if(getLevel(state.xp.jewelrycrafting) < data.levelReq) return;
    if(!hasInputs(data.inputs)){ addLog('Not enough materials to craft ' + data.name + '.', 'danger'); return; }
    placeNewCraftActivity('jewelrycrafting', null, 'amulet', { type:'craft', craftKind:'amulet', tierIndex:tierIndex, progress:0 });
  }
  var RING_SLOT_IDS = ['ring1','ring2','ring3','ring4','ring5'];
  function findEmptyRingSlot(){
    for(var i=0;i<RING_SLOT_IDS.length;i++){
      if(!state.jewelrySlots[RING_SLOT_IDS[i]].typeId) return RING_SLOT_IDS[i];
    }
    return null;
  }
  // slotId is optional: pass one of ring1-ring5 to target it specifically (used by the
  // Jewelrycrafting tab's per-slot controls), or omit it to auto-fill the first empty
  // slot (used by the inventory panel's single Equip button). Up to 5 rings total.
  function equipRing(itemId, slotId){
    var item = RING_ITEMS[itemId];
    if(!item || (state.inventory[itemId]||0) <= 0) return;
    if(!slotId){
      slotId = findEmptyRingSlot();
      if(!slotId){ addLog('All 5 Ring slots are full. Unequip one first.', 'danger'); return; }
    }
    if(RING_SLOT_IDS.indexOf(slotId)===-1) return;
    var cur = state.jewelrySlots[slotId];
    if(cur.typeId){
      addItem('ring_'+cur.typeId+'_t'+(cur.tier-1)+'_'+cur.rarity, 1);
    }
    state.inventory[itemId] -= 1;
    state.jewelrySlots[slotId] = { typeId: item.typeId, tier: item.tierIndex+1, rarity: item.rarity };
    armorPanelExpanded = true;
    addLog('You equipped the ' + item.name + '.', 'important');
  }
  function unequipRing(slotId){
    if(RING_SLOT_IDS.indexOf(slotId)===-1) return;
    var cur = state.jewelrySlots[slotId];
    if(!cur || !cur.typeId) return;
    addItem('ring_'+cur.typeId+'_t'+(cur.tier-1)+'_'+cur.rarity, 1);
    state.jewelrySlots[slotId] = { typeId:null, tier:0, rarity:'normal' };
  }
  function equipAmulet(itemId){
    var item = AMULET_ITEMS[itemId];
    if(!item || (state.inventory[itemId]||0) <= 0) return;
    var cur = state.jewelrySlots.amulet;
    if(cur.tier > 0){
      addItem('amulet_t'+(cur.tier-1)+'_'+cur.rarity, 1);
    }
    state.inventory[itemId] -= 1;
    state.jewelrySlots.amulet = { tier: item.tierIndex+1, rarity: item.rarity };
    armorPanelExpanded = true;
    addLog('You equipped the ' + item.name + '.', 'important');
  }
  function unequipAmulet(){
    var cur = state.jewelrySlots.amulet;
    if(!cur || cur.tier <= 0) return;
    addItem('amulet_t'+(cur.tier-1)+'_'+cur.rarity, 1);
    state.jewelrySlots.amulet = { tier:0, rarity:'normal' };
  }
  function getRingItemInSlot(state, slotId){
    var s = state.jewelrySlots && state.jewelrySlots[slotId];
    if(!s || !s.typeId || s.tier<=0) return null;
    return RING_ITEMS['ring_'+s.typeId+'_t'+(s.tier-1)+'_'+s.rarity] || null;
  }
  function getEquippedAmuletItem(state){
    var s = state.jewelrySlots && state.jewelrySlots.amulet;
    if(!s || s.tier<=0) return null;
    return AMULET_ITEMS['amulet_t'+(s.tier-1)+'_'+s.rarity] || null;
  }
  // Sums every equipped ring's contribution (up to 5 at once) for the type(s) that
  // actually matter to this weapon -- scaled per-ring by how much of the weapon's own
  // mix is that type, consistent with the damage triangle.
  function getRingDamageMultiplier(state, weaponAttackTypes){
    var totalBonus = 0;
    RING_SLOT_IDS.forEach(function(slotId){
      var ring = getRingItemInSlot(state, slotId);
      if(ring) totalBonus += ring.dmgBonus * (weaponAttackTypes[ring.damageType]||0);
    });
    return 1 + totalBonus;
  }
  function getAmuletDefenseBonus(state){
    var amulet = getEquippedAmuletItem(state);
    return amulet ? amulet.defense : 0;
  }

  // Crafting "categories": what counts as the same kind of task for the Belt's extra
  // slots. Metallurgy's bars all share "ingots"; body armor, belts, and accessory armor
  // all share "armor". Every other crafting skill defaults to its own name as its category.
  function getCraftCategory(skillId, itemId, craftKind){
    if(craftKind==='bodyarmor' || craftKind==='belt' || craftKind==='armorslot') return 'armor';
    if(itemId && itemId.indexOf('bodyarmor_')===0) return 'armor';
    if(itemId && itemId.indexOf('belt_t')===0) return 'armor';
    if(skillId==='metallurgy') return 'ingots';
    return skillId;
  }
  function getActiveCraftCategory(state){
    if(state.activity.type==='craft') return getCraftCategory(state.activity.skill, state.activity.itemId, state.activity.craftKind);
    for(var i=0;i<state.extraCraftSlots.length;i++){
      var s = state.extraCraftSlots[i];
      if(s.type==='craft') return getCraftCategory(s.skill, s.itemId, s.craftKind);
    }
    return null;
  }
  function findActiveCraftSlotFor(skill, itemId){
    if(state.activity.type==='craft' && state.activity.skill===skill && state.activity.itemId===itemId) return {primary:true, act:state.activity};
    for(var i=0;i<state.extraCraftSlots.length;i++){
      var s = state.extraCraftSlots[i];
      if(s.type==='craft' && s.skill===skill && s.itemId===itemId) return {primary:false, index:i, act:s};
    }
    return null;
  }
  // Same idea as findActiveCraftSlotFor, but for the six "special" instant-turned-timed
  // craft kinds (tool, stackweapon, bodyarmor, belt, offhand, armorslot), which are
  // identified by their own param shape rather than a fixed recipe id.
  function matchesSpecialCraft(act, craftKind, params){
    if(!act || act.type!=='craft' || act.craftKind!==craftKind) return false;
    if(craftKind==='tool') return act.skillId===params.skillId && act.tierIndex===params.tierIndex;
    if(craftKind==='stackweapon') return act.typeId===params.typeId && act.tierIndex===params.tierIndex;
    if(craftKind==='stackshield') return act.typeId===params.typeId && act.tierIndex===params.tierIndex;
    if(craftKind==='bodyarmor') return act.material===params.material && act.slot===params.slot && act.tierIndex===params.tierIndex;
    if(craftKind==='belt') return act.tierIndex===params.tierIndex;
    if(craftKind==='offhand') return act.typeId===params.typeId;
    if(craftKind==='armorslot') return act.slotId===params.slotId;
    if(craftKind==='ring') return act.typeId===params.typeId && act.tierIndex===params.tierIndex;
    if(craftKind==='amulet') return act.tierIndex===params.tierIndex;
    return false;
  }
  function findActiveSpecialCraftSlotFor(craftKind, params){
    if(matchesSpecialCraft(state.activity, craftKind, params)) return {primary:true, act:state.activity};
    for(var i=0;i<state.extraCraftSlots.length;i++){
      if(matchesSpecialCraft(state.extraCraftSlots[i], craftKind, params)) return {primary:false, index:i, act:state.extraCraftSlots[i]};
    }
    return null;
  }
  function findFreeCraftSlot(skill, itemId, craftKind){
    ensureCraftSlotCapacity();
    // Primary slot first.
    if(state.activity.type===null) return {primary:true};
    var category = getCraftCategory(skill, itemId, craftKind);
    var activeCategory = getActiveCraftCategory(state);
    if(activeCategory !== null && activeCategory !== category) return null;
    var maxSlots = getMaxCraftSlots(state);
    for(var i=0;i<state.extraCraftSlots.length && i<maxSlots-1;i++){
      if(state.extraCraftSlots[i].type===null) return {primary:false, index:i};
    }
    return null;
  }
  function craftSlotAvailable(skill, itemId){ return !!findFreeCraftSlot(skill, itemId); }
  // Places a newly-started craft into a free Belt-granted slot if one legitimately
  // fits (preserving parallel same-category crafting); otherwise it always wins,
  // stopping whatever the primary slot was doing and taking it over.
  function placeNewCraftActivity(skill, itemId, craftKind, newAct){
    var slot = findFreeCraftSlot(skill, itemId, craftKind);
    if(slot && !slot.primary){
      state.extraCraftSlots[slot.index] = newAct;
    } else {
      state.activity = newAct;
    }
  }
  function getSpecialSkillId(act){
    if(act.craftKind==='tool') return 'blacksmithing';
    if(act.craftKind==='stackweapon') return STACKABLE_WEAPON_TYPE_MAP[act.typeId].skillId;
    if(act.craftKind==='stackshield') return STACKABLE_SHIELD_TYPE_MAP[act.typeId].skillId;
    if(act.craftKind==='bodyarmor') return BODY_ARMOR_MATERIALS[act.material].skillId;
    if(act.craftKind==='belt') return 'leatherworking';
    if(act.craftKind==='offhand') return 'shieldsmithing';
    if(act.craftKind==='armorslot') return 'armorsmithing';
    if(act.craftKind==='ring') return 'jewelrycrafting';
    if(act.craftKind==='amulet') return 'jewelrycrafting';
    return null;
  }
  function getSpecialTierData(act){
    if(act.craftKind==='tool'){
      var tt = findToolType(act.skillId);
      if(!tt) return null;
      return tt.isGather ? getGatherToolTierData(act.skillId, act.tierIndex+1) : getCraftToolTierData(act.skillId, act.tierIndex+1);
    }
    if(act.craftKind==='stackweapon') return getStackableWeaponTierData(act.typeId, act.tierIndex);
    if(act.craftKind==='stackshield') return getStackableShieldTierData(act.typeId, act.tierIndex);
    if(act.craftKind==='bodyarmor') return getBodyArmorTierData(act.material, act.slot, act.tierIndex);
    if(act.craftKind==='belt') return getBeltTierData(act.tierIndex);
    if(act.craftKind==='offhand'){
      var oTier = state.offhandTiers[act.typeId]||0;
      if(oTier >= TIER_COUNT) return null;
      return OFFHAND_TYPE_RECIPES[act.typeId][oTier];
    }
    if(act.craftKind==='armorslot'){
      var aSlot = ARMOR_SLOTS.filter(function(s){ return s.id===act.slotId; })[0];
      var aTier = state.armorSlots[act.slotId]||0;
      if(!aSlot || aTier >= TIER_COUNT) return null;
      return getSlotTierData(aSlot, aTier+1);
    }
    if(act.craftKind==='ring') return getRingTierData(act.typeId, act.tierIndex);
    if(act.craftKind==='amulet') return getAmuletTierData(act.tierIndex);
    return null;
  }
  function completeSpecialCraft(act, tierData){
    var skillId = getSpecialSkillId(act);
    var successRate = (act.craftKind==='ring' || act.craftKind==='amulet') ? jewelrySuccessRate(state) : craftSuccessRate(state, skillId);
    if(Math.random() < successRate){
      addXp(skillId, tierData.xp*1.5);
      addPhysiqueXp(CRAFT_PHYSIQUE[skillId]);
      var rarity = rollCraftRarity(state);
      if(act.craftKind==='tool'){
        addItem('tool_'+act.skillId+'_t'+act.tierIndex+'_'+rarity, 1);
      } else if(act.craftKind==='stackweapon'){
        addItem('stweapon_'+act.typeId+'_t'+act.tierIndex+'_'+rarity, 1);
      } else if(act.craftKind==='stackshield'){
        addItem('stshield_'+act.typeId+'_t'+act.tierIndex+'_'+rarity, 1);
      } else if(act.craftKind==='bodyarmor'){
        var mat = BODY_ARMOR_MATERIALS[act.material];
        if(mat.rarityIds.indexOf(rarity)===-1) rarity = mat.rarityIds[mat.rarityIds.length-1];
        addItem('bodyarmor_'+act.material+'_'+act.slot+'_t'+act.tierIndex+'_'+rarity, 1);
      } else if(act.craftKind==='belt'){
        addItem('belt_t'+act.tierIndex+'_'+rarity, 1);
      } else if(act.craftKind==='offhand'){
        var oTier2 = state.offhandTiers[act.typeId]||0;
        state.offhandTiers[act.typeId] = oTier2+1;
        state.offhandRarities[act.typeId] = rarity;
      } else if(act.craftKind==='armorslot'){
        var aTier2 = state.armorSlots[act.slotId]||0;
        state.armorSlots[act.slotId] = aTier2+1;
        state.armorRarities[act.slotId] = rarity;
        armorPanelExpanded = true;
      } else if(act.craftKind==='ring'){
        addItem('ring_'+act.typeId+'_t'+act.tierIndex+'_'+rarity, 1);
      } else if(act.craftKind==='amulet'){
        addItem('amulet_t'+act.tierIndex+'_'+rarity, 1);
      }
      logForgeResult(rarity, tierData.name);
    } else {
      logForgeFailure(tierData.name);
    }
  }
  function processCraftActivity(act, dt){
    if(act.type !== 'craft') return;
    if(act.craftKind){
      var tierData = getSpecialTierData(act);
      if(!tierData){ act.type = null; needsRender = true; return; }
      var specialSkillId = getSpecialSkillId(act);
      act.progress += dt;
      var effTimeSpecial = tierData.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, specialSkillId);
      while(act.type==='craft' && act.progress >= effTimeSpecial){
        act.progress -= effTimeSpecial;
        if(!hasInputs(tierData.inputs)){
          addLog('Ran out of materials for ' + tierData.name + '.', 'danger');
          act.type = null;
          needsRender = true;
          break;
        }
        consumeInputs(tierData.inputs);
        completeSpecialCraft(act, tierData);
        maybeSummonFamiliar(specialSkillId);
        tierData = getSpecialTierData(act);
        if(!tierData){ act.type = null; needsRender = true; break; }
        effTimeSpecial = tierData.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, specialSkillId);
      }
      return;
    }
    var recipe = ALL_CRAFT_RECIPES[act.itemId];
    act.progress += dt;
    var effTimeC = recipe.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, act.skill);
    while(act.type==='craft' && act.progress >= effTimeC){
      act.progress -= effTimeC;
      var actualInputs = recipe.shaftCraft ? makeShaftInputs(act.logTierIndex) : recipe.inputs;
      if(!hasInputs(actualInputs)){
        addLog('Ran out of materials for ' + recipe.name + '.', 'danger');
        act.type = null;
        needsRender = true;
      } else {
        consumeInputs(actualInputs);
        bumpStat('crafted');
        if(recipe.shaftCraft){
          var shaftsCreated = shaftOutputFor(act.logTierIndex);
          if(Math.random() < shaftSuccessRate(state)){
            addXp('fletching', shaftsCreated*2*1.5);
            addItem('shaft', shaftsCreated);
            addPhysiqueXp(CRAFT_PHYSIQUE.fletching);
            spawnFloatingText('+' + shaftsCreated + ' Shafts', 'ft-success');
          } else {
            spawnFloatingText('Shaft craft failed', 'ft-fail');
          }
        } else if(recipe.meatId && recipe.hideId){
          addXp(act.skill, recipe.xp*1.5);
          addPhysiqueXp(CRAFT_PHYSIQUE[act.skill]);
          var gotMeat = Math.random() < butcherOutputChance(state, recipe.meatPhysique);
          var gotHide = Math.random() < butcherOutputChance(state, recipe.hidePhysique);
          if(gotMeat) addItem(recipe.meatId, 1);
          if(gotHide) addItem(recipe.hideId, 1);
          if(gotMeat && gotHide){ addLog('You butchered the carcass and recovered both Meat and Hide.', 'important'); spawnFloatingText('+1 Meat, +1 Hide', 'ft-success'); }
          else if(gotMeat){ addLog('You butchered the carcass and recovered Meat.', ''); spawnFloatingText('+1 Meat', 'ft-success'); }
          else if(gotHide){ addLog('You butchered the carcass and recovered Hide.', ''); spawnFloatingText('+1 Hide', 'ft-success'); }
          else { spawnFloatingText('Nothing usable', 'ft-fail'); }
        } else if(recipe.relicCraft){
          addXp('archaeology', recipe.xp*1.5);
          addPhysiqueXp(CRAFT_PHYSIQUE.archaeology);
          if(Math.random() < archaeologySuccessRate(state)){
            var rarityId = rollRelicRarity(state);
            var relicId = 'relic_t'+recipe.tierIndex+'_'+rarityId;
            addItem(relicId, 1);
            addLog('You recovered a ' + RELIC_ITEMS[relicId].name + '!', 'important');
            spawnFloatingText('+1 ' + RELIC_ITEMS[relicId].name + '!', rarityId==='normal' ? 'ft-success' : 'ft-rare');
            maybeShowRarityPopup(rarityId, RELIC_ITEMS[relicId].name, RELIC_ITEMS[relicId].icon);
          } else {
            var brokenId = 'brokenrelic_t'+recipe.tierIndex;
            addItem(brokenId, 1);
            spawnFloatingText('Relic crumbled', 'ft-fail');
          }
        } else if(Math.random() < craftSuccessRate(state, act.skill)){
          addXp(act.skill, recipe.xp*1.5);
          addItem(act.itemId, recipe.outputQty || 1);
          addPhysiqueXp(CRAFT_PHYSIQUE[act.skill]);
          spawnFloatingText('+' + (recipe.outputQty||1) + ' ' + recipe.name, 'ft-success');
        } else {
          spawnFloatingText('Craft failed', 'ft-fail');
        }
        maybeSummonFamiliar(recipe.shaftCraft ? 'fletching' : recipe.relicCraft ? 'archaeology' : act.skill);
        var recheckInputs = recipe.shaftCraft ? makeShaftInputs(act.logTierIndex) : recipe.inputs;
        if(!hasInputs(recheckInputs)){
          addLog('Ran out of materials for ' + recipe.name + '.', 'danger');
          act.type = null;
          needsRender = true;
        } else {
          effTimeC = recipe.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, act.skill);
        }
      }
    }
  }
  function equipBodyArmor(itemId){
    var item = BODY_ARMOR_ITEMS[itemId];
    if(!item || (state.inventory[itemId]||0) <= 0) return;
    var profId = MATERIAL_TO_PROFICIENCY[item.material];
    if(!meetsProficiencyRequirement(profId ? state.xp[profId] : 0, item.tierIndex)){
      addLog('Your ' + (ARMOR_PROFICIENCY_LABELS[profId]||item.material) + ' proficiency isn\'t high enough to equip ' + item.name + ' yet.', 'danger');
      return;
    }
    var slotState = state.bodyArmor[item.slot];
    if(slotState.tier > 0){
      var oldId = 'bodyarmor_'+slotState.material+'_'+item.slot+'_t'+(slotState.tier-1)+'_'+slotState.rarity;
      addItem(oldId, 1);
    }
    state.inventory[itemId] -= 1;
    slotState.tier = item.tierIndex+1;
    slotState.rarity = item.rarity;
    slotState.material = item.material;
    armorPanelExpanded = true;
    addLog('You equipped the ' + item.name + '.', 'important');
  }
  function unequipBodyArmor(slot){
    var slotState = state.bodyArmor && state.bodyArmor[slot];
    if(!slotState || slotState.tier<=0) return;
    var oldId = 'bodyarmor_'+slotState.material+'_'+slot+'_t'+(slotState.tier-1)+'_'+slotState.rarity;
    addItem(oldId, 1);
    slotState.tier = 0; slotState.rarity = 'normal'; slotState.material = null;
  }

  // ---- Unified Tools: every Gathering and Crafting tool is now one Equipment category.
  // Forging produces a stackable inventory item (type, tier, rarity); a separate equip
  // step decides which owned stack is actually active for that skill. Sorted alphabetically.
  var TOOL_TYPES = [];
  GATHER_SKILL_IDS.forEach(function(id){ TOOL_TYPES.push({skillId:id, name:GATHER_TOOL_NAMES[id], icon:GATHERING_SKILLS[id].icon, isGather:true}); });
  CRAFT_SKILL_IDS.forEach(function(id){ TOOL_TYPES.push({skillId:id, name:CRAFT_TOOL_NAMES[id], icon:CRAFTING_SKILLS[id].icon, isGather:false}); });
  TOOL_TYPES.sort(function(a,b){ return a.name.localeCompare(b.name); });
  var TOOL_RARITY_IDS = ['normal','rare','supreme','fantastic'];
  var TOOL_ITEMS = {};
  TOOL_TYPES.forEach(function(tt){
    TOOL_RARITY_IDS.forEach(function(rarityId){
      var r = getRarity(rarityId);
      for(var i=0;i<TIER_COUNT;i++){
        var id = 'tool_'+tt.skillId+'_t'+i+'_'+rarityId;
        TOOL_ITEMS[id] = {
          id: id,
          name: r.label + METAL_TIER_NAMES[i] + ' ' + tt.name,
          icon: tt.icon,
          sell: tierSell(8, i) * r.mult,
          skillId: tt.skillId,
          tierIndex: i,
          rarity: rarityId,
          isGather: tt.isGather
        };
      }
    });
  });
  Object.assign(ALL_SELLABLE, TOOL_ITEMS);

  // ---- Relics: the first equipment type that lives in inventory until equipped ----
  // A relic's bonus is a straight percentage added to both damage dealt and armor,
  // scaling 2% per tier (Normal), multiplied by its rarity roll. Uses the same shared
  // RARITY_TIERS multipliers (1x/2x/4x/8x) as every other equipment type.
  var RELIC_RARITY_IDS = ['normal','rare','supreme','fantastic'];
  var RELIC_ITEMS = {};
  RELIC_RARITY_IDS.forEach(function(rarityId){
    var r = getRarity(rarityId);
    for(var i=0;i<TIER_COUNT;i++){
      var id = 'relic_t'+i+'_'+rarityId;
      RELIC_ITEMS[id] = {
        id: id,
        name: r.label + DIGGING_NAMES[i] + ' Relic',
        icon: svgIcon('trophy',DIGGING_COLORS[i]),
        sell: tierSell(15, i) * r.mult,
        tierIndex: i,
        rarity: rarityId
      };
    }
  });
  Object.assign(ALL_SELLABLE, RELIC_ITEMS);
  function getRelicBonusPct(tierIndex, rarityId){
    var base = (tierIndex+1) * 0.02;
    var mult = getRarity(rarityId).mult;
    return base * mult;
  }
  function getEquippedRelicBonus(state){
    if(!state.equippedRelicTier || state.equippedRelicTier<=0) return 0;
    return getRelicBonusPct(state.equippedRelicTier-1, state.equippedRelicRarity);
  }
  // Relics share the exact same baseline + Faith-bonus model as general crafting above.
  function relicRarityChances(state){
    return {
      rare: FAITH_BASE_RARE + faithRarityBonus('devotion'),
      supreme: FAITH_BASE_SUPREME + faithRarityBonus('blessing'),
      fantastic: FAITH_BASE_FANTASTIC + faithRarityBonus('miracle')
    };
  }
  function rollRelicRarity(state){
    var c = relicRarityChances(state);
    if(Math.random() < c.fantastic) return 'fantastic';
    if(Math.random() < c.supreme) return 'supreme';
    if(Math.random() < c.rare) return 'rare';
    return 'normal';
  }
  // Archaeology's own success formula: base 10%, +10% max each from Focus and Critical
  // Thinking, plus its own tool's success bonus (same 0.30 cap as every other crafting tool).
  var ARCHAEOLOGY_BASE_SUCCESS = 0.10;
  var ARCHAEOLOGY_PHYSIQUE_1 = 'focus';
  var ARCHAEOLOGY_PHYSIQUE_2 = 'criticalThinking';
  var ARCHAEOLOGY_PHYSIQUE_CAP = 0.10;
  function archaeologySuccessRate(state){
    var toolBonus = craftToolSuccessBonus(state, 'archaeology');
    var lvl1 = getLevel(state.physique[ARCHAEOLOGY_PHYSIQUE_1]||0);
    var lvl2 = getLevel(state.physique[ARCHAEOLOGY_PHYSIQUE_2]||0);
    var physBonus1 = Math.min(ARCHAEOLOGY_PHYSIQUE_CAP, lvl1*0.001);
    var physBonus2 = Math.min(ARCHAEOLOGY_PHYSIQUE_CAP, lvl2*0.001);
    return Math.min(1, ARCHAEOLOGY_BASE_SUCCESS + physBonus1 + physBonus2 + toolBonus);
  }
  function equipRelic(itemId){
    if((state.inventory[itemId]||0) <= 0) return;
    var m = /^relic_t(\d+)_(\w+)$/.exec(itemId);
    if(!m) return;
    var tierIndex = parseInt(m[1],10);
    var rarityId = m[2];
    if(state.equippedRelicTier > 0){
      var oldId = 'relic_t'+(state.equippedRelicTier-1)+'_'+state.equippedRelicRarity;
      addItem(oldId, 1);
    }
    state.inventory[itemId] -= 1;
    state.equippedRelicTier = tierIndex+1;
    state.equippedRelicRarity = rarityId;
    addLog('You equipped the ' + RELIC_ITEMS[itemId].name + '.', 'important');
  }
  function unequipRelic(){
    if(state.equippedRelicTier <= 0) return;
    var oldId = 'relic_t'+(state.equippedRelicTier-1)+'_'+state.equippedRelicRarity;
    addItem(oldId, 1);
    state.equippedRelicTier = 0;
    state.equippedRelicRarity = 'normal';
  }

  function physiqueAvgLevel(state){
    var sum = 0;
    PHYSIQUE_SKILLS.forEach(function(p){ sum += getLevel(state.physique[p.id]||0); });
    return sum / PHYSIQUE_SKILLS.length;
  }
  function speedMultiplier(state){
    return 1 - Math.min(0.20, physiqueAvgLevel(state)*0.003);
  }
  function combatBonus(state){
    return 1 + Math.min(0.25, physiqueAvgLevel(state)*0.003);
  }

  // ===== Physique OUTPUTS (remapped). Each function turns one physique's level into a
  // concrete bonus; they are wired into combat, crafting, gathering and faith below. =====
  // Combat damage
  function bodyStrengthMeleeMult(state){ return 1 + Math.min(0.30, getLevel(state.physique.bodyStrength||0)*0.003); }   // melee damage
  function bodyControlBowMult(state){   return 1 + Math.min(0.30, getLevel(state.physique.bodyControl||0)*0.003); }    // bow damage
  function balanceTwoHandMult(state){   return 1 + Math.min(0.20, getLevel(state.physique.balance||0)*0.003); }        // two-handed damage
  function tenacityLowHpMult(state){                                                                                    // <25% HP: more dmg & less dmg taken
    if(state.playerHp > maxHp(state)*0.25) return 1;
    return 1 + Math.min(0.50, getLevel(state.physique.tenacity||0)*0.005);
  }
  function exploitationCritDamageBonus(state){ return Math.min(MAX_CRIT_DAMAGE_MULT - CRIT_DAMAGE_MULT, getLevel(state.physique.exploitation||0)*0.008); } // + crit damage
  // Combat defense
  function reflexesDodgeBonus(state){ return Math.min(0.08, getLevel(state.physique.reflexes||0)*0.0015); }
  function reflexesBlockBonus(state){ return Math.min(0.08, getLevel(state.physique.reflexes||0)*0.0015); }
  function agilityLeatherMult(state){ return Math.min(0.30, getLevel(state.physique.agility||0)*0.003); }               // light-armor proficiency
  function shieldProfMult(state){ return Math.min(0.30, (getLevel(state.physique.fortitude||0)+getLevel(state.physique.blocking||0))*0.0015); } // shield proficiency (fortitude+blocking)
  function resolveArmorMult(state){ return Math.min(0.25, getLevel(state.physique.resolve||0)*0.003); }                 // armor proficiencies
  // Crafting
  function grossMotorCraftSuccessBonus(state){ return Math.min(0.15, getLevel(state.physique.grossMotor||0)*0.003); }   // all crafts
  function criticalThinkingCraftSuccessBonus(state){ return Math.min(0.15, getLevel(state.physique.criticalThinking||0)*0.003); } // alchemy/mixology/archaeology
  function handStrengthCraftSpeedBonus(state){ return Math.min(0.15, getLevel(state.physique.handStrength||0)*0.003); } // hand crafts
  function coreStrengthCraftSpeedBonus(state){ return Math.min(0.15, getLevel(state.physique.coreStrength||0)*0.003); } // estate crafts
  function solvingCraftSpeedBonus(state){ return Math.min(0.15, getLevel(state.physique.solving||0)*0.003); }           // mental crafts
  // Gathering
  function enduranceGatherSpeedBonus(state){ return Math.min(0.15, getLevel(state.physique.endurance||0)*0.003); }      // long gathers faster
  function fineMotorGatherChanceBonus(state){ return Math.min(0.05, getLevel(state.physique.fineMotor||0)*0.0005); }    // delicate hand finds
  function mentalitySeedChanceBonus(state){ return Math.min(0.05, getLevel(state.physique.mentality||0)*0.0005); }      // seed finds
  function seedDropChance(state){ return BASE_SEED_DROP_CHANCE + mentalitySeedChanceBonus(state); }
  // Faith
  function faithPhysiqueBonus(state){ return Math.min(60, getLevel(state.physique.focus||0)+getLevel(state.physique.zen||0)+getLevel(state.physique.meditation||0)); } // max Faith

  // ================= ESTATE =================
  // A 10x10 tile plot (x,y each 0-9), each tile carrying its own height on a 20-layer
  // z-axis (0-19) for terraforming. This first pass just generates and renders the grid
  // in an isometric 2.5D view -- raising/lowering terrain, foundations, and buildings
  // (which will eventually grant skill buffs) come in later passes.
  //
  // The underlying grid is a fixed 20x20 so it never needs resizing at runtime, but only
  // a centered 10x10 "core" is owned at the start -- everything else exists (with real
  // terrain already generated) but sits outside ownership until purchased via Expand.
  // This keeps every existing rendering/hit-testing loop working unchanged; they just
  // learn to skip tiles/edges that aren't owned yet.
  var ESTATE_GRID_SIZE = 20;
  var ESTATE_CORE_SIZE = 10;
  var ESTATE_CORE_OFFSET = 5; // core spans indices 5..14 inclusive within the 20x20 grid
  var ESTATE_MAX_HEIGHT = 20;
  var ESTATE_BASE_HEIGHT = 8;
  var ESTATE_EXPANSION_BASE_COST = 1000;
  var ESTATE_EXPANSION_MULT = 1.25;
  function estateIsCoreTile(x, y){
    return x>=ESTATE_CORE_OFFSET && x<ESTATE_CORE_OFFSET+ESTATE_CORE_SIZE &&
           y>=ESTATE_CORE_OFFSET && y<ESTATE_CORE_OFFSET+ESTATE_CORE_SIZE;
  }
  // ---- Tile obstacles ----
  // Every generated tile carries a natural obstacle that must be cleared (via the matching
  // Gathering skill) before the tile can be raised, lowered, or paved. Obstacle type is a
  // weighted pick (berries/herbs common, rocks/trees middling, ore rare); its resource tier
  // is drawn from the skill's lower tiers (below t8). Rocks and Ore both come from Mining --
  // Rocks are its stone tiers, Ore its metal tiers.
  var ESTATE_OBSTACLE_TYPES = {
    berries: { skill:'foraging',  label:'Berries', emoji:'\uD83E\uDED0', weight:3, tiers:[0,1,2,3,4,5,6,7] },
    herbs:   { skill:'herbalism', label:'Herbs',   emoji:'\uD83C\uDF3F', weight:3, tiers:[0,1,2,3,4,5,6,7] },
    trees:   { skill:'forestry',  label:'Trees',   emoji:'\uD83C\uDF32', weight:2, tiers:[0,1,2,3,4,5,6,7] },
    rocks:   { skill:'mining',    label:'Rocks',   emoji:'\uD83E\uDEA8', weight:2, tiers:MINING_STONE_INDICES.filter(function(i){ return i<8; }) },
    ore:     { skill:'mining',    label:'Ore',     emoji:'\u26CF\uFE0F', weight:1, tiers:MINING_ORE_INDICES.filter(function(i){ return i<8; }) }
  };
  var ESTATE_OBSTACLE_TYPE_KEYS = Object.keys(ESTATE_OBSTACLE_TYPES);
  function generateEstateObstacle(){
    var totalW = 0;
    ESTATE_OBSTACLE_TYPE_KEYS.forEach(function(k){ totalW += ESTATE_OBSTACLE_TYPES[k].weight; });
    var r = Math.random()*totalW, type = ESTATE_OBSTACLE_TYPE_KEYS[0];
    for(var i=0;i<ESTATE_OBSTACLE_TYPE_KEYS.length;i++){
      r -= ESTATE_OBSTACLE_TYPES[ESTATE_OBSTACLE_TYPE_KEYS[i]].weight;
      if(r <= 0){ type = ESTATE_OBSTACLE_TYPE_KEYS[i]; break; }
    }
    var tiers = ESTATE_OBSTACLE_TYPES[type].tiers;
    return { type:type, tierIndex: tiers[Math.floor(Math.random()*tiers.length)] };

  function generateEstateGrid(){
    var grid = [];
    for(var x=0; x<ESTATE_GRID_SIZE; x++){
      var col = [];
      for(var y=0; y<ESTATE_GRID_SIZE; y++){
        // Gentle rolling terrain using layered sine waves, computed relative to the core's
        // own origin so the initially-visible 10x10 looks identical to before this change.
        var rx = x - ESTATE_CORE_OFFSET, ry = y - ESTATE_CORE_OFFSET;
        var wave = Math.sin(rx*0.55)*1.4 + Math.cos(ry*0.5)*1.4 + Math.sin((rx+ry)*0.35)*1.1;
        var height = Math.round(ESTATE_BASE_HEIGHT + wave);
        height = Math.max(0, Math.min(ESTATE_MAX_HEIGHT-1, height));
        col.push({ height:height, buildingId:null, type:'dirt', paveTileId:null, owned:estateIsCoreTile(x,y), obstacle: generateEstateObstacle() });
      }
      grid.push(col);
    }
    return grid;
  }
  // Every tile has 4 borders, each shared with exactly one neighbor (or the outer edge
  // of the plot). Stored once per shared border rather than once per tile-side, in two
  // grids: edgesY holds the borders that run along a row boundary (GRID_SIZE columns x
  // GRID_SIZE+1 row-gaps), edgesX holds the borders along a column boundary (GRID_SIZE+1
  // column-gaps x GRID_SIZE rows). This is where fences, walls, and doors will eventually
  // attach -- for now this just makes every border its own selectable thing.
  function generateEstateEdges(){
    var edgesY = [], edgesX = [];
    for(var x=0; x<ESTATE_GRID_SIZE; x++){
      var colY = [];
      for(var y=0; y<=ESTATE_GRID_SIZE; y++) colY.push({ type:null, masonryTileId:null });
      edgesY.push(colY);
    }
    for(var x2=0; x2<=ESTATE_GRID_SIZE; x2++){
      var colX = [];
      for(var y2=0; y2<ESTATE_GRID_SIZE; y2++) colX.push({ type:null, masonryTileId:null });
      edgesX.push(colX);
    }
    return { edgesY:edgesY, edgesX:edgesX };

  // Expansion order: a clockwise perimeter walk of each successive ring around the core,
  // starting from that ring's top-left corner, so the estate grows outward one tile at a
  // time in a clean, predictable spiral rather than randomly or in a whole new row/column
  // all at once.
  function estateRingPerimeter(ringN){
    var lo = ESTATE_CORE_OFFSET - ringN;
    var hi = ESTATE_CORE_OFFSET + ESTATE_CORE_SIZE - 1 + ringN;
    var tiles = [];
    var x, y;
    for(x=lo; x<=hi; x++) tiles.push({x:x, y:lo});           // top: left -> right
    for(y=lo+1; y<=hi; y++) tiles.push({x:hi, y:y});          // right: top+1 -> bottom
    for(x=hi-1; x>=lo; x--) tiles.push({x:x, y:hi});          // bottom: right-1 -> left
    for(y=hi-1; y>=lo+1; y--) tiles.push({x:lo, y:y});        // left: bottom-1 -> top+1
    return tiles;
  }
  function computeEstateExpansionOrder(){
    var order = [];
    var maxRing = (ESTATE_GRID_SIZE - ESTATE_CORE_SIZE) / 2;

      var rarity = rollCraftRarity(state);
      state.weaponRarities[typeId] = rarity;
      if(!state.equippedMainhand) equipMainhand(typeId);
      logForgeResult(rarity, next.name);
    } else {
      logForgeFailure(next.name);
    }
  }
  function craftOffhandType(typeId){
    var style = getOffhandStyle(typeId);
    if(!style) return;
    if(style.stackable) return; // shields use craftStackableShield instead
    var tier = state.offhandTiers[typeId]||0;
    if(tier >= TIER_COUNT) return;
    var next = OFFHAND_TYPE_RECIPES[typeId][tier];
    if(getLevel(state.xp.shieldsmithing) < next.levelReq) return;
    if(!hasInputs(next.inputs)){ addLog('Not enough materials to forge ' + next.name + '.', 'danger'); return; }
    placeNewCraftActivity('shieldsmithing', null, 'offhand', { type:'craft', craftKind:'offhand', typeId:typeId, progress:0 });
  }
  function startCombat(monsterId){
    var m = MONSTERS.filter(function(x){return x.id===monsterId;})[0];
    if(!m) return;
    if(combatLevelEquivalent(state) < m.levelReq) return;
    if(m.category==='dungeon' && m.stageIndex > getDungeonProgress(m.dungeonId)+1) return;
    state.activity = { type:'combat', monsterId:monsterId, monsterHp:m.hp, tickAccum:0, monsterTickAccum:0 };
  }

  function grantEquipmentDrop(tierIndex){
    var pool = [];
    WEAPON_STYLE_IDS.forEach(function(id){ pool.push({cat:'weapon', id:id}); });
    OFFHAND_STYLES.forEach(function(o){ if(!o.stackable) pool.push({cat:'offhand', id:o.id}); }); // shields are stackable now; only non-stackable types (Quiver) have OFFHAND_TYPE_RECIPES entries
    ARMOR_SLOT_IDS.forEach(function(id){ pool.push({cat:'armor', id:id}); });
    var pick = pool[randInt(0, pool.length-1)];
    var targetTier = tierIndex+1;
    var name = null;
    if(pick.cat==='weapon'){
      var wType = STACKABLE_WEAPON_TYPE_MAP[pick.id];
      var wTierIndex = Math.min(targetTier-1, wType.tierCount-1);
      var wItemId = 'stweapon_'+pick.id+'_t'+wTierIndex+'_normal';
      addItem(wItemId, 1);
      name = STACKABLE_WEAPON_ITEMS[wItemId].name;
    } else if(pick.cat==='offhand'){
      if((state.offhandTiers[pick.id]||0) < targetTier){
        state.offhandTiers[pick.id] = targetTier;
        state.offhandRarities[pick.id] = 'normal';
        name = OFFHAND_TYPE_RECIPES[pick.id][targetTier-1].name;
      }
    } else {
      var slot = ARMOR_SLOTS.filter(function(s){ return s.id===pick.id; })[0];
      if((state.armorSlots[pick.id]||0) < targetTier){
        state.armorSlots[pick.id] = targetTier;
        state.armorRarities[pick.id] = 'normal';
        name = getSlotTierData(slot, targetTier).name;
      }
    }
    if(name){
      addLog('The fallen foe\'s gear can be salvaged! You obtained a ' + name + '.', 'important');
    } else {
      var bonusGold = randInt(5,15) * (tierIndex+1);
      state.gold += bonusGold;
      addLog('You salvaged ' + bonusGold + ' gold from the fallen foe.', '');
    }
    needsRender = true;
  }
  // Mirrors applyMonsterCategoryLoot's own odds, so the UI can never drift out of sync
  // with the actual drop logic.
  function getMonsterLootChance(monster){
    if(monster.category==='wildlife') return 100;
    if(monster.category==='elemental') return 100;
    if(monster.category==='demonspawn') return 8;
    if(monster.category==='kinsworn') return 10;
    return 0;
  }
  function getMonsterLootLabel(monster){
    if(monster.category==='wildlife') return 'Corpse';
    if(monster.category==='elemental') return 'Material';
    if(monster.category==='demonspawn') return 'Broken Relic';
    if(monster.category==='kinsworn') return 'Equipment';
    return 'Loot';
  }
  function applyMonsterCategoryLoot(monster){
    var i = monster.tierIndex;
    if(monster.category==='wildlife'){
      addItem('corpse_t'+i, 1);
      addLog('The ' + monster.name + ' left behind a ' + CORPSE_ITEM_MAP['corpse_t'+i].name + '.', '');
    } else if(monster.category==='elemental'){
      var skillId = ELEMENTAL_DROP_SKILLS[randInt(0, ELEMENTAL_DROP_SKILLS.length-1)];
      var qty = randInt(1,3);
      var itemId = skillId+'_t'+i;
      addItem(itemId, qty);
      var itemName = (ALL_GATHER_ITEMS[itemId]||{}).name || itemId;
      addLog('The ' + monster.name + ' dissipated, leaving ' + qty + 'x ' + itemName + '.', '');
    } else if(monster.category==='demonspawn'){
      if(Math.random() < 0.08){
        addItem('brokenrelic_t'+i, 1);
        addLog('The ' + monster.name + ' dropped a ' + BROKEN_RELIC_MAP['brokenrelic_t'+i].name + '!', 'important');
      }
    } else if(monster.category==='kinsworn'){
      if(Math.random() < 0.10) grantEquipmentDrop(i);
    }
  }

  function playerAttackTick(){
    var act = state.activity;
    var monster = MONSTERS.filter(function(x){return x.id===act.monsterId;})[0];
    if(!monster) return;
    var weapon = getEquippedWeaponItem(state);
    var relicBonus = getEquippedRelicBonus(state);
    var offhandItem = getEquippedOffhandItem(state);

    var weaponStyle = getWeaponStyle(state.equippedMainhand);
    var offhandStyle = getOffhandStyle(state.equippedOffhand);
    var offhandProficiency = (offhandStyle && state.equippedOffhand) ? (1 + Math.min(0.15, getLevel(state.xp[offhandStyle.id])*0.005)) : 1;
    var weaponProficiency = state.equippedMainhand ? (1 + getLevel(state.xp[state.equippedMainhand])/100) : 1;
    var advantage = weightedAdvantage(weaponStyle.attackTypes || {blunt:1}, monster.armorTypes || {blunt:1/3, slashing:1/3, piercing:1/3});
    var quiverBonus = (offhandStyle && offhandStyle.type==='quiver' && offhandItem) ? (1 + offhandItem.dmgBonus) * offhandProficiency : 1;
    var ringBonus = getRingDamageMultiplier(state, weaponStyle.attackTypes || {blunt:1});
    var leatherBowBonus = weaponStyle.hand==='bow' ? (1 + getLeatherArmorBonuses(state).bowDmgBonus) : 1;
    var chainMeleeBonus = weaponStyle.hand!=='bow' ? (1 + getChainArmorMeleeBonus(state)) : 1;
    var isCrit = Math.random() < criticalEyeCritChance(state);
    var physDmgMult = (weaponStyle.hand==='bow') ? bodyControlBowMult(state) : (bodyStrengthMeleeMult(state) * (weaponStyle.hand==='2h' ? balanceTwoHandMult(state) : 1));
    physDmgMult *= tenacityLowHpMult(state);
    var critMult = isCrit ? Math.min(MAX_CRIT_DAMAGE_MULT, CRIT_DAMAGE_MULT + exploitationCritDamageBonus(state)) : 1;

    var dmgToMonster = Math.round(randInt(weapon.dmgMin, weapon.dmgMax) * physDmgMult * advantage * weaponProficiency * quiverBonus * ringBonus * leatherBowBonus * chainMeleeBonus * (1 + relicBonus) * getFamiliarDamageMult() * critMult);
    act.monsterHp -= dmgToMonster;
    if(isCrit) spawnFloatingText('Critical Hit!', 'ft-rare');
    var atkFeed = [['agility',2]];
    if(weaponStyle.hand==='1h') atkFeed.push(['reflexes',2]);
    else if(weaponStyle.hand==='2h') atkFeed.push(['balance',2]);
    if(isCrit){ atkFeed.push(['criticalEye',2]); atkFeed.push(['exploitation',2]); }
    if(state.playerHp < maxHp(state)*0.25) atkFeed.push(['tenacity',2]);
    addPhysiqueXp(atkFeed);
    if(state.equippedMainhand) addXp(state.equippedMainhand, Math.round(monster.xp * 0.6));
    if(act.monsterHp <= 0){
      bumpStat('kills');
      var goldWon = randInt(monster.goldMin, monster.goldMax);
      state.gold += goldWon;
      addPhysiqueXp([['resolve',3]]);
      addLog('Defeated the ' + monster.name + '! +' + goldWon + ' gold.', 'important');
      applyMonsterCategoryLoot(monster);
      if(monster.category==='dungeon') handleDungeonVictory(monster);
      act.monsterHp = monster.hp;
      act.monsterTickAccum = 0;
    }
  }

  function monsterAttackTick(){
    var act = state.activity;
    var monster = MONSTERS.filter(function(x){return x.id===act.monsterId;})[0];
    if(!monster) return;
    var lb = getLeatherArmorBonuses(state);
    var dodgeChance = lb.dodgeBonus * (1 + agilityLeatherMult(state)) + agilityDodgeBonus(state) + reflexesDodgeBonus(state);
    if(dodgeChance > 0 && Math.random() < dodgeChance){
      addLog('You dodged the ' + monster.name + '\'s attack!', 'important');
      spawnFloatingText('Dodged!', 'ft-success');
      return;
    }
    var relicBonus = getEquippedRelicBonus(state);
    var armorDefense = getTotalArmorDefense(state) * (1 + relicBonus) * getFamiliarArmorMult() * (1 + resolveArmorMult(state));
    var offhandItem = getEquippedOffhandItem(state);
    var offhandStyle = getOffhandStyle(state.equippedOffhand);
    var offhandProficiency = (offhandStyle && state.equippedOffhand) ? (1 + Math.min(0.15, getLevel(state.xp[offhandStyle.id])*0.005)) : 1;

    var playerArmorMix = getPlayerArmorTypeMix(state);
    var monsterAdvantage = weightedAdvantage(monster.attackTypes || {blunt:1/3, slashing:1/3, piercing:1/3}, playerArmorMix);
    var rawDmg = Math.round(randInt(monster.atkMin, monster.atkMax) * monsterAdvantage * (1 - getFamiliarEnemyWeakenPct()));
    var blockChance = getPlateArmorBlockChance(state) + blockingBlockBonus(state) + reflexesBlockBonus(state);
    var blocked = blockChance > 0 && Math.random() < blockChance;
    if(blocked){
      rawDmg = Math.round(rawDmg * 0.5);
      addLog('You blocked the ' + monster.name + '\'s attack, halving the damage!', 'important');
      spawnFloatingText('Blocked!', 'ft-success');
    }
    var shieldCounter = weightedShieldCounter(offhandStyle, monster.attackTypes || {blunt:1/3, slashing:1/3, piercing:1/3});
    var effectiveShieldDefense = (offhandStyle && offhandStyle.type==='shield' && offhandItem) ? offhandItem.defense * shieldCounter * offhandProficiency * (1 + shieldProfMult(state)) : 0;
    var dmgToPlayer = Math.max(1, Math.round((rawDmg - armorDefense - effectiveShieldDefense) / tenacityLowHpMult(state)));
    state.playerHp -= dmgToPlayer;
    var hitFeed = [['fortitude', dmgToPlayer]];
    if(blocked || (armorDefense + effectiveShieldDefense) > 0) hitFeed.push(['blocking', blocked?2:1]);
    addPhysiqueXp(hitFeed);
    if(state.equippedOffhand) addXp(state.equippedOffhand, Math.round(monster.xp * 0.3));
    var wornMaterials = {};
    BODY_ARMOR_SLOTS.forEach(function(slot){
      var s = state.bodyArmor[slot];
      if(s && s.material) wornMaterials[s.material] = true;
    });
    Object.keys(wornMaterials).forEach(function(material){
      var profId = MATERIAL_TO_PROFICIENCY[material];
      if(profId) addXp(profId, Math.round(monster.xp * 0.3));
    });
    if(state.playerHp <= 0){
      bumpStat('deaths');
      state.playerHp = 0;
      state.activity = { type:null };
      addLog('You were defeated by the ' + monster.name + ' and retreat to recover.', 'danger');
      needsRender = true;
    }
  }

  function eatFood(){
    var candidates = Object.keys(ALL_SELLABLE)
      .map(function(id){ return ALL_SELLABLE[id]; })
      .filter(function(item){ return typeof item.heal === 'number'; })
      .sort(function(a,b){ return b.heal - a.heal; });
    var best = candidates.filter(function(c){ return (state.inventory[c.id]||0) > 0; })[0];
    if(!best) return;
    state.inventory[best.id] -= 1;
    var healed = Math.min(best.heal, maxHp(state) - state.playerHp);
    state.playerHp += healed;
    addLog('You ate ' + best.name + ' and recovered ' + healed + ' HP.');
  }

  // ---- Auto-Eat: during combat only, once HP drops to/below a chosen threshold,
  // automatically eats Roasted Food (fish/meat) or Cooked Meals -- highest heal value
  // first, falling back to lower tiers as stock runs out. Potions, Baked Goods, and raw
  // Meat are deliberately excluded; those stay manual-only via the Eat Food button.
  var AUTO_EAT_THRESHOLDS = [0.2, 0.4, 0.6];
  function getAutoEatFoodTypes(){
    return Object.keys(ALL_SELLABLE)
      .map(function(id){ return ALL_SELLABLE[id]; })
      .filter(function(item){ return item.autoEatFood===true; })
      .sort(function(a,b){ return b.heal - a.heal; });
  }
  function getNextAutoEatFood(){
    var types = getAutoEatFoodTypes();
    return types.filter(function(c){ return (state.inventory[c.id]||0) > 0; })[0] || null;
  }
  function getTotalAutoEatFoodQty(){
    return getAutoEatFoodTypes().reduce(function(sum, c){ return sum + (state.inventory[c.id]||0); }, 0);
  }
  function setAutoEatThreshold(value){
    state.autoEatThreshold = value;
    needsRender = true;
  }
  function autoEatCheck(){
    if(state.activity.type !== 'combat') return;
    if(!state.autoEatThreshold || state.autoEatThreshold <= 0) return;
    if(state.playerHp <= 0) return;
    var hpPct = state.playerHp / maxHp(state);
    if(hpPct > state.autoEatThreshold) { state._autoEatWarned = false; state._autoEatLogged = false; return; }
    var next = getNextAutoEatFood();
    if(!next){
      if(!state._autoEatWarned){
        state._autoEatWarned = true;
        addLog('Auto-Eat triggered but you have no Roasted Food or Cooked Meals left.', 'danger');
        needsRender = true;
      }
      return;
    }
    if(!state._autoEatLogged){
      state._autoEatLogged = true;
      addLog('Auto-Eat: HP dropped to ' + Math.round(hpPct*100) + '%, eating Roasted Food / Cooked Meals to recover.', 'important');
    }
    state.inventory[next.id] -= 1;
    var healed = Math.min(next.heal, maxHp(state) - state.playerHp);
    state.playerHp += healed;
    spawnFloatingText('Auto-Eat +' + healed + ' HP', 'ft-success');
  }

  // ---- Teas (Mixology): manually-drunk consumables that temporarily boost all skill
  // XP gain. Unlike food, they don't stack -- drinking a new tea replaces the current
  // buff outright, resetting both its strength and remaining time.
  function drinkTea(itemId){
    var recipe = ALL_CRAFT_RECIPES[itemId];
    if(!recipe || !recipe.teaDurationMs) return;
    if((state.inventory[itemId]||0) <= 0) return;
    state.inventory[itemId] -= 1;
    state.activeTea = {
      itemId: itemId,
      name: recipe.name,
      icon: recipe.icon,
      xpBoost: recipe.xpBoost,
      durationMs: recipe.teaDurationMs,
      expiresAt: Date.now() + recipe.teaDurationMs
    };
    addLog('You drink a ' + recipe.name + ', boosting XP gain by ' + Math.round(recipe.xpBoost*100) + '% for ' + Math.round(recipe.teaDurationMs/60000) + ' minutes.', 'important');
    needsRender = true;
  }

  function sellItem(id){
    var item = ALL_SELLABLE[id];
    var qty = state.inventory[id]||0;
    if(qty <= 0 || !item) return;
    if(state.lockedItems[id]){
      addLog('That item is locked. Unlock it first to sell.', 'danger');
      return;
    }
    state.gold += qty*item.sell;
    state.inventory[id] = 0;
    needsRender = true;
  }
  function toggleItemLock(id){
    state.lockedItems[id] = !state.lockedItems[id];
    needsRender = true;
  }
  function sellAll(){
    var total = 0;
    Object.keys(state.inventory).forEach(function(id){
      var item = ALL_SELLABLE[id];
      var qty = state.inventory[id]||0;
      if(item && qty>0 && !state.lockedItems[id]){ total += qty*item.sell; state.inventory[id]=0; }
    });
    if(total>0){ state.gold += total; addLog('Sold your goods for ' + total + ' gold.'); needsRender = true; }
  }

  function craftArmorSlot(slotId){
    var slot = ARMOR_SLOTS.filter(function(s){ return s.id===slotId; })[0];
    if(!slot) return;
    var tier = state.armorSlots[slotId]||0;
    if(tier >= TIER_COUNT) return;
    var nextData = getSlotTierData(slot, tier+1);
    if(getLevel(state.xp.armorsmithing) < nextData.levelReq) return;
    if(!hasInputs(nextData.inputs)){ addLog('Not enough materials to forge ' + nextData.name + '.', 'danger'); return; }
    placeNewCraftActivity('armorsmithing', null, 'armorslot', { type:'craft', craftKind:'armorslot', slotId:slotId, progress:0 });
  }

  // Tools are now Equipment: forging produces a stackable inventory item for whatever
  // tier you choose (not just "the next tier"), and a separate equip step picks which
  // owned (type, tier, rarity) combo is actually active for that skill.
  function findToolType(skillId){
    return TOOL_TYPES.filter(function(t){ return t.skillId===skillId; })[0];
  }
  function craftTool(skillId, tierIndex){
    var tt = findToolType(skillId);
    if(!tt) return;
    var data = tt.isGather ? getGatherToolTierData(skillId, tierIndex+1) : getCraftToolTierData(skillId, tierIndex+1);
    if(getLevel(state.xp.blacksmithing) < data.levelReq) return;
    if(!hasInputs(data.inputs)){ addLog('Not enough materials to forge ' + data.name + '.', 'danger'); return; }
    placeNewCraftActivity('blacksmithing', null, 'tool', { type:'craft', craftKind:'tool', skillId:skillId, tierIndex:tierIndex, progress:0 });
  }
  function equipTool(itemId){
    var item = TOOL_ITEMS[itemId];
    if(!item || (state.inventory[itemId]||0) <= 0) return;
    var tiers = item.isGather ? state.gatherTools : state.craftTools;
    var rarities = item.isGather ? state.gatherToolRarities : state.craftToolRarities;
    var currentTier = tiers[item.skillId]||0;
    if(currentTier > 0){
      var oldId = 'tool_'+item.skillId+'_t'+(currentTier-1)+'_'+rarities[item.skillId];
      addItem(oldId, 1);
    }
    state.inventory[itemId] -= 1;
    tiers[item.skillId] = item.tierIndex+1;
    rarities[item.skillId] = item.rarity;
    toolPanelExpanded = true;
    addLog('You equipped the ' + item.name + '.', 'important');
  }
  function unequipTool(skillId){
    var tt = findToolType(skillId);
    if(!tt) return;
    var tiers = tt.isGather ? state.gatherTools : state.craftTools;
    var rarities = tt.isGather ? state.gatherToolRarities : state.craftToolRarities;
    var currentTier = tiers[skillId]||0;
    if(currentTier <= 0) return;
    var oldId = 'tool_'+skillId+'_t'+(currentTier-1)+'_'+rarities[skillId];
    addItem(oldId, 1);
    tiers[skillId] = 0;
    rarities[skillId] = 'normal';
  }

  function resetGame(){
    if(!confirmAction('resetGame')){
      addLog('Click New Game again within a few seconds to confirm -- this erases your current progress.', 'danger');
      render();
      return;
    }
    state = newGame();
    currentCategory = 'gathering'; currentSub = 'digging';
    addLog('A new adventure begins.');
    saveGame();
    cloudSave(true);   // force-propagate the reset so the cloud backup doesn't restore old progress
    render();
  }

  // ================= PERSISTENCE =================
  var SAVE_KEY = 'emberhollow-save-v3';
  var _lsAvailable = null;
  function localStorageAvailable(){
    if(_lsAvailable !== null) return _lsAvailable;
    try{
      var t = '__ff_ls_test__';
      window.localStorage.setItem(t, '1');
      window.localStorage.removeItem(t);
      _lsAvailable = true;
    }catch(e){ _lsAvailable = false; }
    return _lsAvailable;
  }
  // Persist to the browser's localStorage when the game is hosted on the web; fall back to
  // Claude's window.storage inside the artifact runtime (where localStorage is unavailable).
  function writeSave(str){
    if(localStorageAvailable()){
      try{ window.localStorage.setItem(SAVE_KEY, str); return; }catch(e){}
    }
    try{ if(window.storage && window.storage.set){ window.storage.set(SAVE_KEY, str).catch(function(){}); } }catch(e){}
  }
  async function readSave(){
    // ONLINE-ONLY: the save lives in the backend and requires an authenticated session.
    if(!chatClient || !authUser || !authUser.id) return null;
    try{
      var res = await chatClient.from('saves').select('data').eq('user_id', authUser.id).maybeSingle();
      if(res && res.data && res.data.data) return JSON.stringify(res.data.data);
    }catch(e){}
    return null;
  }
  function saveGame(){
    state.lastSaved = Date.now();
    cloudSave();   // ONLINE-ONLY: persistence goes to the backend (debounced); no localStorage
  }

  function applyOfflineProgress(elapsedMs){
    var capped = Math.min(elapsedMs, 12*3600*1000);   // offline progress caps at 12 hours
    if(capped < 3000) return;
    var regenSeconds = Math.floor(capped/1000/15);
    if(regenSeconds > 0) state.playerHp = Math.min(maxHp(state), state.playerHp + regenSeconds);
    var act = state.activity;
    if(!act || (act.type !== 'gather' && act.type !== 'craft' && act.type !== 'combat')) return;
    var goldBefore = state.gold;
    offlineCapture = { xp:{}, physique:{}, items:{}, gold:0, elapsedMs:capped, activityType:act.type };
    try{
    if(act.type === 'gather'){
      var item = ALL_GATHER_ITEMS[act.itemId];
      var ticks = Math.floor(capped/1000 / item.time);
      if(ticks > 0){
        addXp(act.skill, ticks*item.xp);
        if(act.skill === 'digging'){
          var tierIndex = parseInt(act.itemId.split('_t')[1], 10);
          var mainGain = Math.round(ticks * diggingMainChance(state));
          var coalEvents = Math.round(ticks * diggingCoalChance(state));
          var coalGain = 0;
          for(var _ce=0; _ce<coalEvents; _ce++) coalGain += randInt(1,5);
          var artifactGain = Math.round(ticks * diggingArtifactChance(state));
          if(mainGain > 0) addItem(act.itemId, mainGain);
          if(coalGain > 0) addItem('coal', coalGain);
          if(artifactGain > 0) addItem('muddyartifact_t'+tierIndex, artifactGain);
          addLog('While away, you dug up ' + mainGain + ' ' + item.name + (coalGain>0 ? ', ' + coalGain + ' Coal' : '') + (artifactGain>0 ? ', ' + artifactGain + ' Muddy Artifact(s)' : '') + '.', 'important');
        } else if(act.skill === 'mining'){
          var mTierIndex = parseInt(act.itemId.split('_t')[1], 10);
          var oreGain = Math.round(ticks * miningMainChance(state));
          var mCoalEvents = Math.round(ticks * miningCoalChance(state));
          var mCoalGain = 0;
          for(var _mce=0; _mce<mCoalEvents; _mce++) mCoalGain += randInt(1,5);
          var gemGain = Math.round(ticks * miningGemChance(state));
          if(oreGain > 0) addItem(act.itemId, oreGain);
          if(mCoalGain > 0) addItem('coal', mCoalGain);
          if(gemGain > 0) addItem(getGemForTier(mTierIndex), gemGain);
          addLog('While away, you mined ' + oreGain + ' ' + item.name + (mCoalGain>0 ? ', ' + mCoalGain + ' Coal' : '') + (gemGain>0 ? ', ' + gemGain + ' gem(s)' : '') + '.', 'important');
        } else if(act.skill === 'fishing'){
          var catchGain = Math.round(ticks * fishingCatchChance(state));
          if(catchGain > 0) addItem(act.itemId, catchGain);
          addLog('While away, you caught ' + catchGain + ' ' + item.name + '.', 'important');
        } else {
          addItem(act.itemId, ticks);
          addLog('While away, you gathered ' + ticks + ' ' + item.name + '.', 'important');
        }
      }
    } else if(act.type === 'craft'){
      var recipe = ALL_CRAFT_RECIPES[act.itemId];
      var maxByTime = Math.floor(capped/1000 / recipe.time);
      var maxByMats = Math.min.apply(null, Object.keys(recipe.inputs).map(function(k){
        return Math.floor((state.inventory[k]||0) / recipe.inputs[k]);
      }));
      var t2 = Math.max(0, Math.min(maxByTime, maxByMats));
      if(t2 > 0){
        consumeInputs(recipe.inputs, t2);
        addXp(act.skill, t2*recipe.xp*1.5);
        addItem(act.itemId, t2);
        addLog('While away, you crafted ' + t2 + ' ' + recipe.name + '.', 'important');
      } else {
        addLog('While away, your ' + act.skill + ' work ran out of materials.', '');
      }
      state.activity = { type:null };
    } else if(act.type === 'combat'){
      // Fast-forward the real combat ticks: same player/monster attack timing and auto-eat
      // as live, so kills, XP, gold and drops match. Stops early if food runs out (retreat).
      var _pStyle = getWeaponStyle(state.equippedMainhand);
      var _monster = MONSTERS.filter(function(x){ return x.id===act.monsterId; })[0];
      if(_pStyle && _monster){
        var _pInt = Math.max(200, _pStyle.attackSpeed*1000);
        var _mInt = Math.max(200, _monster.attackSpeed*1000*(1+getFamiliarEnemySlowPct()));
        var _nextP = _pInt, _nextM = _mInt, _guard = 0;
        while(state.activity.type==='combat' && _guard++ < 300000){
          if(_nextP <= _nextM){ if(_nextP > capped) break; playerAttackTick(); _nextP += _pInt; }
          else { if(_nextM > capped) break; monsterAttackTick(); autoEatCheck(); _nextM += _mInt; }
        }
      }
    }
    }catch(e){}
    offlineCapture.gold = state.gold - goldBefore;
    var _sum = offlineCapture;
    offlineCapture = null;
    if(Object.keys(_sum.xp).length || Object.keys(_sum.physique).length || Object.keys(_sum.items).length || _sum.gold > 0){ offlineSummaryData = _sum; }
  }

          while(state.farmingPlots.length < 40) state.farmingPlots.push({cropType:null, tierIndex:-1, plantedAt:0, readyAt:0});
          try {
            state.farmingPlots = state.farmingPlots.map(function(plot){
              if(!plot || typeof plot !== 'object'){ return { cropType:null, tierIndex:-1, plantedAt:0, readyAt:0 }; }
              if(plot.cropType === undefined){
                if(typeof plot.tierIndex === 'number' && plot.tierIndex >= 0){ plot.cropType = 'fiber'; }
                else { plot.cropType = null; plot.tierIndex = -1; plot.plantedAt = 0; plot.readyAt = 0; }
              }
              if(plot.cropType === 'wheat'){
                // Wheat has been removed entirely -- clear any plot still growing it.
                plot.cropType = null;
                plot.tierIndex = -1;
                plot.plantedAt = 0;

              }
              return plot;

          } catch(plotErr){

          if(typeof state.equippedBeltTier !== 'number') state.equippedBeltTier = 0;
          if(!state.equippedBeltRarity) state.equippedBeltRarity = 'normal';
          state.jewelrySlots = Object.assign(newGame().jewelrySlots, loaded.jewelrySlots||{});
          state.extraCraftSlots = (Array.isArray(loaded.extraCraftSlots) && loaded.extraCraftSlots.length>=3) ? loaded.extraCraftSlots : newGame().extraCraftSlots;
          state.inventory = loaded.inventory || {};
          if(typeof state.playerHp !== 'number') state.playerHp = maxHp(state);

          if(!state.activeTea || typeof state.activeTea !== 'object') state.activeTea = { itemId:null, name:null, icon:null, xpBoost:0, durationMs:0, expiresAt:0 };

          if(typeof state.settings.popupSupreme !== 'boolean') state.settings.popupSupreme = true;
          if(typeof state.settings.popupFantastic !== 'boolean') state.settings.popupFantastic = true;
          if(typeof state.settings.popupFamiliar !== 'boolean') state.settings.popupFamiliar = true;
          if(typeof state.settings.chatFlash !== 'boolean') state.settings.chatFlash = true;
          if(!state.dungeonProgress || typeof state.dungeonProgress !== 'object') state.dungeonProgress = {};
          if(!state.lockedItems || typeof state.lockedItems !== 'object') state.lockedItems = {};
          try {
            var gridOk = state.estate && state.estate.grid && state.estate.grid.length === ESTATE_GRID_SIZE &&
              state.estate.grid.every(function(col){ return Array.isArray(col) && col.length === ESTATE_GRID_SIZE &&
                col.every(function(cell){ return cell && typeof cell.height === 'number' && cell.height >= 0 && cell.height < ESTATE_MAX_HEIGHT; }); });
            var oldGridOk = !gridOk && state.estate && state.estate.grid && state.estate.grid.length === ESTATE_CORE_SIZE &&
              state.estate.grid.every(function(col){ return Array.isArray(col) && col.length === ESTATE_CORE_SIZE &&
                col.every(function(cell){ return cell && typeof cell.height === 'number' && cell.height >= 0 && cell.height < ESTATE_MAX_HEIGHT; }); });
            if(oldGridOk){
              // A save from before the estate could be expanded -- embed the player's
              // existing 10x10 plot (terraforming, pavement, borders and all) into the
              // new 20x20 layout as their owned core, rather than discarding it.
              state.estate = estateMigrateOldGridToNew(state.estate);
            } else if(!gridOk){
              state.estate = Object.assign({ grid: generateEstateGrid(), expansionsPurchased: 0, job: null }, generateEstateEdges());
            } else {
              // Shape is valid -- backfill any fields added since this save was last written,
              // without wiping out any terraforming the player has already done.
              state.estate.grid.forEach(function(col, gx){
                col.forEach(function(cell, gy){
                  if(typeof cell.type !== 'string') cell.type = 'dirt';
                  if(cell.buildingId === undefined) cell.buildingId = null;
                  if(cell.paveTileId === undefined) cell.paveTileId = null;
                  if(typeof cell.owned !== 'boolean') cell.owned = estateIsCoreTile(gx, gy);

                });
              });
              if(typeof state.estate.expansionsPurchased !== 'number') state.estate.expansionsPurchased = 0;
              var ej = state.estate.job;
              var ejOk = ej && (ej.kind==='raise'||ej.kind==='lower'||ej.kind==='clear') &&
                typeof ej.x==='number' && ej.x>=0 && ej.x<ESTATE_GRID_SIZE &&
                typeof ej.y==='number' && ej.y>=0 && ej.y<ESTATE_GRID_SIZE &&
                typeof ej.startAt==='number' && typeof ej.readyAt==='number';
              if(!ejOk) state.estate.job = null;
              var edgesYOk = state.estate.edgesY && state.estate.edgesY.length === ESTATE_GRID_SIZE &&
                state.estate.edgesY.every(function(col){ return Array.isArray(col) && col.length === ESTATE_GRID_SIZE+1 && col.every(function(e){ return !!e; }); });
              var edgesXOk = state.estate.edgesX && state.estate.edgesX.length === ESTATE_GRID_SIZE+1 &&
                state.estate.edgesX.every(function(col){ return Array.isArray(col) && col.length === ESTATE_GRID_SIZE && col.every(function(e){ return !!e; }); });
              if(!edgesYOk || !edgesXOk){
                Object.assign(state.estate, generateEstateEdges());
              } else {
                state.estate.edgesY.forEach(function(col){ col.forEach(function(e){ if(e.masonryTileId===undefined) e.masonryTileId=null; }); });
                state.estate.edgesX.forEach(function(col){ col.forEach(function(e){ if(e.masonryTileId===undefined) e.masonryTileId=null; }); });
              }

          if(state.activeCompanion && (!state.familiars[state.activeCompanion] || !state.familiars[state.activeCompanion].owned)) state.activeCompanion = null;

  function inputsLine(inputs, idPrefix){
    var parts = Object.keys(inputs).map(function(k){
      var need = inputs[k];
      var have = state.inventory[k]||0;
      var name = (ALL_SELLABLE[k]||{}).name || k;
      var ok = have >= need;
      var idAttr = idPrefix ? ' id="'+idPrefix+'-'+k+'"' : '';
      return '<span class="'+(ok?'ok':'bad')+'"'+idAttr+'>'+need+'x '+name+' ('+have+' owned)</span>';
    });
    return parts.join(', ');
  }

  function renderStackableWeaponForgeSection(types, skillId, sectionTitle, introText){

  function formatTypeMix(mix){
    var entries = DAMAGE_TYPES.map(function(t){ return {t:t, w:mix[t]||0}; }).filter(function(e){ return e.w > 0.005; });
    entries.sort(function(a,b){ return b.w-a.w; });
    return entries.map(function(e){ return Math.round(e.w*100)+'% '+TYPE_ICON[e.t]+' '+e.t.charAt(0).toUpperCase()+e.t.slice(1); }).join(' / ');
  }
  function renderCombatStatsPanel(){

    var effMin = Math.max(1, Math.round(weapon.dmgMin * physDmgMult * weaponProficiency));
    var effMax = Math.max(effMin+1, Math.round(weapon.dmgMax * physDmgMult * weaponProficiency));
    var armor = getTotalArmorDefense(state);
    var weaponMix = weaponStyle.attackTypes || {blunt:1};
    var armorMix = getPlayerArmorTypeMix(state);
    var html = '<div class="stats-panel">';
    html += '<div class="stats-group" style="grid-column:1/-1"><div class="stat-row"><span class="stat-label">Combat Score</span><span class="stat-value">'+combatLevelEquivalent(state)+'</span></div></div>';
    html += '<div class="stats-group"><h4>'+svgIcon('sword','currentColor')+' Offense</h4>';

    html += '<div class="stat-row"><span class="stat-label">Weapon Proficiency</span><span class="stat-value">+'+Math.round((weaponProficiency-1)*100)+'%</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Critical Hit Chance</span><span class="stat-value">'+(Math.round(criticalEyeCritChance(state)*10000)/100)+'%</span></div>';
    html += '<div class="stat-row"><span class="stat-label">Critical Hit Damage</span><span class="stat-value">'+(Math.round(Math.min(MAX_CRIT_DAMAGE_MULT, CRIT_DAMAGE_MULT + exploitationCritDamageBonus(state))*100)/100)+'x</span></div>';
    html += '<div class="stat-row soon"><span class="stat-label">Accuracy</span><span class="stat-value">Coming soon</span></div>';
    if(weaponStyle.hand==='bow'){
