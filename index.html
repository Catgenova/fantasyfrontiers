<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy Frontiers — Idle Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Spectral:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe5cf;
    --bg-deep:#d8c5a0;        /* recessed wells: tracks, inputs */
    --bg-panel:#e6d9bd;
    --bg-panel-raised:#f2e9d5;
    --bg-card:#f6efe0;
    --border:#c7b287;
    --border-light:#a17c4c;
    --gold:#0f7d74;          /* primary accent = teal */
    --gold-bright:#0fa093;
    --text:#3a2c17;
    --text-dim:#6a5735;
    --text-faint:#93805a;

    --hp-good:#5c8a3c;
    --hp-mid:#c0891d;
    --hp-bad:#a63a2f;

    --cat-gathering:#5d7a34;
    --cat-crafting:#a85b1f;
    --cat-estate:#4a7986;
    --cat-combat:#a63a2f;
    --cat-physique:#7b4fb3;
    --cat-faith:#a9832a;
    --cat-farming:#7f6a1f;
    --cat-menagerie:#1f857a;
    --cat-guild:#9a6a3a;
    --cat-chat:#3f78b0;
    --cat-leaderboard:#c78b2c;
    --cat-character:#7a5a2c;
    --rarity-rare:#2f7fb0;
    --rarity-superior:#8a4fb0;
    --rarity-fantastic:#c07d1e;

    --sub-digging:#9a6738;
    --sub-forestry:#5f7d3a;
    --sub-mining:#6f6a5c;
    --sub-fishing:#2f7f96;

    --sub-carpentry:#9a6a34;
    --sub-metallurgy:#5f6a7a;
    --sub-blacksmithing:#a8481a;
    --sub-roasting:#a86322;

    --radius:6px;
    --font-display:'Cinzel',serif;
    --font-body:'Spectral',serif;
    --font-mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;max-width:100%;overflow-x:hidden;}
  body{
    background:
      radial-gradient(ellipse at 18% -5%, rgba(15,125,116,0.10), transparent 55%),
      radial-gradient(ellipse at 100% 100%, rgba(123,79,179,0.09), transparent 52%),
      radial-gradient(ellipse at 50% 45%, rgba(255,252,244,0.4), transparent 60%),
      var(--paper);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
  }
  #app{max-width:1220px;margin:0 auto;padding:14px 14px 40px;}
  .sticky-header{position:sticky; top:0; z-index:600; background:var(--paper);}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;
    padding:16px 20px;margin-bottom:12px;
    background:linear-gradient(180deg, var(--bg-panel-raised), var(--bg-panel));
    border:1px solid var(--border);border-top:2px solid var(--border-light);border-radius:var(--radius);
    box-shadow:0 2px 0 rgba(120,92,44,0.22), 0 1px 10px rgba(120,92,44,0.12);
  }
  .brand{
    display:flex;align-items:center;gap:13px;
    font-family:var(--font-display);font-weight:700;font-size:23px;
    color:var(--gold);letter-spacing:1.5px;
    text-shadow:0 1px 0 rgba(255,250,240,0.7);
  }
  .brand-crest{width:58px;height:58px;flex-shrink:0;filter:drop-shadow(0 1px 2px rgba(40,28,10,0.3));}
  .brand-word{display:block;line-height:1.05;}
  .brand small{display:block;font-family:var(--font-body);font-weight:400;font-size:11px;color:var(--text-faint);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
  .stats-summary{display:flex;gap:18px;align-items:center;font-family:var(--font-mono);font-size:14px;flex-wrap:wrap;}
  .stats-summary span{color:var(--text-dim);}
  .stats-summary b{color:var(--gold);font-weight:600;}
  .reset-btn{
    background:none;border:1px solid var(--border-light);color:var(--text-faint);
    font-family:var(--font-body);font-size:11px;padding:4px 8px;border-radius:var(--radius);
    cursor:pointer;margin-left:10px;
  }
  .reset-btn:hover{color:var(--hp-bad);border-color:var(--hp-bad);}

  /* Category tabs (level 1) */
  .cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .cat-btn{
    font-family:var(--font-display);font-size:13px;font-weight:600;
    background:linear-gradient(180deg, var(--bg-panel-raised), var(--bg-panel));border:1px solid var(--border);color:var(--text-dim);
    padding:11px 18px;border-radius:var(--radius);cursor:pointer;white-space:nowrap;
    display:flex;align-items:center;gap:8px;transition:background .15s,color .15s,border-color .15s;
    border-bottom:3px solid transparent;box-shadow:0 1px 0 rgba(120,92,44,0.18);
  }
  .cat-btn .seal{
    width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%, #ffffff, var(--bg-panel));border:1px solid var(--border-light);font-size:13px;
    box-shadow:0 1px 2px rgba(120,92,44,0.2) inset;
  }
  .cat-btn:hover{color:var(--text);border-color:var(--border-light);}
  .cat-btn.active{background:linear-gradient(180deg, #ffffff, var(--bg-panel-raised) 45%, var(--bg-panel));color:var(--cat-color);border-color:var(--border-light);border-bottom-color:var(--cat-color);box-shadow:0 1px 0 rgba(120,92,44,0.18), 0 0 14px color-mix(in srgb, var(--cat-color) 22%, transparent);}
  .cat-btn.active .seal{border-color:var(--cat-color);background:radial-gradient(circle at 35% 30%, color-mix(in srgb, var(--cat-color) 24%, #ffffff), var(--bg-card));}
  .cat-btn.flash{animation:catFlash 1s ease-in-out infinite;}
  .cat-btn.flash .seal{animation:catFlashSeal 1s ease-in-out infinite;}
  @keyframes catFlash{
    0%,100%{border-color:var(--border-light);box-shadow:none;}
    50%{border-color:var(--cat-farming);box-shadow:0 0 10px color-mix(in srgb, var(--cat-farming) 55%, transparent);}
  }
  @keyframes catFlashSeal{
    0%,100%{background:var(--bg-card);}
    50%{background:color-mix(in srgb, var(--cat-farming) 40%, #ffffff);}
  }

  /* Guild tab */
  .guild-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:2px;}
  .guild-title{font-family:var(--font-display,var(--font-body));font-size:18px;font-weight:800;color:var(--cat-guild);}
  .guild-subtabs{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0 12px;border-bottom:1px solid var(--border);padding-bottom:8px;}
  .guild-subtab{font-family:var(--font-body);font-size:12px;font-weight:600;background:rgba(255,255,255,0.35);border:1px solid var(--border);color:var(--text-faint);border-radius:6px;padding:5px 10px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
  .guild-subtab .game-icon{width:14px;height:14px;}
  .guild-subtab.active{background:var(--cat-guild);border-color:var(--cat-guild);color:#fff;}
  .guild-card{background:rgba(255,255,255,0.4);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;}
  .guild-section-title{font-family:var(--font-body);font-size:13px;font-weight:800;color:var(--text);margin:14px 0 6px;}
  .guild-member-row{display:flex;align-items:center;justify-content:space-between;gap:8px;background:rgba(255,255,255,0.4);border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px;flex-wrap:wrap;}
  .guild-row-actions{display:flex;gap:4px;flex-wrap:wrap;}
  .guild-rank{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;margin-left:6px;display:inline-flex;align-items:center;gap:3px;vertical-align:middle;}
  .guild-rank .game-icon{width:11px;height:11px;}
  .guild-rank.leader{background:rgba(201,168,74,0.18);color:#8a6a1a;border:1px solid rgba(201,168,74,0.5);}
  .guild-rank.officer{background:rgba(63,120,176,0.15);color:#2f6098;border:1px solid rgba(63,120,176,0.4);}
  .guild-rank.member{background:rgba(0,0,0,0.05);color:var(--text-faint);border:1px solid var(--border);}
  .mini-btn{font-family:var(--font-body);font-size:11px;font-weight:600;background:rgba(255,255,255,0.6);border:1px solid var(--border);color:var(--text-dim);border-radius:5px;padding:3px 8px;cursor:pointer;}
  .mini-btn:hover{border-color:var(--gold);}
  .mini-btn.danger{color:var(--hp-bad);border-color:rgba(166,58,47,0.4);}
  .mini-btn.active{background:var(--cat-guild);border-color:var(--cat-guild);color:#fff;}
  .gest-bar{height:8px;border-radius:5px;background:rgba(0,0,0,0.10);overflow:hidden;margin:6px 0 2px;}
  .gest-fill{height:100%;background:linear-gradient(90deg,var(--cat-estate),var(--cat-guild));border-radius:5px;transition:none;}
  .chat-channel-bar{display:flex;gap:4px;margin-bottom:8px;}
  .chat-channel-btn{font-family:var(--font-body);font-size:12px;font-weight:600;background:rgba(255,255,255,0.35);border:1px solid var(--border);color:var(--text-faint);border-radius:6px;padding:5px 12px;cursor:pointer;}
  .chat-channel-btn.active{background:var(--cat-chat);border-color:var(--cat-chat);color:#fff;}
  .chat-channel-btn:disabled{opacity:0.45;cursor:not-allowed;}

  /* Sub tabs (level 2) */
  .sub-tabs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px;}
  .sub-btn{
    font-family:var(--font-body);font-size:11.5px;font-weight:600;
    background:rgba(255,255,255,0.35);border:1px solid var(--border);color:var(--text-faint);
    padding:5px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;
    display:flex;align-items:center;gap:5px;
  }
  .sub-btn:hover{color:var(--text);border-color:var(--border-light);}
  .sub-btn.active{color:#fbf6ea;background:var(--sub-color);border-color:var(--sub-color);font-weight:700;}

  .layout{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start;}
  @media (max-width:820px){.layout{grid-template-columns:1fr;}}
  .content-wrap{position:relative;}
  .floating-text-layer{position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; overflow:hidden; z-index:9999;}
  .familiar-popup-overlay{position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(52,38,18,0.55); z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;}
  .skill-info-btn{
    display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;
    background:#ffffff;border:1px solid var(--border-light);color:var(--text-faint);
    font-family:var(--font-mono);font-size:10px;line-height:1;cursor:pointer;padding:0;vertical-align:2px;
  }
  .skill-info-btn:hover{color:var(--gold-bright);border-color:var(--gold);}
  .skill-info-overlay{position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(52,38,18,0.55); z-index:10001; align-items:center; justify-content:center; padding:20px; box-sizing:border-box;}
  .skill-info-card{
    background:linear-gradient(165deg,var(--bg-panel-raised),var(--bg-card)); border:2px solid var(--gold); border-radius:var(--radius);
    max-width:380px; width:100%; max-height:85vh; overflow-y:auto; padding:20px; text-align:center; box-shadow:0 0 34px rgba(15,125,116,0.22), 0 10px 28px rgba(52,38,18,0.28);
  }
  .skill-info-title{font-family:var(--font-display); color:var(--gold); font-size:18px; margin-bottom:10px;}
  .skill-info-desc{color:var(--text-dim); font-size:13px; line-height:1.6; margin-bottom:16px;}
  .familiar-popup-card{background:linear-gradient(165deg,var(--bg-panel-raised),var(--bg-card)); border:2px solid var(--gold); border-radius:var(--radius); max-width:420px; width:100%; padding:22px; text-align:center; box-shadow:0 0 34px rgba(15,125,116,0.22), 0 10px 28px rgba(52,38,18,0.28);}
  .familiar-popup-title{font-family:var(--font-display); color:var(--gold); font-size:13px; letter-spacing:1px; text-transform:uppercase; margin-bottom:10px;}
  .familiar-popup-counter{font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint); margin-bottom:8px;}
  .familiar-popup-icon{font-size:52px; margin-bottom:6px;}
  .familiar-popup-name{font-family:var(--font-display); font-size:22px; color:var(--text); margin-bottom:2px;}
  .familiar-popup-meta{color:var(--text-dim); font-size:12px; margin-bottom:14px;}
  .familiar-popup-spells{text-align:left; background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); padding:10px 12px; margin-bottom:16px;}
  .familiar-popup-spells div{font-family:var(--font-mono); font-size:11px; color:var(--text-faint); line-height:1.7;}
  .familiar-popup-spells b{color:var(--text);}
  .settings-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:9px 0; border-bottom:1px solid var(--border); text-align:left;}
  .settings-row:last-child{border-bottom:none;}
  .settings-row-label{color:var(--text); font-size:13px;}
  .settings-row-desc{color:var(--text-faint); font-size:10.5px; margin-top:2px;}
  .settings-toggle{width:42px; height:22px; border-radius:11px; background:var(--bg-deep); border:1px solid var(--border); cursor:pointer; position:relative; flex-shrink:0; transition:background .15s;}
  .settings-toggle.on{background:var(--gold);}
  .settings-toggle-knob{position:absolute; top:1px; left:1px; width:18px; height:18px; border-radius:50%; background:#fbf6ea; box-shadow:0 1px 2px rgba(52,38,18,0.3); transition:left .15s;}
  .settings-toggle.on .settings-toggle-knob{left:21px; background:#fbf6ea;}
  .floating-text{position:absolute; left:50%; transform:translate(-50%,0); font-weight:800; font-size:14px; white-space:nowrap; text-shadow:0 1px 2px rgba(255,250,240,0.8); animation:floatUpFade 1.3s ease-out forwards;}
  .floating-text.ft-success{color:var(--hp-good);}
  .floating-text.ft-fail{color:var(--hp-bad);}
  .floating-text.ft-rare{color:#8a4fb0;}
  .floating-text.ft-bonus{color:#0f9b8e;}
  .floating-text.ft-xp{color:#a9832a; animation:floatUpFade 2s ease-out forwards;}
  @keyframes floatUpFade{
    0%{opacity:0; transform:translate(-50%,4px) scale(0.9);}
    12%{opacity:1; transform:translate(-50%,0) scale(1.05);}
    75%{opacity:1;}
    100%{opacity:0; transform:translate(-50%,-52px) scale(1);}
  }

  .panel{
    background:linear-gradient(160deg, var(--bg-panel-raised), var(--bg-panel) 60%);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;box-shadow:0 2px 6px rgba(120,92,44,0.14), 0 1px 0 rgba(255,255,255,0.5) inset;
  }
  .panel h3{
    font-family:var(--font-display);font-size:13px;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--gold);margin:0 0 10px;padding-bottom:8px;border-bottom:1px solid var(--border);
    position:relative;
  }
  .panel h3::after{content:'';position:absolute;left:0;bottom:-1px;width:36px;height:2px;background:var(--gold);}

  .content{min-height:320px;}
  .section-intro{font-size:13px;color:var(--text-dim);margin-bottom:14px;line-height:1.5;}
  .card-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));gap:10px;}
  @media (max-width:600px){.card-grid{grid-template-columns:1fr;}}
  .item-card{
    background:linear-gradient(160deg, #ffffff, var(--bg-card) 85%);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px;position:relative;overflow:hidden;box-shadow:0 2px 5px rgba(120,92,44,0.13), 0 1px 0 rgba(255,255,255,0.6) inset;
  }
  .item-card.locked{opacity:0.5;}
  .item-card.active-item{border-color:var(--gold);box-shadow:0 2px 5px rgba(120,92,44,0.13), 0 0 0 1px rgba(15,125,116,0.4) inset, 0 0 16px rgba(15,125,116,0.14);}
  .item-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .item-icon{font-size:26px;line-height:1;}
  .game-icon{width:1em;height:1em;vertical-align:-0.15em;flex-shrink:0;display:inline-block;}
  .item-name{font-family:var(--font-display);font-size:14px;color:var(--text);}
  .item-meta{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);margin-top:2px;}
  .item-stats{display:flex;flex-wrap:wrap;gap:8px;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin:8px 0;}
  .inputs-line{font-family:var(--font-mono);font-size:11px;margin:6px 0;line-height:1.6;}
  .inputs-line .ok{color:var(--hp-good);}
  .inputs-line .bad{color:var(--hp-bad);}
  .craft-filter-bar{display:flex;justify-content:flex-end;margin:2px 0 10px;}
  .craft-filter-btn{font-family:var(--font-body);font-size:12px;font-weight:600;padding:5px 12px;border-radius:var(--radius);cursor:pointer;background:var(--bg-panel-raised);border:1px solid var(--border);color:var(--text-dim);}
  .craft-filter-btn.on{background:color-mix(in srgb, var(--cat-crafting) 22%, var(--bg-panel-raised));border-color:var(--cat-crafting);color:var(--text);}
  .craft-filtering .item-card:not(.active-item):has(.inputs-line .bad){display:none;}
  .chat-wrap{display:flex;flex-direction:column;gap:8px;}
  .chat-status{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);}
  .chat-status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;background:var(--text-faint);}
  .chat-status.online .dot{background:var(--hp-good);}
  .chat-status.error .dot,.chat-status.unconfigured .dot{background:var(--hp-bad);}
  .chat-name-row,.chat-send-row{display:flex;gap:8px;}
  .chat-input{flex:1;min-width:0;font-family:var(--font-body);font-size:13px;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-panel-raised);color:var(--text);}
  .chat-input:disabled{opacity:0.5;}
  .chat-messages{height:340px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;padding:10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-panel);}
  .chat-msg{font-family:var(--font-body);font-size:13px;line-height:1.45;}
  .chat-user{font-weight:700;color:var(--cat-chat);margin-right:5px;}
  .chat-user::after{content:':';color:var(--text-faint);}
  .chat-body{color:var(--text);word-break:break-word;}
  .chat-empty{margin:auto;color:var(--text-faint);font-style:italic;}
  .chat-account{display:flex;align-items:center;gap:8px;font-family:var(--font-body);font-size:12px;color:var(--text-dim);}
  .auth-card{display:flex;flex-direction:column;gap:8px;padding:14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-panel-raised);}
  .auth-tabs{display:flex;gap:6px;margin-bottom:2px;}
  .auth-tab{flex:1;font-family:var(--font-display);font-size:13px;padding:7px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg-panel);color:var(--text-dim);cursor:pointer;}
  .auth-tab.on{background:color-mix(in srgb, var(--cat-chat) 22%, var(--bg-panel));border-color:var(--cat-chat);color:var(--text);}
  .auth-error{font-family:var(--font-body);font-size:12px;color:var(--hp-bad);}
  .auth-note{font-family:var(--font-body);font-size:11px;color:var(--text-faint);line-height:1.4;}
  .lb-controls{display:flex;gap:8px;}
  .lb-list{display:flex;flex-direction:column;gap:4px;}
  .lb-row{display:flex;align-items:center;gap:10px;width:100%;text-align:left;font-family:var(--font-body);font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-panel);color:var(--text);cursor:pointer;}
  .lb-row:hover{border-color:var(--cat-leaderboard);}
  .lb-row.me{border-color:var(--cat-leaderboard);background:color-mix(in srgb, var(--cat-leaderboard) 12%, var(--bg-panel));}
  .lb-rank{flex:0 0 34px;font-family:var(--font-mono);font-weight:700;color:var(--text-dim);}
  .lb-name{flex:1;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .lb-lvl{flex:0 0 auto;font-family:var(--font-mono);color:var(--cat-leaderboard);}
  .lb-gold{flex:0 0 auto;font-family:var(--font-mono);color:var(--gold);}
  .profile-head{padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-panel-raised);}
  .profile-name{font-family:var(--font-display);font-size:20px;color:var(--text);}
  .profile-stats{display:flex;gap:16px;margin-top:6px;font-family:var(--font-mono);font-size:13px;color:var(--text-dim);}
  .profile-stats b{color:var(--text);}
  .profile-skills{display:flex;flex-direction:column;gap:10px;}
  .profile-group-head{font-family:var(--font-display);font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
  .profile-group-body{display:flex;flex-wrap:wrap;gap:6px;}

  .style-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}

    display:flex;flex-direction:column;align-items:flex-start;gap:2px;
    background:linear-gradient(160deg, #ffffff, var(--bg-card) 85%);border:1px solid var(--border);color:var(--text-dim);
    padding:7px 10px;border-radius:var(--radius);cursor:pointer;font-family:var(--font-body);font-size:12px;

  .style-btn:hover{border-color:var(--border-light);color:var(--text);}
  .style-btn.active{border-color:var(--cat-combat);color:var(--cat-combat);background:linear-gradient(160deg, rgba(166,58,47,0.12), var(--bg-card));}

  .style-btn:disabled{cursor:not-allowed;}
  .style-btn .style-lvl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);}
  .style-btn.active .style-lvl{color:var(--cat-combat);}
  .style-btn .style-type{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);text-transform:capitalize;}

  .matchup-weak{background:rgba(166,58,47,0.16);color:var(--hp-bad);}
  .matchup-neutral{background:rgba(147,128,90,0.16);color:var(--text-faint);}

  .char-row{display:flex;flex-wrap:wrap;justify-content:space-between;gap:4px 8px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);padding:4px 0;border-bottom:1px dotted var(--border);}

  .char-row span:first-child{flex-shrink:0;}

  .char-row-toggle{cursor:pointer;user-select:none;}

  .armor-slot-row span:first-child{flex-shrink:0;}
  .armor-slot-row span:last-child{overflow-wrap:anywhere;text-align:right;}

  .armor-slot-row .empty{color:var(--text-faint);font-style:italic;}
  .skill-row{margin-bottom:10px;}
  .skill-group-header{
    font-family:var(--font-display);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--group-color);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--group-color);
    opacity:0.9;display:flex;justify-content:space-between;align-items:baseline;gap:8px;
  }
  .skill-group-header:first-of-type{margin-top:4px;}
  .skill-row-top{display:flex;flex-wrap:wrap;justify-content:space-between;gap:4px;font-size:12px;margin-bottom:3px;}
  .skill-row-top .sname{font-family:var(--font-display);color:var(--text-dim);}
  .skill-row-top .slvl{font-family:var(--font-mono);color:var(--gold);}
  .mini-track{height:5px;border-radius:2px;background:var(--bg-deep);border:1px solid var(--border);overflow:hidden;}
  .mini-fill{height:100%;background:var(--gold);}

  .top-skill-fill{height:100%;transition:width .25s;}
  .top-skill-label{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-top:3px;display:flex;justify-content:space-between;}
  .top-skill-label b{color:var(--text);}
  .stats-panel{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:14px;}
  .stats-group{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;}
  .stats-group h4{margin:0 0 8px;font-family:var(--font-display);font-size:13px;letter-spacing:0.5px;color:var(--gold);}
  .stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12.5px;}
  .stat-row:last-child{border-bottom:none;}
  .stat-label{color:var(--text-dim);}
  .stat-value{font-family:var(--font-mono);color:var(--text);font-weight:600;}
  .stat-row.soon .stat-label,.stat-row.soon .stat-value{color:var(--text-faint);font-style:italic;font-weight:400;}
  .global-action-bar{margin:0 20px 10px;padding:14px 20px;background:linear-gradient(180deg,#ffffff,var(--bg-card));border:1px solid var(--border-light);border-radius:var(--radius);}
  .global-action-bar.gab-clickable{cursor:pointer; transition:border-color .15s, box-shadow .15s;}
  .global-action-bar.gab-clickable:hover{border-color:var(--gold); box-shadow:0 0 0 1px var(--gold) inset;}
  .global-action-bar.idle{opacity:0.65;}
  .gab-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
  .gab-action-name{font-family:var(--font-display);font-size:17px;letter-spacing:0.5px;color:var(--gold);}
  .gab-timer-text{font-family:var(--font-mono);font-size:13px;color:var(--text-dim);}
  .gab-track{height:16px;border-radius:4px;background:var(--bg-deep);border:1px solid var(--border);overflow:hidden;margin-bottom:10px;}
  .gab-fill{height:100%;background:var(--gold);}
  .gab-skill-row{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11.5px;color:var(--text-dim);margin-bottom:3px;}

  .gab-physique-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .gab-physique-item{flex:1 1 0;min-width:90px;}
  .gab-physique-label{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:9.5px;color:var(--text-faint);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .gab-physique-track{height:4px;border-radius:2px;background:var(--bg-deep);border:1px solid var(--border);overflow:hidden;}
  .gab-physique-fill{height:100%;background:var(--cat-physique);transition:width .25s;}

  .gab-extra-tasks{margin-top:10px;padding-top:8px;border-top:1px dashed var(--border);}

  .gab-extra-name .game-icon{width:13px;height:13px;flex-shrink:0;}
  .gab-extra-track{flex:1 1 auto;height:9px;border-radius:3px;background:var(--bg-deep);border:1px solid var(--border);overflow:hidden;}
  .gab-extra-fill{height:100%;background:var(--cat-crafting);}

  .lifetime-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:8px;margin-bottom:14px;}

  .inv-list{max-height:220px;overflow-y:auto;}
  .inv-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px dotted var(--border);font-size:12px;gap:6px;}
  .inv-search{
    width:100%;box-sizing:border-box;font-family:var(--font-body);font-size:12px;
    background:#ffffff;border:1px solid var(--border);color:var(--text);
    padding:7px 10px;border-radius:var(--radius);margin-bottom:10px;
  }
  .inv-search:focus{outline:none;border-color:var(--gold);}
  .inv-search::placeholder{color:var(--text-faint);}
  .inv-row:last-child{border-bottom:none;}
  .inv-left{display:flex;align-items:center;gap:8px;overflow:hidden;min-width:0;flex:1 1 auto;}
  .inv-left .cnt{font-family:var(--font-mono);color:var(--gold);flex-shrink:0;}
  .inv-left .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .sell-btn{
    background:none;border:1px solid var(--border-light);color:var(--text-faint);
    font-family:var(--font-mono);font-size:10px;padding:3px 6px;border-radius:2px;cursor:pointer;flex-shrink:0;
  }
  .sell-btn:hover{color:var(--gold);border-color:var(--gold);}
  .sell-btn:disabled{opacity:0.4;cursor:not-allowed;}
  .lock-btn{padding:3px 5px;display:flex;align-items:center;}
  .lock-btn.locked-on{border-color:var(--gold);}
  .sell-all-btn{width:100%;margin-top:8px;}
  .empty-note{color:var(--text-faint);font-size:12px;font-style:italic;}

  .log-list{max-height:150px;overflow-y:auto;display:flex;flex-direction:column;}

  .log-entry:last-child{border-bottom:none;}

  .log-entry.danger{color:var(--hp-bad);}

  .physique-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;}

  .physique-icon{font-size:22px;}
  .physique-name{font-family:var(--font-display);font-size:13px;}
  .physique-lvl{font-family:var(--font-mono);font-size:11px;color:var(--cat-physique);margin-left:auto;}
  .physique-bonus{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:14px;font-family:var(--font-mono);font-size:12px;color:var(--text-dim);}
  .physique-bonus b{color:var(--cat-physique);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px;}

  /* --- Tooltip sections & physique chips (skill/physique info popup) --- */
  .skill-info-section{text-align:left; margin-bottom:14px;}
  .skill-info-section-label{font-family:var(--font-display); font-size:11px; letter-spacing:0.5px; text-transform:uppercase; color:var(--gold); margin-bottom:5px;}
  .skill-info-section-body{color:var(--text-dim); font-size:12.5px; line-height:1.55;}
  .skill-info-chips{display:flex; flex-wrap:wrap; gap:5px;}
  .skill-info-chip{display:inline-flex; align-items:center; gap:4px; font-size:11.5px; color:var(--text); background:var(--bg-panel); border:1px solid var(--border); border-radius:12px; padding:3px 9px;}
  .skill-info-chip .game-icon{width:13px; height:13px;}

  /* --- Estate rotate buttons: match the reskinned zoom buttons, sit just below them --- */
  .estate-rotate-btn{
    position:absolute;top:58px;z-index:5;width:34px;height:34px;border-radius:50%;
    background:linear-gradient(180deg, var(--bg-panel-raised), var(--bg-card));border:1px solid var(--border-light);
    color:var(--gold);font-family:var(--font-display);font-size:19px;line-height:1;

    box-shadow:0 2px 4px rgba(120,92,44,0.2);
  }
  .estate-rotate-btn:hover{border-color:var(--gold);background:linear-gradient(180deg, #ffffff, rgba(15,125,116,0.10));}
  .estate-rotate-left{left:16px;}
  .estate-rotate-right{right:16px;}

</style>

  function makeGatherLine(skillId, noun, opts){
    var items = [];
    var names = opts.names || TIER_NAMES;
    for(var i=0;i<TIER_COUNT;i++){
      var item = {
        id: skillId+'_t'+i,
        name: names[i]+' '+noun,
        levelReq: TIER_LEVELS[i],
        xp: tierXp(opts.xp, i),
        time: tierTime(opts.time, opts.timeStep, i),
        sell: tierSell(opts.sell, i),
        icon: opts.icons ? opts.icons[i] : opts.icon
      };
      if(opts.heal) item.heal = tierXp(opts.heal, i);
      items.push(item);
    }
    return items;
  }
  function makeCraftLine(craftId, noun, opts){
    var recipes = [];
    for(var i=0;i<TIER_COUNT;i++){
      var r = {
        id: craftId+'_t'+i,
        name: TIER_NAMES[i]+' '+noun,
        levelReq: TIER_LEVELS[i],
        xp: tierXp(opts.xp, i),
        time: tierTime(opts.time, opts.timeStep, i),
        sell: tierSell(opts.sell, i),
        icon: opts.icon,
        inputs: opts.inputs(i)
      };
      if(opts.heal) r.heal = tierXp(opts.heal, i);
      recipes.push(r);
    }
    return recipes;
  }

  // Assign a palette colour to any sub-skill that doesn't already have one set above.
  (function assignSubColors(){
    var idx = 0;
    [GATHERING_SKILLS, CRAFTING_SKILLS].forEach(function(group){
      Object.keys(group).forEach(function(k){
        if(!group[k].color){ group[k].color = SUB_PALETTE[idx % SUB_PALETTE.length]; idx++; }
      });
    });
  })();

  // ---- 14-slot armor system ----
  // Each slot progresses through the same 21 tiers (levels 1,5,10...100).
  // Slot "weight" determines how much defense that tier is worth: heavy body pieces
  // give the most, medium pieces give a moderate amount, and small accessories (rings,
  // amulet) give a little each but there are a lot of them.
  // Relic used to live here as a 15th slot, but is now its own equipment type (see
  // the Relic system below) fed by Archaeology instead of Armorsmithing. Gauntlets,
  // Boots, Chest, and Helmet have similarly moved out -- they're now Chain Mail / Plate
  // Armor equipment (see below), the first proper body-armor equipment type.

    {id:'back', label:'Back', icon:svgIcon('cloak','#6a5a8a'), weight:'heavy'},
    {id:'tabard', label:'Tabard', icon:svgIcon('tabard','#8a3a3a'), weight:'heavy'},
    {id:'mask', label:'Mask', icon:svgIcon('mask','#9a8a6a'), weight:'medium'}
  ];
  var ARMOR_SLOT_IDS = ARMOR_SLOTS.map(function(s){ return s.id; });
  var ARMOR_TIER_LEVELS = TIER_LEVELS;
  var ARMOR_TIER_NAMES  = TIER_NAMES;

  // ---- Combat buffs cast by the active companion familiar. Only one effect per type is

  // ================= HELPERS =================
  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function getLevel(xp){ return Math.max(1, Math.floor(Math.sqrt(xp/100)) + 1); }
  // Equipping anything above Tier 1 (tierIndex 0) requires the matching proficiency

  // level requirement -- the same threshold that unlocked crafting it in the first

  // creates a natural bootstrap: equip Tier 1, fight with it until proficient enough,
  // then the next tier opens up.
  function meetsProficiencyRequirement(profXp, tierIndex){
    if(tierIndex <= 0) return true;

  function combatLevelEquivalent(state){

      var s = state.bodyArmor && state.bodyArmor[slot];

  function fmt(n){ return Math.floor(n).toLocaleString(); }

  function craftSuccessRate(state, skillId){ var b = BASE_CRAFT_SUCCESS + craftToolSuccessBonus(state, skillId) + grossMotorCraftSuccessBonus(state); if(PHYS_ALCH_GROUP.indexOf(skillId)!==-1) b += criticalThinkingCraftSuccessBonus(state); return Math.min(1, b); }
  function toolSpeedMultiplier(state, skillId){ var sp = craftToolSpeedMultiplier(state, skillId) - sleightOfHandCraftSpeedBonus(state); if(PHYS_HAND_CRAFT.indexOf(skillId)!==-1) sp -= handStrengthCraftSpeedBonus(state); if(PHYS_ESTATE_CRAFT.indexOf(skillId)!==-1) sp -= coreStrengthCraftSpeedBonus(state); if(PHYS_MENTAL_CRAFT.indexOf(skillId)!==-1) sp -= solvingCraftSpeedBonus(state); return Math.max(0.1, sp); }

  function getPlotSlots(level){ return Math.min(40, 10 + Math.floor(level/100*30)); }

  function plantSeed(plotIndex, seedId){
    var farmLvl = farmingLevel(state);
    if(plotIndex < 0 || plotIndex >= getPlotSlots(farmLvl)) return;
    var plot = state.farmingPlots[plotIndex];
    if(!plot || !isPlotEmpty(plot)) return;
    if(GRAIN_SEED_ITEMS[seedId]){
      var gseed = GRAIN_SEED_ITEMS[seedId];
      if((state.inventory[seedId]||0) <= 0) return;
      if(getLevel(state.xp.grainharvesting) < TIER_LEVELS[gseed.tierIndex]){
        addLog('Your Grain Harvesting level isn\'t high enough to plant ' + gseed.name + ' yet -- requires level ' + TIER_LEVELS[gseed.tierIndex] + '.', 'danger');
        return;
      }
      state.inventory[seedId] -= 1;
      var gCropData = GRAIN_ITEMS['grain_t'+gseed.tierIndex];
      plot.cropType = 'grain';
      plot.tierIndex = gseed.tierIndex;
      plot.plantedAt = Date.now();
      plot.readyAt = Date.now() + gCropData.durationMs;
      addLog('You planted a ' + gseed.name + '.', 'important');
      return;
    }
    if(HERB_SEED_ITEMS[seedId]){
      var hseed = HERB_SEED_ITEMS[seedId];
      if((state.inventory[seedId]||0) <= 0) return;
      if(getLevel(state.xp.herbharvesting) < TIER_LEVELS[hseed.tierIndex]){

      plot.cropType = 'herb';

      plot.plantedAt = Date.now();
      plot.readyAt = Date.now() + hCropData.durationMs;
      addLog('You planted a ' + hseed.name + '.', 'important');
      return;
    }
    var seed = SEED_ITEMS[seedId];
    if(!seed) return;
    if((state.inventory[seedId]||0) <= 0) return;
    if(getLevel(state.xp.fiberharvesting) < TIER_LEVELS[seed.tierIndex]){
      addLog('Your Fiber Harvesting level isn\'t high enough to plant ' + seed.name + ' yet -- requires level ' + TIER_LEVELS[seed.tierIndex] + '.', 'danger');
      return;
    }
    state.inventory[seedId] -= 1;
    var cropData = FARMING_ITEMS['farming_t'+seed.tierIndex];
    plot.cropType = 'fiber';

    plot.readyAt = Date.now() + cropData.durationMs;
    addLog('You planted a ' + seed.name + '.', 'important');

  function harvestPlot(plotIndex){
    var plot = state.farmingPlots[plotIndex];
    if(isPlotEmpty(plot)) return;
    if(Date.now() < plot.readyAt) return;
    var cropData = getCropDataForPlot(plot);
    if(!cropData){
      // Defensive: an unrecognized cropType (e.g. leftover legacy data) should never
      // crash the click handler -- just clear the plot back to empty instead.
      plot.cropType = null;
      plot.tierIndex = -1;
      plot.plantedAt = 0;
      plot.readyAt = 0;
      needsRender = true;
      return;
    }
    addItem(cropData.id, 1);
    addXp(FARMING_CROP_SKILL[plot.cropType] || 'fiberharvesting', cropData.xp);
    addPhysiqueXp(FARMING_PHYSIQUE);
    maybeSummonFamiliar('farming');
    addLog('You harvested ' + cropData.name + '.', 'important');
    spawnFloatingText('+1 ' + cropData.name, 'ft-success');
    plot.cropType = null;
    plot.tierIndex = -1;
    plot.plantedAt = 0;
    plot.readyAt = 0;
  }

  function pickWeightedFarmingTier(){
    var weights = [], total = 0, i;
    for(i=0;i<TIER_COUNT;i++){ var w = Math.pow(0.65, i); weights.push(w); total += w; }
    var r = Math.random()*total;
    for(i=0;i<TIER_COUNT;i++){ r -= weights[i]; if(r<=0) return i; }
    return 0;
  }
  function openTreasureChest(){
    if((state.inventory.treasure_chest||0) <= 0) return;
    state.inventory.treasure_chest -= 1;
    // 1-10000 gold, weighted toward the low end (cubic skew), like the Critter Cache's roll.
    var gold = Math.max(1, Math.min(10000, Math.floor(Math.pow(Math.random(), 3) * 10000) + 1));
    state.gold += gold;
    addLog('You pried open a Treasure Chest and found ' + fmt(gold) + ' gold!', 'important');
    spawnFloatingText('+' + fmt(gold) + ' gold', 'ft-bonus');
    needsRender = true;
  }
  function openCritterCache(){
    if((state.inventory.critter_cache||0) <= 0) return;
    state.inventory.critter_cache -= 1;
    var gained = [];
    for(var i=0;i<3;i++){
      var tierIndex = pickWeightedFarmingTier();
      addItem('seed_t'+tierIndex, 1);
      gained.push(SEED_ITEMS['seed_t'+tierIndex].name);
    }
    addLog('You opened a Critter Cache and found: ' + gained.join(', ') + '.', 'important');
    gained.forEach(function(name){ spawnFloatingText('+1 ' + name, 'ft-bonus'); });
  }

    return {

      name: stackableWeaponTierNames(w)[tierIndex] + ' ' + w.name,
      levelReq: TIER_LEVELS[tierIndex],
      xp: tierXp(25, tierIndex) * (is2h ? 2 : 1),   // two-handed weapons grant twice the crafting XP
      dmgMin: Math.max(1, Math.round(tierStat(2,tierIndex)*handBonus)),
