    html += '<div class="hp-track"><div class="hp-fill" id="charFaithFill" style="width:'+faithPct0+'%;background:var(--cat-faith)"></div></div>';
    html += '<div class="hp-label"><span>Faith</span><span id="charFaithLabel">'+fmt(state.faith)+' / '+faithMaxVal0+'</span></div>';
    html += '<div style="height:8px"></div>';
    var teaOn = isTeaActive();
    var teaPct = teaOn ? clamp((state.activeTea.expiresAt-Date.now())/state.activeTea.durationMs*100,0,100) : 0;
    html += '<div class="hp-track" id="charTeaTrack" style="display:'+(teaOn?'block':'none')+'"><div class="hp-fill" id="charTeaFill" style="width:'+teaPct+'%;background:var(--rarity-rare)"></div></div>';
    html += '<div class="hp-label" id="charTeaLabelRow" style="display:'+(teaOn?'flex':'none')+'"><span id="charTeaName">'+(teaOn?state.activeTea.icon+' '+state.activeTea.name+' (+'+Math.round(state.activeTea.xpBoost*100)+'% XP)':'')+'</span><span id="charTeaLabel">'+(teaOn?formatDuration(state.activeTea.expiresAt-Date.now()):'')+'</span></div>';
    html += '<div style="height:10px"></div>';
    html += '<div class="char-row"><span>Combat Score</span><b id="charCombatScore">'+combatLevelEquivalent(state)+'</b></div>';
    html += '<div class="empty-note" style="font-size:10px;margin-top:-2px;padding-bottom:4px;overflow-wrap:anywhere;">Sum of proficiency levels across everything equipped &mdash; determines which foes you can fight</div>';
    html += '<div style="height:10px"></div>';

    html += '<div class="char-row"><span>Mainhand</span><b>'+weaponStyle.name+(state.equippedMainhand?' <button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipStackableWeapon">Unequip</button>':'')+'</b></div>';
    html += '<div class="char-row" style="margin-top:-4px"><span class="empty-note" style="font-size:10px">'+weapon.name+' &bull; '+weapon.dmgMin+'-'+weapon.dmgMax+' dmg</span></div>';

    var offhandLabel, offhandDetail;
    if(weaponStyle.hand==='2h'){
      offhandLabel = 'Both hands occupied'; offhandDetail = '';
    } else if(offhandStyle && offhandStyle.type==='shield' && offhand){
      offhandLabel = offhandStyle.name; offhandDetail = offhand.name+' &bull; defense '+offhand.defense;
    } else if(offhandStyle && offhandStyle.type==='quiver' && offhand){
      offhandLabel = offhandStyle.name; offhandDetail = offhand.name+' &bull; +'+Math.round(offhand.dmgBonus*100)+'% arrow dmg';
    } else {
      offhandLabel = 'None'; offhandDetail = '';
    }
    html += '<div class="char-row"><span>Offhand</span><b>'+offhandLabel+(offhand&&offhandStyle&&offhandStyle.type==='shield'?' <button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipStackableShield">Unequip</button>':'')+'</b></div>';
    if(offhandDetail) html += '<div class="char-row" style="margin-top:-4px"><span class="empty-note" style="font-size:10px">'+offhandDetail+'</span></div>';

    var relicLabel = 'None', relicDetail = '';
    if(state.equippedRelicTier > 0){
      var equippedRelicId2 = 'relic_t'+(state.equippedRelicTier-1)+'_'+state.equippedRelicRarity;
      var equippedRelicObj = RELIC_ITEMS[equippedRelicId2];
      relicLabel = equippedRelicObj ? equippedRelicObj.name : 'Unknown Relic';
      relicDetail = '+'+Math.round(getEquippedRelicBonus(state)*100)+'% dmg/armor';
    }
    html += '<div class="char-row"><span>Relic</span><b>'+relicLabel+(state.equippedRelicTier>0?' <button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipRelic">Unequip</button>':'')+'</b></div>';
    if(relicDetail) html += '<div class="char-row" style="margin-top:-4px"><span class="empty-note" style="font-size:10px">'+relicDetail+'</span></div>';
    html += '<div style="height:6px"></div>';

    var bodyArmorEquippedCount = BODY_ARMOR_SLOTS.filter(function(s){ return state.bodyArmor[s].tier > 0; }).length;
    var ringEquippedCount = RING_SLOT_IDS.filter(function(s){ return state.jewelrySlots[s].typeId; }).length;
    var amuletEquippedCount = state.jewelrySlots.amulet.tier > 0 ? 1 : 0;
    var totalSlotCount = ARMOR_SLOTS.length + BODY_ARMOR_SLOTS.length + RING_SLOT_IDS.length + 1;
    html += '<div class="char-row char-row-toggle" data-action="toggleArmorPanel"><span>Armor '+(armorPanelExpanded?'▾':'▸')+'</span><b>'+(Math.round(totalArmorDefense*100)/100)+' def ('+(equippedSlots+bodyArmorEquippedCount+ringEquippedCount+amuletEquippedCount)+'/'+totalSlotCount+' slots)</b></div>';
    if(armorPanelExpanded){
      html += '<div class="armor-slot-list">';
      BODY_ARMOR_SLOTS.forEach(function(slot){
        var s = state.bodyArmor[slot];
        var item = (s.tier>0) ? BODY_ARMOR_ITEMS['bodyarmor_'+s.material+'_'+slot+'_t'+(s.tier-1)+'_'+s.rarity] : null;
        html += '<div class="armor-slot-row"><span>'+BODY_ARMOR_ICONS[slot]+' '+BODY_ARMOR_LABELS[slot]+'</span><span class="'+(item?'filled':'empty')+'">'+(item ? item.name+' &bull; '+item.defense+' def' : 'Empty')+'</span>'+(item?'<button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipBodyArmor" data-slot="'+slot+'">Unequip</button>':'')+'</div>';
      });
      ARMOR_SLOTS.forEach(function(slot){
        var tier = state.armorSlots[slot.id]||0;
        var current = getEquippedSlotItem(slot, tier, state.armorRarities[slot.id]);
        html += '<div class="armor-slot-row"><span>'+slot.icon+' '+slot.label+'</span><span class="'+(tier>0?'filled':'empty')+'">'+(tier>0 ? current.name.replace(' '+slot.label,'')+' &bull; '+current.defense+' def' : 'Empty')+'</span></div>';

      RING_SLOT_IDS.forEach(function(slotId, idx){
        var ring = getRingItemInSlot(state, slotId);
        html += '<div class="armor-slot-row"><span>'+svgIcon('ring','#c9a227')+' Ring '+(idx+1)+'</span><span class="'+(ring?'filled':'empty')+'">'+(ring ? ring.name+' &bull; +'+Math.round(ring.dmgBonus*100)+'%' : 'Empty')+'</span>'+(ring?'<button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipRing" data-slot="'+slotId+'">Unequip</button>':'')+'</div>';
      });
      var amuletItem = getEquippedAmuletItem(state);
      html += '<div class="armor-slot-row"><span>'+svgIcon('amulet','#c9a227')+' Amulet</span><span class="'+(amuletItem?'filled':'empty')+'">'+(amuletItem ? amuletItem.name+' &bull; '+amuletItem.defense+' def' : 'Empty')+'</span>'+(amuletItem?'<button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipAmulet">Unequip</button>':'')+'</div>';
      var currentBelt = state.equippedBeltTier>0 ? BELT_ITEMS['belt_t'+(state.equippedBeltTier-1)+'_'+state.equippedBeltRarity] : null;
      html += '<div class="armor-slot-row"><span>'+svgIcon('belt','#8a6a42')+' Belt</span><span class="'+(currentBelt?'filled':'empty')+'">'+(currentBelt ? currentBelt.name+' &bull; '+BELT_RARITY_SLOTS[currentBelt.rarity]+' slots' : 'Empty')+'</span>'+(currentBelt?'<button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipBelt">Unequip</button>':'')+'</div>';
      html += '</div>';
    }

    html += '<div class="char-row char-row-toggle" data-action="toggleToolPanel"><span>Tool '+(toolPanelExpanded?'▾':'▸')+'</span><b>'+gatherToolsEquipped+'/'+GATHER_SKILL_IDS.length+' gathering, '+craftToolsEquipped+'/'+CRAFT_SKILL_IDS.length+' crafting</b></div>';
    if(toolPanelExpanded){
      html += '<div class="armor-slot-list">';
      GATHER_SKILL_IDS.forEach(function(skillId){
        var skill = GATHERING_SKILLS[skillId];
        var tier = state.gatherTools[skillId]||0;
        var current = getEquippedGatherTool(skillId, tier, state.gatherToolRarities[skillId]);
        html += '<div class="armor-slot-row"><span>'+skill.icon+' '+skill.label+'</span><span class="'+(tier>0?'filled':'empty')+'">'+(tier>0 ? current.name+' &bull; +'+Math.round(current.speedBonus*100)+'%' : 'Empty')+'</span>'+(tier>0?'<button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipTool" data-skill="'+skillId+'">Unequip</button>':'')+'</div>';
      });
      CRAFT_SKILL_IDS.forEach(function(skillId){
        var cskill = CRAFTING_SKILLS[skillId];
        var ctier = state.craftTools[skillId]||0;
        var ccurrent = getEquippedCraftTool(skillId, ctier, state.craftToolRarities[skillId]);
        html += '<div class="armor-slot-row"><span>'+cskill.icon+' '+cskill.label+'</span><span class="'+(ctier>0?'filled':'empty')+'">'+(ctier>0 ? ccurrent.name+' &bull; +'+Math.round(ccurrent.speedBonus*100)+'%/'+Math.round(ccurrent.successBonus*100)+'%' : 'Empty')+'</span>'+(ctier>0?'<button class="action-btn stop" style="padding:1px 7px;font-size:10px" data-action="unequipTool" data-skill="'+skillId+'">Unequip</button>':'')+'</div>';
      });
      html += '</div>';
    }

    SKILL_GROUPS.forEach(function(group){
      var groupLvlSum = 0;
      group.skills.forEach(function(sk){ groupLvlSum += getLevel(state.xp[sk]); });
      var groupAvg = (groupLvlSum/group.skills.length).toFixed(1);
      var expanded = !!skillGroupExpanded[group.label];
      html += '<div class="skill-group-header char-row-toggle" style="--group-color:'+group.color+'" data-action="toggleSkillGroup" data-group="'+group.label+'"><span>'+(expanded?'▾':'▸')+' '+group.label+'</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Avg Lv '+groupAvg+'</span></div>';
      if(expanded){
        group.skills.forEach(function(sk){
          var lvl = getLevel(state.xp[sk]);
          var pct = levelProgress(state.xp[sk]);
          var label = SKILL_LABELS[sk] || (sk.charAt(0).toUpperCase()+sk.slice(1));
          html += '<div class="skill-row"><div class="skill-row-top"><span class="sname">'+label+' '+skillInfoBtn(sk)+'</span><span class="slvl" id="slvl-'+sk+'">Lv '+lvl+'</span></div>';
          html += '<div class="mini-track"><div class="mini-fill" id="mfill-'+sk+'" style="width:'+pct+'%"></div></div></div>';
        });
      }
    });

    var physAvg = physiqueAvgLevel(state);
    var physSpeedPct = Math.round((1-speedMultiplier(state))*100);
    html += '<div class="skill-group-header char-row-toggle" style="--group-color:var(--cat-physique)" data-action="togglePhysiquePanel"><span>'+(physiquePanelExpanded?'▾':'▸')+' Physique</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Avg Lv '+physAvg.toFixed(1)+'</span></div>';
    html += '<div class="empty-note" style="margin:-2px 0 6px">+'+physSpeedPct+'% overall action speed &bull; each Physique also has its own specific effect (tap ? )</div>';
    if(physiquePanelExpanded){
      PHYSIQUE_SKILLS.forEach(function(p){
        var lvl = getLevel(state.physique[p.id]||0);
        var pct = levelProgress(state.physique[p.id]||0);
        html += '<div class="skill-row"><div class="skill-row-top"><span class="sname">'+p.icon+' '+p.name+' '+skillInfoBtn(p.id)+'</span><span class="slvl" id="cp-plvl-'+p.id+'">Lv '+lvl+'</span></div>';
        html += '<div class="mini-track"><div class="mini-fill" id="cp-pfill-'+p.id+'" style="width:'+pct+'%;background:var(--cat-physique)"></div></div></div>';
      });
    }

    var maxCraftSlotsSidebar = getMaxCraftSlots(state);
    if(maxCraftSlotsSidebar > 1){
      html += '<div class="skill-group-header" style="--group-color:var(--gold)">Craft Slots</div>';
      var usedSlots = (state.activity.type==='craft' ? 1 : 0) + state.extraCraftSlots.filter(function(s){ return s.type==='craft'; }).length;
      html += '<div class="empty-note" style="margin:-2px 0 6px">'+usedSlots+' / '+maxCraftSlotsSidebar+' in use (Belt + Logic)</div>';
      state.extraCraftSlots.forEach(function(s, idx){
        if(s.type !== 'craft') return;
        var r = ALL_CRAFT_RECIPES[s.itemId];
        html += '<div class="char-row"><span>'+(r?r.name:s.itemId)+'</span><button class="action-btn stop" style="padding:2px 8px;font-size:10px" data-action="stopExtraSlot" data-slot="'+idx+'">Stop</button></div>';
      });
    }

    document.getElementById('characterPanel').innerHTML = html;
  }

  function getEquipActionForItem(itemId){
    if(itemId.indexOf('tool_')===0) return 'equipTool';
    if(itemId.indexOf('stweapon_')===0) return 'equipStackableWeapon';
    if(itemId.indexOf('stshield_')===0) return 'equipStackableShield';
    if(itemId.indexOf('bodyarmor_')===0) return 'equipBodyArmor';
    if(itemId.indexOf('belt_t')===0) return 'equipBelt';
    if(itemId.indexOf('relic_t')===0) return 'equipRelic';
    if(itemId.indexOf('ring_')===0) return 'equipRing';
    if(itemId.indexOf('amulet_t')===0) return 'equipAmulet';
    return null;
  }
  // Inventory is grouped into 4 broad buckets. Equipment is anything equip-able
  // (reuses the same prefix logic as getEquipActionForItem above); Estate is anything
  // whose primary purpose is terraforming/building (Paving Tiles, Masonry); Gathering is
  // raw/natural material -- the 8 gather skills' own outputs, their side-drops, Farming's
  // grown crops, and combat loot; everything else (cooked meals, potions, teas, bricks,
  // dough, twine, etc.) falls through to Crafting.
  var INVENTORY_CATEGORIES = [
    {id:'gathering', label:'Gathering', icon:svgIcon('chest','var(--cat-gathering)')},
    {id:'crafting',  label:'Crafting',  icon:svgIcon('hammer','var(--cat-crafting)')},
    {id:'estate',    label:'Estate',    icon:svgIcon('castle','var(--cat-estate)')},
    {id:'equipment', label:'Equipment', icon:svgIcon('shield','var(--gold)')}
  ];
  var GATHER_BUCKET_PREFIXES = ['digging_t','forestry_t','mining_t','fishing_t','herbalism_t','botany_t','foraging_t','butchering_t',
    'muddyartifact_t','brokenrelic_t','powder_t','seed_t','grainseed_t','herbseed_t','farming_t','grain_t','herb_t','corpse_t','gem_'];
  function getInventoryCategory(itemId){
    if(getEquipActionForItem(itemId)) return 'equipment';
    if(itemId.indexOf('paving_t')===0 || itemId.indexOf('masonry_t')===0) return 'estate';
    if(itemId==='coal' || itemId==='critter_cache' || itemId==='treasure_chest') return 'gathering';
    for(var i=0;i<GATHER_BUCKET_PREFIXES.length;i++){
      if(itemId.indexOf(GATHER_BUCKET_PREFIXES[i])===0) return 'gathering';
    }

  }
  var inventorySearchQuery = '';
  var inventoryCategoryExpanded = {};
  function renderInventoryPanel(){
    var searchInputEl = document.getElementById('invSearchInput');
    var hadFocus = searchInputEl && document.activeElement === searchInputEl;
    var cursorPos = hadFocus ? searchInputEl.selectionStart : null;

    var html = '<h3>Inventory</h3>';
    html += '<input type="text" id="invSearchInput" class="inv-search" placeholder="Search inventory..." value="'+inventorySearchQuery.replace(/"/g,'&quot;')+'">';

    var rows = [];
    Object.keys(ALL_SELLABLE).forEach(function(id){
      var qty = state.inventory[id]||0;
      if(qty>0) rows.push({item:ALL_SELLABLE[id], qty:qty});
    });

    function renderRow(r){
      var isLocked = !!state.lockedItems[r.item.id];
      var h = '<div class="inv-row" data-item="'+r.item.id+'"><div class="inv-left"><span>'+r.item.icon+'</span><span class="nm">'+r.item.name+'</span> <span class="cnt" id="invCnt-'+r.item.id+'">x'+fmt(r.qty)+'</span></div>';
      h += '<div style="display:flex;gap:6px">';
      h += '<button class="sell-btn lock-btn'+(isLocked?' locked-on':'')+'" data-action="toggleItemLock" data-item="'+r.item.id+'" title="'+(isLocked?'Unlock':'Lock')+'">'+svgIcon('lock', isLocked?'var(--gold)':'var(--text-faint)')+'</button>';
      if(r.item.id==='critter_cache'){
        h += '<button class="sell-btn" data-action="openCritterCache">Open</button>';
      }
      if(r.item.id==='treasure_chest'){
        h += '<button class="sell-btn" data-action="openTreasureChest">Open</button>';
      }
      var equipAction = getEquipActionForItem(r.item.id);
      if(equipAction){
        h += '<button class="sell-btn" data-action="'+equipAction+'" data-item="'+r.item.id+'">Equip</button>';
      }
      h += '<button class="sell-btn" data-action="sell" data-item="'+r.item.id+'"'+(isLocked?' disabled title="Locked"':'')+'>Sell '+r.item.sell+'g</button>';
      h += '</div></div>';
      return h;
    }

    if(rows.length===0){
      html += '<div class="empty-note">Nothing collected yet.</div>';
    } else {
      var query = inventorySearchQuery.trim().toLowerCase();
      if(query){
        // Search bypasses category grouping entirely -- straight to matching results.
        var matches = rows.filter(function(r){ return r.item.name.toLowerCase().indexOf(query) !== -1; });
        html += '<div class="empty-note" style="margin:6px 0 8px">'+matches.length+' result'+(matches.length===1?'':'s')+'</div>';
        if(matches.length===0){
          html += '<div class="empty-note">No items match "'+inventorySearchQuery+'".</div>';
        } else {
          html += '<div class="inv-list">';
          matches.forEach(function(r){ html += renderRow(r); });
          html += '</div>';
        }
      } else {
        INVENTORY_CATEGORIES.forEach(function(cat){
          var catRows = rows.filter(function(r){ return getInventoryCategory(r.item.id) === cat.id; });
          if(catRows.length===0) return;
          var expanded = !!inventoryCategoryExpanded[cat.id];
          html += '<div class="skill-group-header char-row-toggle" style="--group-color:var(--gold)" data-action="toggleInventoryCategory" data-cat="'+cat.id+'"><span>'+(expanded?'▾':'▸')+' '+cat.icon+' '+cat.label+'</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">'+catRows.length+' item'+(catRows.length===1?'':'s')+'</span></div>';
          if(expanded){
            html += '<div class="inv-list">';
            catRows.forEach(function(r){ html += renderRow(r); });
            html += '</div>';
          }
        });
      }
    }
    document.getElementById('inventoryPanel').innerHTML = html;

    if(hadFocus){
      var newInput = document.getElementById('invSearchInput');
      if(newInput){
        newInput.focus();
        if(cursorPos !== null) newInput.setSelectionRange(cursorPos, cursorPos);
      }
    }
  }

  var lastRenderedLogVersion = -1;
  function renderLogPanel(){
    var oldList = document.querySelector('#logPanel .log-list');
    var wasNearBottom = true;
    if(oldList){
      var distanceFromBottom = oldList.scrollHeight - oldList.scrollTop - oldList.clientHeight;
      wasNearBottom = distanceFromBottom < 30;
    }
    var html = '<h3>Chronicle</h3><div class="log-list">';
    state.log.slice(-40).forEach(function(entry){
      html += '<div class="log-entry '+entry.cls+'">'+entry.msg+'</div>';
    });
    html += '</div>';
    document.getElementById('logPanel').innerHTML = html;
    var newList = document.querySelector('#logPanel .log-list');
    if(newList){
      if(wasNearBottom){
        newList.scrollTop = newList.scrollHeight; // keep newest entries in view as they post
      } else if(oldList){
        newList.scrollTop = oldList.scrollTop; // respect a deliberate scroll-up into history
      }
    }
    lastRenderedLogVersion = logVersion;
  }

  // Display info for a concurrent (non-primary) craft slot -- mirrors the effTime formula
  // the loop uses to advance it, so the header bar tracks the same progress.
  function extraCraftSlotInfo(slot){
    if(slot.craftKind){
      var d = getSpecialTierData(slot), sk = getSpecialSkillId(slot);
      return { name: d?d.name:slot.craftKind, icon: svgIcon('hammer','var(--cat-crafting)'),
        effTime: d ? d.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, sk) : 1000, progress: slot.progress||0 };
    }
    var r = ALL_CRAFT_RECIPES[slot.itemId];
    return { name: r?r.name:slot.itemId, icon: r?r.icon:svgIcon('hammer','var(--cat-crafting)'),
      effTime: r ? r.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, slot.skill) : 1000, progress: slot.progress||0 };
  }
  function activeExtraCraftSlots(){
    var out = [];
    for(var i=0;i<state.extraCraftSlots.length;i++){
      var s = state.extraCraftSlots[i];
      if(s && s.type==='craft') out.push({ idx:i, slot:s });
    }
    return out;
  }
  // Compact progress bars for concurrent craft tasks running alongside the primary action.
  function gabExtraTasksHtml(){
    var extras = activeExtraCraftSlots();
    if(!extras.length) return '';
    var html = '<div class="gab-extra-tasks"><div class="gab-extra-title">Also crafting &bull; '+extras.length+'</div>';
    extras.forEach(function(e){
      var info = extraCraftSlotInfo(e.slot);
      var pct = clamp(info.progress/info.effTime*100, 0, 100);
      html += '<div class="gab-extra-row"><span class="gab-extra-name">'+info.icon+' '+escapeHtml(info.name)+'</span>';
      html += '<div class="gab-extra-track"><div class="gab-extra-fill" id="gabExtraFill-'+e.idx+'" style="width:'+pct+'%"></div></div></div>';
    });
    return html + '</div>';
  }

  function updateGlobalActionBarLive(){

  // Lightweight per-tick refresh: only touches text/width of existing
  // elements, never rebuilds buttons, so it can never eat a click in progress.
  function updateDynamic(){
    updateHeader();
    updateGlobalActionBarLive();
    updateGuildEstateLive();
    updateGuildBossLive();

    if(state.activity.type==='gather' || state.activity.type==='craft'){
      var fill = document.getElementById('liveActionFill');
      if(fill){
        if(state.activity.type==='craft' && state.activity.craftKind){
          var specialData = getSpecialTierData(state.activity);
          if(specialData){
            var specialSkill = getSpecialSkillId(state.activity);
            var effTimeSpecial2 = specialData.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, specialSkill);
            fill.style.width = clamp(state.activity.progress/effTimeSpecial2*100,0,100) + '%';
          }
        } else {
          var conf = state.activity.type==='gather' ? ALL_GATHER_ITEMS[state.activity.itemId] : ALL_CRAFT_RECIPES[state.activity.itemId];
          if(conf){
            var toolMult = state.activity.type==='craft' ? toolSpeedMultiplier(state, state.activity.skill) : gatherToolSpeedMultiplier(state, state.activity.skill);
            var effTime = conf.time*1000*speedMultiplier(state)*toolMult;
            fill.style.width = clamp(state.activity.progress/effTime*100,0,100) + '%';
          }
        }
      }
    }

    state.extraCraftSlots.forEach(function(slot, idx){
      if(slot.type !== 'craft') return;
      var extraFill = document.getElementById('extraSlotFill-'+idx);
      if(!extraFill) return;
      if(slot.craftKind){
        var extraSpecialData = getSpecialTierData(slot);
        if(extraSpecialData){
          var extraSpecialSkill = getSpecialSkillId(slot);
          var effTimeExtraSpecial = extraSpecialData.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, extraSpecialSkill);
          extraFill.style.width = clamp(slot.progress/effTimeExtraSpecial*100,0,100) + '%';
        }
      } else {
        var recipe = ALL_CRAFT_RECIPES[slot.itemId];
        if(recipe){
          var effTimeExtra = recipe.time*1000*speedMultiplier(state)*toolSpeedMultiplier(state, slot.skill);
          extraFill.style.width = clamp(slot.progress/effTimeExtra*100,0,100) + '%';
        }
      }
    });

    if(currentCategory==='farming'){
      var farmLvl = farmingLevel(state);
      var unlockedPlots = getPlotSlots(farmLvl);
      for(var pi=0; pi<unlockedPlots; pi++){
        var plot = state.farmingPlots[pi];
        if(isPlotEmpty(plot)) continue;
        var remainingMs = plot.readyAt - Date.now();
        if(remainingMs <= 0){
          if(!plot._readyRendered){ plot._readyRendered = true; needsRender = true; }
          continue;
        }
        plot._readyRendered = false;
        var timerEl = document.getElementById('plot-timer-'+pi);
        if(timerEl) timerEl.textContent = 'Ready in ' + formatDuration(remainingMs);
        var fillEl = document.getElementById('plot-fill-'+pi);
        if(fillEl){
          var cropDataLive = getCropDataForPlot(plot);
          if(cropDataLive){
            fillEl.style.width = clamp((cropDataLive.durationMs-remainingMs)/cropDataLive.durationMs*100,0,100) + '%';
          }
        }
      }
    }

    if(state.activity.type==='pray'){
      var prayerTierD = PRAYER_TIERS.filter(function(t){ return t.id===state.activity.itemId; })[0];
      var prayFill = document.getElementById('liveActionFill');
      if(prayFill && prayerTierD){
        var effTimeP2 = prayerTierD.time*1000*speedMultiplier(state);
        prayFill.style.width = clamp(state.activity.progress/effTimeP2*100,0,100) + '%';
      }
    }

    if(currentCategory==='estate' && state.estate && state.estate.job){
      var ejob = state.estate.job;
      var ejNow = Date.now();
      var ejFill = document.getElementById('estateJobFill');
      if(ejFill) ejFill.style.width = clamp((ejNow-ejob.startAt)/(ejob.readyAt-ejob.startAt)*100,0,100) + '%';
      var ejTimer = document.getElementById('estateJobTimer');
      if(ejNow >= ejob.readyAt){
        // Timer elapsed while the estate tab is open -- flag a rebuild so the completed
        // job's rewards (applied by processEstateJob) show up and the panel refreshes.
        if(ejTimer) ejTimer.textContent = 'Finishing\u2026';
        needsRender = true;
      } else if(ejTimer){
        ejTimer.textContent = 'Finishes in ' + formatDuration(ejob.readyAt - ejNow);
      }
    }

    var faithFill = document.getElementById('faithBarFill');
    var faithLabelEl = document.getElementById('faithBarLabel');
    var charFaithFill = document.getElementById('charFaithFill');
    var charFaithLabelEl = document.getElementById('charFaithLabel');
    var faithMaxVal = faithMax(state);
    var faithPctNow = clamp(state.faith/faithMaxVal*100,0,100);
    if(faithFill) faithFill.style.width = faithPctNow + '%';
    if(faithLabelEl) faithLabelEl.textContent = fmt(state.faith) + ' / ' + faithMaxVal;
    if(charFaithFill) charFaithFill.style.width = faithPctNow + '%';
    if(charFaithLabelEl) charFaithLabelEl.textContent = fmt(state.faith) + ' / ' + faithMaxVal;

    var teaTrack = document.getElementById('charTeaTrack');
    var teaLabelRow = document.getElementById('charTeaLabelRow');
    var teaFill = document.getElementById('charTeaFill');
    var teaNameEl = document.getElementById('charTeaName');
    var teaLabelEl = document.getElementById('charTeaLabel');
    var teaTabTimerEl = document.getElementById('teaTabTimer');
    if(isTeaActive()){
      var teaRemainingMs = state.activeTea.expiresAt - Date.now();
      var teaPctNow = clamp(teaRemainingMs/state.activeTea.durationMs*100,0,100);
      if(teaTrack) teaTrack.style.display = 'block';
      if(teaLabelRow) teaLabelRow.style.display = 'flex';
      if(teaFill) teaFill.style.width = teaPctNow + '%';
      if(teaNameEl) teaNameEl.textContent = state.activeTea.icon + ' ' + state.activeTea.name + ' (+' + Math.round(state.activeTea.xpBoost*100) + '% XP)';
      if(teaLabelEl) teaLabelEl.textContent = formatDuration(teaRemainingMs);
      if(teaTabTimerEl) teaTabTimerEl.textContent = formatDuration(teaRemainingMs);
    } else {
      if(teaTrack && teaTrack.style.display !== 'none'){ teaTrack.style.display = 'none'; needsRender = true; }
      if(teaLabelRow) teaLabelRow.style.display = 'none';
    }

    if(state.activity.type==='combat'){
      var m = MONSTERS.filter(function(x){return x.id===state.activity.monsterId;})[0];
      var mf = document.getElementById('arenaMonsterFill');
      var ml = document.getElementById('arenaMonsterLabel');
      if(mf && m){

    var maxHpVal2 = maxHp(state);

      var chPct = clamp(state.playerHp/maxHpVal2*100,0,100);
      charHpFill.style.width = chPct+'%';
      charHpFill.style.background = chPct>50?'var(--hp-good)':chPct>20?'var(--hp-mid)':'var(--hp-bad)';

    STACKABLE_WEAPON_TYPES.forEach(function(w){

      for(var mi=0; mi<w.tierCount; mi++){ if(TIER_LEVELS[mi] <= skillLvl) maxUnlocked = mi; }
      var sel = Math.min(selectedMeleeWeaponTier[w.id]||0, maxUnlocked);
      var data = getStackableWeaponTierData(w.id, sel);
      Object.keys(data.inputs).forEach(function(k){
        var el = document.getElementById('inp-stw-'+w.id+'-'+k);
        if(el){
          var have = state.inventory[k]||0;
          var need = data.inputs[k];
          var name = (ALL_SELLABLE[k]||{}).name || k;

    STACKABLE_SHIELD_TYPES.forEach(function(s){

      var shieldMaxUnlocked = 0;
      for(var smi=0; smi<s.tierCount; smi++){ if(TIER_LEVELS[smi] <= shieldSkillLvl) shieldMaxUnlocked = smi; }
      var shieldSel = Math.min(selectedShieldTier[s.id]||0, shieldMaxUnlocked);
      var shieldData = getStackableShieldTierData(s.id, shieldSel);
      Object.keys(shieldData.inputs).forEach(function(k){

          var need = shieldData.inputs[k];

          el.className = have>=need ? 'ok' : 'bad';
        }

      if(sBtn) sBtn.disabled = !(shieldSkillLvl >= shieldData.levelReq && hasInputs(shieldData.inputs));
    });

    // Quiver: owned counts + ok/bad state + Forge button availability (still sequential)
    var shieldsmithLvl = getLevel(state.xp.shieldsmithing);
    OFFHAND_STYLES.filter(function(o){ return !o.stackable; }).forEach(function(o){
      var tier = state.offhandTiers[o.id]||0;

      var nextData = OFFHAND_TYPE_RECIPES[o.id][tier];

      if(oBtn) oBtn.disabled = !(shieldsmithLvl >= nextData.levelReq && hasInputs(nextData.inputs));
    });

    // Armorsmithing: owned counts + ok/bad state + Forge button availability for each of the 15 slots
    var armorLvl = getLevel(state.xp.armorsmithing);
    ARMOR_SLOTS.forEach(function(slot){

  document.getElementById('app').addEventListener('keydown', function(e){
    if(e.key !== 'Enter' || !e.target) return;
    if(e.target.id === 'chatInput'){ e.preventDefault(); if(currentCategory==='chat' && chatChannel==='guild') guildChatSend(); else chatSend(); }
    else if(e.target.id === 'authUsername' || e.target.id === 'authPassword' || e.target.id === 'authConfirm'){ e.preventDefault(); authSubmit(); }
  });

  document.getElementById('app').addEventListener('input', function(e){
    if(e.target.id === 'invSearchInput'){
      inventorySearchQuery = e.target.value;
      renderInventoryPanel();
    }
  });

  document.getElementById('app').addEventListener('change', function(e){
    if(e.target && e.target.id === 'lbMetricSelect'){
      leaderboardMetric = e.target.value; render(); return;
    }
    var toolSel = e.target.closest('[data-action="selectToolTier"]');
    if(toolSel){
      selectedToolTier[toolSel.getAttribute('data-skill')] = parseInt(toolSel.value, 10);
      render();
      return;
    }
    var armorSel = e.target.closest('[data-action="selectBodyArmorTier"]');
    if(armorSel){
      var key = armorSel.getAttribute('data-material')+'_'+armorSel.getAttribute('data-slot');
      selectedBodyArmorTier[key] = parseInt(armorSel.value, 10);
      render();
      return;
    }
    var shaftSel = e.target.closest('[data-action="selectShaftLogTier"]');
    if(shaftSel){
      selectedShaftLogTier = parseInt(shaftSel.value, 10);
      render();
      return;
    }
    var beltSel = e.target.closest('[data-action="selectBeltTier"]');
    if(beltSel){
      selectedBeltTier = parseInt(beltSel.value, 10);
      render();
      return;
    }
    var meleeSel = e.target.closest('[data-action="selectMeleeWeaponTier"]');
    if(meleeSel){
      selectedMeleeWeaponTier[meleeSel.getAttribute('data-type')] = parseInt(meleeSel.value, 10);
      render();
      return;
    }
    var shieldSel = e.target.closest('[data-action="selectShieldTier"]');
    if(shieldSel){
      selectedShieldTier[shieldSel.getAttribute('data-type')] = parseInt(shieldSel.value, 10);
      render();
      return;
    }
    var ringSel = e.target.closest('[data-action="selectRingTier"]');
    if(ringSel){
      selectedRingTier[ringSel.getAttribute('data-type')] = parseInt(ringSel.value, 10);
      render();
      return;
    }
    var amuletSel = e.target.closest('[data-action="selectAmuletTier"]');
    if(amuletSel){
      selectedAmuletTier = parseInt(amuletSel.value, 10);
      render();
      return;
    }
  });

  // ================= MAIN LOOP =================
  var lastTick = Date.now();
  function loop(){
    var now = Date.now();
    var dt = now - lastTick;
    if(dt > 60000) dt = 60000;
    lastTick = now;

    ensureCraftSlotCapacity();
    state.extraCraftSlots.forEach(function(slot){ processCraftActivity(slot, dt); });

    // Estate terraforming runs entirely in the background, independent of state.activity,
    // so it keeps progressing (and can finish) no matter what the player is actively doing.
    processEstateJob();

    // Meditation is trained purely by being completely idle -- no gathering, crafting,
    // combat, faith activity or background craft slot running.
    var _medIdle = !state.activity.type
      && !(state.faithActivity && state.faithActivity.type)
      && !state.extraCraftSlots.some(function(sl){ return sl.type==='craft'; });
    if(_medIdle){
      state._medAccum = (state._medAccum||0) + dt;
      while(state._medAccum >= 3000){ state._medAccum -= 3000; addPhysiqueXp([['meditation',1]]); }
    } else {
      state._medAccum = 0;
    }

    // HP regenerates passively at a fixed rate no matter what you're doing --
    // gathering, crafting, praying, or mid-fight -- capping at max HP. The only way
    // back to full HP faster than this slow trickle is eating food.
    if(state.playerHp < maxHp(state)){
      state._regenAccum = (state._regenAccum||0) + dt;
      if(state._regenAccum >= 15000){
        state._regenAccum -= 15000;
        state.playerHp = Math.min(maxHp(state), state.playerHp + 1);
      }
    }

    if(state.activity.type==='gather'){
      var item = ALL_GATHER_ITEMS[state.activity.itemId];
      state.activity.progress += dt;
      var effTime = item.time*1000*speedMultiplier(state)*gatherToolSpeedMultiplier(state, state.activity.skill)*(PHYS_LONG_GATHER.indexOf(state.activity.skill)!==-1?(1-enduranceGatherSpeedBonus(state)):1);
      while(state.activity.type==='gather' && state.activity.progress >= effTime){
        state.activity.progress -= effTime;
        bumpStat('gathered');
        addXp(state.activity.skill, item.xp * (1 + curiosityGatherXpBonus(state)));
        if(state.activity.skill === 'digging'){
          processDiggingRoll(state.activity.itemId);
        } else if(state.activity.skill === 'mining'){
          processMiningRoll(state.activity.itemId);
        } else if(state.activity.skill === 'fishing'){
          processFishingRoll(state.activity.itemId);
        } else {
          addItem(state.activity.itemId, 1);
          spawnFloatingText('+1 ' + item.name, 'ft-success');
          if(state.activity.skill === 'forestry'){
            maybeDropCritterCache();
          } else if(SEED_DROP_SKILLS.indexOf(state.activity.skill) !== -1){
            maybeDropSeed(state.activity.skill, parseInt(state.activity.itemId.split('_t')[1], 10));
          }
          if(state.activity.skill === 'herbalism'){
            maybeDropGrainSeed(parseInt(state.activity.itemId.split('_t')[1], 10));
            maybeDropHerbSeed(parseInt(state.activity.itemId.split('_t')[1], 10));
          }
          if(state.activity.skill === 'foraging'){
            maybeDropPowder(parseInt(state.activity.itemId.split('_t')[1], 10));
            maybeDropForagingArtifact(parseInt(state.activity.itemId.split('_t')[1], 10));
          }
        }
        addPhysiqueXp(GATHER_PHYSIQUE[state.activity.skill]);
        maybeSummonFamiliar(state.activity.skill);
        effTime = item.time*1000*speedMultiplier(state)*gatherToolSpeedMultiplier(state, state.activity.skill)*(PHYS_LONG_GATHER.indexOf(state.activity.skill)!==-1?(1-enduranceGatherSpeedBonus(state)):1);
      }
    } else if(state.activity.type==='craft'){
      processCraftActivity(state.activity, dt);
    } else if(state.activity.type==='pray'){
      var prayerTier = PRAYER_TIERS.filter(function(t){ return t.id===state.activity.itemId; })[0];
      state.activity.progress += dt;
      var effTimeP = prayerTier.time*1000*speedMultiplier(state);
      while(state.activity.type==='pray' && state.activity.progress >= effTimeP){
        state.activity.progress -= effTimeP;
        addXp('prayer', prayerTier.xp);
        addPhysiqueXp([['focus',3]]);
        maybeSummonFamiliar('prayer');
        effTimeP = prayerTier.time*1000*speedMultiplier(state);
      }
    } else if(state.activity.type==='combat'){
      state.activity.tickAccum += dt;
      var attackIntervalMs = getWeaponStyle(state.equippedMainhand).attackSpeed * 1000;
      while(state.activity.tickAccum >= attackIntervalMs && state.activity.type==='combat'){
        state.activity.tickAccum -= attackIntervalMs;
        playerAttackTick();
        attackIntervalMs = getWeaponStyle(state.equippedMainhand).attackSpeed * 1000;
      }
      if(state.activity.type==='combat'){
        var monsterForSpeed = MONSTERS.filter(function(x){return x.id===state.activity.monsterId;})[0];
        var monsterIntervalMs = (monsterForSpeed ? monsterForSpeed.attackSpeed : 3) * 1000 * (1 + getFamiliarEnemySlowPct());
        state.activity.monsterTickAccum = (state.activity.monsterTickAccum||0) + dt;
        while(state.activity.monsterTickAccum >= monsterIntervalMs && state.activity.type==='combat'){
          state.activity.monsterTickAccum -= monsterIntervalMs;
          monsterAttackTick();
          monsterIntervalMs = (monsterForSpeed ? monsterForSpeed.attackSpeed : 3) * 1000 * (1 + getFamiliarEnemySlowPct());
        }
        // Poison from the active companion chips away at the monster, but never lands
        // the finishing blow itself -- the player's own attack always gets that credit.
        var poisonDps = getFamiliarPoisonDps();
        if(poisonDps > 0 && state.activity.type==='combat'){
          state.activity.monsterHp = Math.max(1, state.activity.monsterHp - poisonDps*dt/1000);
        }
        // Familiar spell casting: one spell every 10 seconds, cycling through its list.
        if(state.activeCompanion && FAMILIAR_DATA[state.activeCompanion]){
          state.familiarCastAccum = (state.familiarCastAccum||0) + dt;
          while(state.familiarCastAccum >= 10000){
            state.familiarCastAccum -= 10000;
            var companionSpells = FAMILIAR_DATA[state.activeCompanion].spells;
            castFamiliarSpell(companionSpells[state.familiarCastIndex % companionSpells.length], getFamiliarLevel(state.activeCompanion));
            state.familiarCastIndex = (state.familiarCastIndex + 1) % companionSpells.length;
            needsRender = true;   // refresh the spell-cycle highlight in the combat UI
          }
        }
      }
    }

    autoEatCheck();

    if(state.faithActivity && state.faithActivity.type){
      var favData = FAITH_ACTIVITY_TIERS[state.faithActivity.type][state.faithActivity.tier];
      if(favData){
        state.faith = Math.max(0, state.faith - favData.faithPerSec*dt/1000);
        addXp(state.faithActivity.type, favData.xpPerSec*dt/1000);
        state._faithFamiliarAccum = (state._faithFamiliarAccum||0) + dt;
        while(state._faithFamiliarAccum >= 1000){
          state._faithFamiliarAccum -= 1000;
          maybeSummonFamiliar(state.faithActivity.type);
          addPhysiqueXp([['focus',1]]);
        }
        if(state.faith <= 0){
          addLog('Your ' + state.faithActivity.type + ' faded as your Faith ran dry.', 'danger');
          state.faithActivity = { type:null, tier:0 };
          needsRender = true;
        }
      }
    }

    saveAccum += dt;
    if(saveAccum >= 4000){
      saveAccum = 0;
      saveGame();
      profileSync();
      cloudSave();
    }

    if(needsRender){
      needsRender = false;
      render();
    } else {
      updateDynamic();
    }
    requestAnimationFrame(loop);
  }

  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState==='hidden'){ saveGame(); cloudSave(false, true); }
  });

  // ================= ONLINE-ONLY BOOT =================
  // The game requires a signed-in account; the save lives only in the backend. Boot restores
  // the session first: if signed in, load the save from the server and start; otherwise show
  // a login gate and start only after a successful sign-in.
  var gameStarted = false;
  async function onlineAuthInit(){
    if(!CHAT_ENABLED) return;
    try{
      if(!window.supabase){ await chatLoadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'); }
      if(!chatClient){ chatClient = window.supabase.createClient(CHAT_CONFIG.supabaseUrl, CHAT_CONFIG.supabaseAnonKey); }
      var res = await chatClient.auth.getSession();
      var sess = res.data && res.data.session;
      if(sess && sess.user){ authUser = { username: (sess.user.user_metadata && sess.user.user_metadata.username) || 'player', id: sess.user.id }; }
    }catch(e){}
  }
  function renderLoginGate(){
    var app = document.getElementById('app');
    var gate = document.getElementById('loginGate');
    if(!gate){
      gate = document.createElement('div');
      gate.id = 'loginGate';
      gate.style.cssText = 'position:fixed;inset:0;z-index:9998;display:flex;align-items:center;justify-content:center;background:var(--paper);padding:24px;overflow:auto;';
      app.appendChild(gate);
    }
    gate.innerHTML = '<div style="max-width:380px;width:100%;text-align:center;">'
      + '<div style="font-family:var(--font-display);font-weight:700;font-size:28px;color:var(--gold);letter-spacing:1.5px;margin-bottom:6px;">Fantasy Frontiers</div>'
      + '<div style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">Sign in to play &mdash; your adventure is saved to your account and follows you across every device.</div>'
      + '<div style="text-align:left;">' + renderAuthPanel() + '</div>'
      + '</div>';
  }
  function removeLoginGate(){
    var gate = document.getElementById('loginGate');
    if(gate && gate.parentNode) gate.parentNode.removeChild(gate);
  }
  async function startGameOnline(){
    removeLoginGate();
    await initGame();                 // readSave() now fetches this account's save from the backend
    if(!gameStarted){
      gameStarted = true;
      lastTick = Date.now();
      requestAnimationFrame(loop);
    }
    chatInit();                       // chat + chronicle subscriptions
    profileSync(true); leaderboardFetch(true);
  }
  (async function onlineBoot(){
    await onlineAuthInit();
    if(authUser && authUser.id){
      // A session was restored. Only auto-login if the player opted in; otherwise sign out
      // and show the gate (their remembered username still autofills).
      var autoOn = (function(){ try{ return localStorage.getItem('ff-autologin') !== '0'; }catch(e){ return true; } })();
      if(autoOn){ await startGameOnline(); return; }
      try{ if(chatClient && chatClient.auth) await chatClient.auth.signOut(); }catch(e){}
      authUser = null;
    }
    renderLoginGate();
  })();
})();
</script>
