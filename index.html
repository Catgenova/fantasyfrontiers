  function describeSpell(spell, level){
    var potency = familiarPotencyMult(level||1);
    if(spell.type==='heal') return 'Restores '+Math.round(spell.amount*potency)+' HP';
    if(spell.type==='armorBuff') return 'x'+(Math.round((1+(spell.mult-1)*potency)*100)/100)+' player armor for '+(spell.durationMs/1000)+'s';
    if(spell.type==='damageBuff') return '+'+Math.round((spell.mult-1)*potency*100)+'% player damage for '+(spell.durationMs/1000)+'s';
    if(spell.type==='slowEnemy') return 'Slows enemy attack speed by '+Math.round(Math.min(0.9,spell.pct*potency)*100)+'% for '+(spell.durationMs/1000)+'s';
    if(spell.type==='weakenEnemy') return 'Reduces enemy damage by '+Math.round(Math.min(0.9,spell.pct*potency)*100)+'% for '+(spell.durationMs/1000)+'s';
    if(spell.type==='poison') return 'Deals '+(Math.round(spell.dps*potency*10)/10)+' dmg/s to the enemy for '+(spell.durationMs/1000)+'s';
    return '';
  }

  function estateMigrateOldGridToNew(oldEstate){
    var newGrid = generateEstateGrid();
    var newEdges = generateEstateEdges();
    var OFF = ESTATE_CORE_OFFSET;
    for(var x=0; x<ESTATE_CORE_SIZE; x++){
      for(var y=0; y<ESTATE_CORE_SIZE; y++){
        var oldCell = oldEstate.grid[x][y];
        newGrid[x+OFF][y+OFF] = {
          height: oldCell.height,
          buildingId: oldCell.buildingId!==undefined ? oldCell.buildingId : null,
          type: typeof oldCell.type==='string' ? oldCell.type : 'dirt',
          paveTileId: oldCell.paveTileId!==undefined ? oldCell.paveTileId : null,
          owned: true,
          obstacle: null
        };
      }
    }
    if(oldEstate.edgesY){
      for(var ex=0; ex<ESTATE_CORE_SIZE; ex++){
        for(var ey=0; ey<=ESTATE_CORE_SIZE; ey++){
          var oldE = oldEstate.edgesY[ex] && oldEstate.edgesY[ex][ey];
          if(oldE) newEdges.edgesY[ex+OFF][ey+OFF] = { type: oldE.type||null, masonryTileId: oldE.masonryTileId||null };
        }
      }
    }
    if(oldEstate.edgesX){
      for(var ex2=0; ex2<=ESTATE_CORE_SIZE; ex2++){
        for(var ey2=0; ey2<ESTATE_CORE_SIZE; ey2++){
          var oldE2 = oldEstate.edgesX[ex2] && oldEstate.edgesX[ex2][ey2];
          if(oldE2) newEdges.edgesX[ex2+OFF][ey2+OFF] = { type: oldE2.type||null, masonryTileId: oldE2.masonryTileId||null };
        }
      }
    }
    return Object.assign({ grid:newGrid, expansionsPurchased:0, job:null }, newEdges);
  }

  // Terraforming: Raise Layer needs Digging 20 (the same level Digging's own Dirt tier
  // requires) and consumes 100 Dirt. Lower Layer gives back 20 Dirt, but gets harder the
  // deeper you dig -- level 10 at height 19 (and still 10 at 18), then +3 per height
  // below that (e.g. height 14 needs level 22).
  var ESTATE_RAISE_LEVEL = 20;
  var ESTATE_RAISE_DIRT_COST = 100;
  var ESTATE_LOWER_BASE_LEVEL = 10;
  var ESTATE_LOWER_LEVEL_STEP = 3;
  var ESTATE_LOWER_DIRT_REWARD = 20;
  var ESTATE_DIRT_ITEM_ID = 'digging_t4';
  // Both terraforming actions run as a single background job that takes 10 minutes and pays
  // out 500 Digging XP when it finishes. The job is independent of state.activity, so it
  // keeps ticking while you gather, craft, fight or pray -- only one tile can be worked at a
  // time. Raise reserves its 100 Dirt up front (refunded if cancelled) and applies +1 height
  // on completion; Lower applies -1 height and hands back 20 Dirt on completion. Timing is
  // timestamp-based (like farming), so a running job also completes while you're away.
  var ESTATE_TERRAFORM_MS = 10 * 60 * 1000;
  var ESTATE_TERRAFORM_XP = 500;
  // Clearing an obstacle scales with its resource tier (tier number = tierIndex + 1):
  // 10 min, 50 resource, and 500 skill XP per tier. It uses the same single estate job slot,
  // so it can't run alongside a raise/lower job.
  var ESTATE_OBSTACLE_MS_PER_TIER = 10 * 60 * 1000;
  var ESTATE_OBSTACLE_RESOURCE_PER_TIER = 50;
  var ESTATE_OBSTACLE_XP_PER_TIER = 500;
  function estateObstacleInfo(obs){
    if(!obs) return null;
    var def = ESTATE_OBSTACLE_TYPES[obs.type];
    if(!def) return null;
    var tierNum = obs.tierIndex + 1;
    var itemId = def.skill + '_t' + obs.tierIndex;
    var item = ALL_GATHER_ITEMS[itemId];
    return {
      def: def, tierNum: tierNum, itemId: itemId,
      itemName: item ? item.name : def.label,
      icon: item ? item.icon : '',
      reqLevel: TIER_LEVELS[obs.tierIndex],
      durationMs: tierNum * ESTATE_OBSTACLE_MS_PER_TIER,
      resourceAmount: tierNum * ESTATE_OBSTACLE_RESOURCE_PER_TIER,
      xp: tierNum * ESTATE_OBSTACLE_XP_PER_TIER
    };
  }
  function estateLowerRequiredLevel(currentHeight){
    return ESTATE_LOWER_BASE_LEVEL + ESTATE_LOWER_LEVEL_STEP * Math.max(0, 18-currentHeight);
  }
  function estateJobActive(){ return !!(state.estate && state.estate.job); }
  function estateClearObstacle(x, y){
    var cell = state.estate.grid[x] && state.estate.grid[x][y];
    if(!cell || !cell.obstacle) return;
    if(estateJobActive()){
      addLog('You can only run one estate task at a time -- finish or cancel the current one first.', 'danger');
      return;
    }
    var info = estateObstacleInfo(cell.obstacle);
    if(!info) return;
    if(getLevel(state.xp[info.def.skill]) < info.reqLevel){
      addLog('Clearing these ' + info.def.label + ' requires ' + SKILL_LABELS[info.def.skill] + ' level ' + info.reqLevel + '.', 'danger');
      return;
    }
    var nowC = Date.now();
    state.estate.job = { kind:'clear', x:x, y:y, startAt:nowC, readyAt:nowC + info.durationMs };
    addLog('You began clearing the ' + info.def.label + ' at (' + x + ', ' + y + ').', 'important');
    spawnFloatingText('Clearing\u2026', 'ft-success');

  // View-only rotation of the estate. estateRotation is 0..3 = 0/90/180/270 degrees

  var estateRotation = 0;

  // An edge is only selectable once at least one of the (up to two) tiles it borders is

    if(y<=0) return !!(state.estate.grid[x][0] && state.estate.grid[x][0].owned);
    if(y>=ESTATE_GRID_SIZE) return !!(state.estate.grid[x][ESTATE_GRID_SIZE-1] && state.estate.grid[x][ESTATE_GRID_SIZE-1].owned);

  }
  function estateEdgeXActive(x, y){
    if(x<=0) return !!(state.estate.grid[0][y] && state.estate.grid[0][y].owned);
    if(x>=ESTATE_GRID_SIZE) return !!(state.estate.grid[ESTATE_GRID_SIZE-1][y] && state.estate.grid[ESTATE_GRID_SIZE-1][y].owned);
    var a = state.estate.grid[x-1][y], b = state.estate.grid[x][y];

  // Each tile's 4 diamond edges border a specific neighbor: Top-Right borders (x,y-1),
  // Right-Bottom borders (x+1,y), Bottom-Left borders (x,y+1), Left-Top borders (x-1,y).
  // edgesY[x][y] (y from 0 to GRID_SIZE) is tile(x,y)'s Top-Right edge for y<GRID_SIZE,

  function renderEstateTileOptions(){

      html += '<button class="action-btn" data-action="estateRaiseLayer" data-x="'+x+'" data-y="'+y+'" '+((canRaise&&raiseLevelOk&&raiseDirtOk&&!jobActive)?'':'disabled')+'>'+raiseLabel+'</button>';
      html += '</div>';
      var canLower = cell.height > 0;
      var lowerReq = estateLowerRequiredLevel(cell.height);
      var lowerLevelOk = digLvl >= lowerReq;
      var lowerLabel = jobHere&&job.kind==='lower' ? 'Working\u2026' : (jobActive ? 'Busy' : (!canLower?'Bedrock':(!lowerLevelOk?'Lv '+lowerReq+' Req.':'Lower')));
      html += '<div class="estate-action-row">';
      html += '<div class="estate-action-info"><b>Lower Layer</b><br>Requires Digging '+lowerReq+' &bull; Recovers '+ESTATE_LOWER_DIRT_REWARD+' Dirt<br>Takes 10 min &bull; +'+ESTATE_TERRAFORM_XP+' Digging XP on completion</div>';
      html += '<button class="action-btn" data-action="estateLowerLayer" data-x="'+x+'" data-y="'+y+'" '+((canLower&&lowerLevelOk&&!jobActive)?'':'disabled')+'>'+lowerLabel+'</button>';

      html += '<button class="action-btn stop" data-action="estateBreakPavement" data-x="'+x+'" data-y="'+y+'" '+(breakLevelOk?'':'disabled')+'>'+(breakLevelOk?'Break':'Lv '+ESTATE_BREAK_PAVEMENT_LEVEL+' Req.')+'</button>';
      html += '</div>';
    }
    html += '</div>';
    return html;
  }
  function renderEstateTab(){
    var tilesOwned = 0;
    state.estate.grid.forEach(function(col){ col.forEach(function(cell){ if(cell.owned) tilesOwned++; }); });
    var purchased = state.estate.expansionsPurchased||0;

    var nextCost = fullyExpanded ? 0 : getEstateExpansionCost(purchased);
    var canAfford = !fullyExpanded && state.gold >= nextCost;
    var html = '<div class="section-intro">Your home plot -- terraformable up to 20 layers tall, and expandable one tile at a time with gold. Click a tile to see what you can do with it, or click one of its 4 borders (highlighted along its edges) to select that border instead -- this is where fences, walls, and doors will eventually go. Drag to pan the view, use the +/- buttons to zoom, and the turn arrows to rotate the estate 90\u00b0 at a time. Each tile starts covered by a natural obstacle (trees, berries, herbs, rocks, or ore) that must be cleared with the matching Gathering skill before you can raise, lower, or pave it. Foundations and buildings (which will grant buffs to chosen skills) are coming in future updates.</div>';
    html += '<div class="estate-canvas-wrap">'+
      '<button class="estate-zoom-btn estate-zoom-out" data-action="estateZoomOut" title="Zoom out">\u2212</button>'+
      '<button class="estate-rotate-btn estate-rotate-left" data-action="estateRotateLeft" title="Rotate estate 90\u00b0 left">\u21ba</button>'+
      '<canvas id="estateCanvas" width="580" height="490"></canvas>'+
      '<button class="estate-zoom-btn estate-zoom-in" data-action="estateZoomIn" title="Zoom in">+</button>'+
      '<button class="estate-rotate-btn estate-rotate-right" data-action="estateRotateRight" title="Rotate estate 90\u00b0 right">\u21bb</button>'+
      '</div>';
    html += '<div class="estate-hover-info" id="estateHoverInfo">Hover a tile or its borders to inspect it. Drag to pan, +/- to zoom, arrows to rotate.</div>';
    html += '<div class="estate-options-panel">';
    html += '<h3 style="margin-top:0">Estate Size &bull; '+tilesOwned+' tiles owned</h3>';
    if(fullyExpanded){
      html += '<div class="estate-action-info">Your estate is fully expanded.</div>';
    } else {
      html += '<div class="estate-action-row">';
      html += '<div class="estate-action-info"><b>Expand Estate</b><br>Purchases the next tile along the boundary, starting from the top-left and circling outward. Cost rises 25% with each purchase.</div>';
      html += '<button class="action-btn" data-action="estateExpand" style="width:auto;flex-shrink:0" '+(canAfford?'':'disabled')+'>'+(canAfford?'Expand: '+nextCost+'g':nextCost+'g Req.')+'</button>';

  // Always-visible status for the background terraforming job, so it stays in view even
  // when a different tile (or none) is selected. The fill width and countdown are refreshed
  // every frame by updateDynamic without rebuilding the button, so the Cancel click is safe.
  function renderEstateJobStatus(){
    var job = state.estate && state.estate.job;
    if(!job) return '';
    var now = Date.now();
    var total = job.readyAt - job.startAt;
    var pct = clamp((now - job.startAt) / total * 100, 0, 100);
    var remaining = Math.max(0, job.readyAt - now);
    var jobCell = state.estate.grid[job.x] && state.estate.grid[job.x][job.y];
    var headLabel, rewardNote;
    if(job.kind === 'clear'){
      var ci = jobCell && estateObstacleInfo(jobCell.obstacle);
      headLabel = 'Clearing &bull; '+(ci ? ci.def.emoji+' '+ci.def.label : 'Obstacle')+' ('+job.x+', '+job.y+')';
      rewardNote = ci ? ('Runs in the background &bull; +'+ci.resourceAmount+' '+ci.itemName+' &amp; +'+ci.xp+' XP when it finishes') : 'Runs in the background';
    } else {
      headLabel = 'Terraforming &bull; '+(job.kind === 'raise' ? 'Raising' : 'Digging down')+' ('+job.x+', '+job.y+')';
      rewardNote = 'Runs in the background &bull; +'+ESTATE_TERRAFORM_XP+' Digging XP when it finishes';
    }
    var html = '<div class="estate-action-row" style="align-items:stretch;flex-direction:column;gap:8px;border-top:1px dashed var(--border-light);padding-top:12px;">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">';
    html += '<div class="estate-action-info"><b>'+headLabel+'</b><br>'+rewardNote+'</div>';
    html += '<button class="action-btn stop" data-action="estateCancelJob" style="width:auto;flex-shrink:0">Cancel</button>';
    html += '</div>';
    html += '<div class="progress-track"><div class="progress-fill" id="estateJobFill" style="width:'+pct+'%"></div></div>';
    html += '<div class="estate-action-info" style="text-align:center;font-family:var(--font-mono);" id="estateJobTimer">Finishes in '+formatDuration(remaining)+'</div>';
    html += '</div>';
    return html;
  }

  // ================= RENDER: FARMING =================
  function formatDuration(ms){
    var totalSec = Math.max(0, Math.ceil(ms/1000));
    var m = Math.floor(totalSec/60);
    var s = totalSec%60;
    return m+':'+(s<10?'0':'')+s;
  }
  function renderFarmingTab(){
    var fiberLvl = getLevel(state.xp.fiberharvesting);
    var grainLvl = getLevel(state.xp.grainharvesting);
    var herbLvl = getLevel(state.xp.herbharvesting);
    var farmLvl = farmingLevel(state);
    var unlockedSlots = getPlotSlots(farmLvl);
    var html = '<div class="section-intro">Farming is three harvesting sub-skills, one per crop line. Plant Seeds in your Plot Slots and wait for them to grow, then harvest. Each seed type needs its own sub-skill to plant higher tiers: Fiber Seeds (Fiber Harvesting) grow fiber for Tailoring, Grain Seeds (Grain Harvesting) grow Grain for Baking\'s Dough, and Herb Seeds (Herb Harvesting) grow Herbs for Cooking\'s Meals. Harvesting is worth a lot of XP. No tool is used, and time passes even while you\'re away. '+unlockedSlots+' of 40 plots unlocked (more open as your Farming level rises, reaching all 40 at level 100).</div>';
    html += renderSkillProgressBar('fiberharvesting');
    html += renderSkillProgressBar('grainharvesting');
    html += renderSkillProgressBar('herbharvesting');

    var ownedSeeds = Object.keys(SEED_ITEMS).filter(function(id){ return (state.inventory[id]||0) > 0; })
      .sort(function(a,b){ return SEED_ITEMS[a].tierIndex - SEED_ITEMS[b].tierIndex; });
    var ownedGrainSeeds = Object.keys(GRAIN_SEED_ITEMS).filter(function(id){ return (state.inventory[id]||0) > 0; })
      .sort(function(a,b){ return GRAIN_SEED_ITEMS[a].tierIndex - GRAIN_SEED_ITEMS[b].tierIndex; });
    var ownedHerbSeeds = Object.keys(HERB_SEED_ITEMS).filter(function(id){ return (state.inventory[id]||0) > 0; })
      .sort(function(a,b){ return HERB_SEED_ITEMS[a].tierIndex - HERB_SEED_ITEMS[b].tierIndex; });

    html += '<div class="card-grid">';
    for(var i=0;i<40;i++){
      var locked = i >= unlockedSlots;
      var plot = state.farmingPlots[i];
      html += '<div class="item-card'+(locked?' locked':'')+'">';
      if(locked){
        html += '<div class="item-top"><div class="item-icon">'+svgIcon('lock','#8a8a8a')+'</div><div><div class="item-name">Plot '+(i+1)+'</div><div class="item-meta">Locked</div></div></div>';
        html += '<div class="lock-note">Unlocks once a harvesting sub-skill reaches level '+getPlotUnlockLevel(i)+'</div>';
      } else if(isPlotEmpty(plot)){
        html += '<div class="item-top"><div class="item-icon">'+svgIcon('dirt','#a97d4f')+'</div><div><div class="item-name">Plot '+(i+1)+'</div><div class="item-meta">Empty</div></div></div>';
        if(ownedSeeds.length===0 && ownedGrainSeeds.length===0 && ownedHerbSeeds.length===0){
          html += '<div class="empty-note">No seeds yet. Find some via Critter Caches, or while gathering Botany, Herbalism, or Foraging.</div>';
        } else {
          html += '<div class="style-row">';
          ownedSeeds.forEach(function(seedId){
            var seed = SEED_ITEMS[seedId];
            var qty = state.inventory[seedId]||0;
            var cropData = FARMING_ITEMS['farming_t'+seed.tierIndex];
            var seedLocked = fiberLvl < TIER_LEVELS[seed.tierIndex];
            html += '<button class="style-btn'+(seedLocked?' style-btn-locked':'')+'" data-action="plantSeed" data-plot="'+i+'" data-seed="'+seedId+'" '+(seedLocked?'disabled title="Requires Fiber Harvesting level '+TIER_LEVELS[seed.tierIndex]+'"':'')+'>'+seed.icon+' '+seed.name+' <span class="style-lvl">x'+qty+'</span><span class="style-type">'+(seedLocked?'Req. Lv '+TIER_LEVELS[seed.tierIndex]:(cropData.durationMs/60000)+'m')+'</span></button>';
          });
          ownedGrainSeeds.forEach(function(seedId){
            var gseed = GRAIN_SEED_ITEMS[seedId];
            var gqty = state.inventory[seedId]||0;
            var gCropData = GRAIN_ITEMS['grain_t'+gseed.tierIndex];
            var gSeedLocked = grainLvl < TIER_LEVELS[gseed.tierIndex];
            html += '<button class="style-btn'+(gSeedLocked?' style-btn-locked':'')+'" data-action="plantSeed" data-plot="'+i+'" data-seed="'+seedId+'" '+(gSeedLocked?'disabled title="Requires Grain Harvesting level '+TIER_LEVELS[gseed.tierIndex]+'"':'')+'>'+gseed.icon+' '+gseed.name+' <span class="style-lvl">x'+gqty+'</span><span class="style-type">'+(gSeedLocked?'Req. Lv '+TIER_LEVELS[gseed.tierIndex]:(gCropData.durationMs/60000)+'m')+'</span></button>';
          });
          ownedHerbSeeds.forEach(function(seedId){
            var hseed = HERB_SEED_ITEMS[seedId];
            var hqty = state.inventory[seedId]||0;
            var hCropData = HERB_ITEMS['herb_t'+hseed.tierIndex];
            var hSeedLocked = herbLvl < TIER_LEVELS[hseed.tierIndex];
            html += '<button class="style-btn'+(hSeedLocked?' style-btn-locked':'')+'" data-action="plantSeed" data-plot="'+i+'" data-seed="'+seedId+'" '+(hSeedLocked?'disabled title="Requires Herb Harvesting level '+TIER_LEVELS[hseed.tierIndex]+'"':'')+'>'+hseed.icon+' '+hseed.name+' <span class="style-lvl">x'+hqty+'</span><span class="style-type">'+(hSeedLocked?'Req. Lv '+TIER_LEVELS[hseed.tierIndex]:(hCropData.durationMs/60000)+'m')+'</span></button>';
          });

        }
      } else {
        var cropData2 = getCropDataForPlot(plot);
        if(!cropData2){
          // Defensive: same self-heal as harvestPlot -- never let a bad cropType crash the render.
          plot.cropType = null; plot.tierIndex = -1; plot.plantedAt = 0; plot.readyAt = 0;
          html += '<div class="item-top"><div class="item-icon">'+svgIcon('dirt','#a97d4f')+'</div><div><div class="item-name">Plot '+(i+1)+'</div><div class="item-meta">Empty</div></div></div>';
          html += '</div>';
          continue;
        }
        var remaining = plot.readyAt - Date.now();
        var ready = remaining <= 0;
        html += '<div class="item-top"><div class="item-icon">'+cropData2.icon+'</div><div><div class="item-name">'+cropData2.name+'</div><div class="item-meta">Plot '+(i+1)+'</div></div></div>';

          html += '<div class="chance-line">Ready to harvest!</div>';
          html += '<button class="action-btn" data-action="harvestPlot" data-plot="'+i+'">Harvest</button>';
        } else {
          var elapsedPct = clamp((cropData2.durationMs-remaining)/cropData2.durationMs*100,0,100);
          html += '<div class="chance-line" id="plot-timer-'+i+'">Ready in '+formatDuration(remaining)+'</div>';
          html += '<div class="progress-track"><div class="progress-fill" id="plot-fill-'+i+'" style="width:'+elapsedPct+'%"></div></div>';
          html += '<button class="action-btn" disabled>Growing&hellip;</button>';
        }
      }
      html += '</div>';
    }
    html += '</div>';

    html += '<h3>Critter Caches</h3>';
    html += '<div class="section-intro">Forestry has a small chance to turn up a Critter Cache. Opening one gives 3 Seeds, heavily weighted toward common tiers.</div>';

    html += '<div class="item-top"><div class="item-icon">'+svgIcon('chest','#8a6a42')+'</div><div><div class="item-name">Critter Cache</div><div class="item-meta">Owned: '+nestQty+'</div></div></div>';
    html += '<button class="action-btn" data-action="openCritterCache" '+(nestQty>0?'':'disabled')+'>Open</button>';
    html += '</div></div>';
    return html;
  }

  // ================= CLOUD SAVES =================
  // Preserve the full game state server-side for signed-in players (survives a cleared
  // browser, follows them across devices). localStorage stays the fast local cache and
  // keeps anonymous/offline play working; the cloud layers on top when signed in.
  // Reconciliation is newest-wins by state.lastSaved, guarded server-side against stale
  // overwrites, with owner-tagging so a save synced under one account isn't pushed into
  // another on a shared browser.
  // Kill switch for cloud sync. Re-enabled after the reconciliation was rebuilt to be
  // progress-aware (compares total-XP score, never timestamps) with a server-side
  // forward-only guard, so an empty/lower-progress state can never overwrite real data.
  // Flip to false to instantly disable all cloud reads/writes (localStorage-only) if needed.
  var CLOUD_SYNC_ENABLED = true;
  var SAVE_OWNER_KEY = 'ff-save-owner';
  var CLOUD_PUSH_INTERVAL = 30000;
  var cloudLastPush = 0;
  var cloudReloading = false;
  function localSaveOwner(){ try{ return window.localStorage.getItem(SAVE_OWNER_KEY) || ''; }catch(e){ return ''; } }
  function setLocalSaveOwner(id){ try{ if(id){ window.localStorage.setItem(SAVE_OWNER_KEY, id); } else { window.localStorage.removeItem(SAVE_OWNER_KEY); } }catch(e){} }

  // Monotonic progress metric = total XP (skills + physique). Reconciliation compares THIS,
  // never wall-clock timestamps, so an empty newGame() (score 0) can never win and overwrite
  // real progress. XP only grows barring an explicit reset.
  function saveProgressScore(s){
    if(!s) return 0;
    var total = 0, k;
    if(s.xp){ for(k in s.xp){ if(typeof s.xp[k] === 'number') total += s.xp[k]; } }
    if(s.physique){ for(k in s.physique){ if(typeof s.physique[k] === 'number') total += s.physique[k]; } }
    return Math.floor(total) || 0;
  }
  var cloudNewerAvailable = false; // higher-progress cloud save exists but local also has progress

  // force = intentional overwrite (reset only): bypasses the empty guard and tells the server
  //         to override its forward-only progress guard.
  // flush = push now, skipping the debounce, but STILL subject to the empty + forward guards.
  async function cloudSave(force, flush){
    if(!CLOUD_SYNC_ENABLED) return;
    if(!CHAT_ENABLED || !authUser || !authUser.id || cloudReloading) return;
    var score = saveProgressScore(state);
    // Never push an empty/zero-progress state (unless a deliberate, forced reset) -- this is
    // belt-and-suspenders on top of the server's forward-only progress guard.
    if(!force && score <= 0) return;
    var now = Date.now();
    if(!force && !flush && now - cloudLastPush < CLOUD_PUSH_INTERVAL) return;
    cloudLastPush = now;
    if(!chatClient){ if(!(await authEnsureClient())) return; }
    try{
      var res = await chatClient.functions.invoke('save_game', {
        body: { data: state, client_saved_at: state.lastSaved || 0, progress: score, force: !!force }
      });
      if(res && res.data && res.data.ok){ setLocalSaveOwner(authUser.id); }
      // A non-ok/'stale' result means the cloud holds a higher-progress save; leave both
      // sides untouched (non-destructive) and reconcile on the next load.
    }catch(e){}
  }

  async function cloudLoad(){
    return;   // ONLINE-ONLY: loading is handled by initGame()/readSave() from the backend
    if(!CLOUD_SYNC_ENABLED) return;
    if(!CHAT_ENABLED || !authUser || !authUser.id || cloudReloading) return;
    if(!chatClient){ if(!(await authEnsureClient())) return; }
    try{
      var res = await chatClient.from('saves').select('data,progress').eq('user_id', authUser.id).maybeSingle();
      var cloud = (res && res.data) || null;
      var hasCloud = !!(cloud && cloud.data);
      var cloudScore = hasCloud ? (cloud.progress || 0) : -1;
      var localScore = saveProgressScore(state);
      var owner = localSaveOwner();
      var ownedByUs = !owner || owner === authUser.id;    // anonymous (claimable) or already ours
      function adoptCloud(){
        cloudReloading = true;
        setLocalSaveOwner(authUser.id);
        writeSave(JSON.stringify(cloud.data));
        addLog('Loaded your cloud save.');
        setTimeout(function(){ location.reload(); }, 500);
      }
      if(hasCloud){
        // The cloud save is the source of truth. On login we PULL it so your character
        // follows you across devices. We keep local instead only when OUR OWN local is
        // STRICTLY further along (e.g. you played more on this device while offline) -- then
        // push it up so newer progress isn't lost. A different account's local never
        // overwrites the cloud; we always load our own cloud in that case. The server's
        // forward-only progress guard still blocks any empty/stale push.
        if(ownedByUs && localScore > cloudScore){
          setLocalSaveOwner(authUser.id);
          cloudSave();                  // local is ahead & ours -> push forward (becomes truth)
        } else if(!ownedByUs || cloudScore > localScore){
          adoptCloud(); return;         // cloud is ahead, or local isn't ours -> pull the cloud
        }
        // else: ours and already in sync (equal progress) -> nothing to do
      } else if(ownedByUs && localScore > 0){
        setLocalSaveOwner(authUser.id);
        cloudSave();                    // no cloud yet -> seed it from our current local
      }
    }catch(e){}
  }

    if(!CHAT_ENABLED || !chatClient){
      chatOnIncoming({ id:'local-'+now, created_at:new Date().toISOString(), username:name, body:text });
      return;
    }
    chatLastSentAt = now;

      var res = await chatClient.from(CHAT_CONFIG.table).insert({ username:name, body:text });

  }

  // ================= PLAYER PROFILES + LEADERBOARD =================
  // Each signed-in player upserts a public 'profiles' row (total level, gold, per-skill levels);
  // the Leaderboard ranks everyone by total level and lets you open any player's profile.
  // NOTE: the game is client-authoritative, so these numbers are self-reported/trust-based --
  // fine for a showcase board, but a competitive one would need server-side progression checks.
  var LEADERBOARD_LIMIT = 50;
  var leaderboardData = [];
  var leaderboardMetric = 'total'; // 'total' | 'gold' | 'skill:<id>' | 'stat:<key>'
  var leaderboardStatus = CHAT_ENABLED ? 'idle' : 'unconfigured'; // idle|loading|ready|error|unconfigured
  var leaderboardLastFetch = 0;
  var profileLastSync = 0;
  var profileView = null;
  // Lifetime-stat metrics available as leaderboard rankings (must match the state.stats keys).
  var LB_STAT_METRICS = [
    {key:'kills', label:'Kills'},
    {key:'deaths', label:'Deaths'},
    {key:'gathered', label:'Items Gathered'},
    {key:'crafted', label:'Items Crafted'},
    {key:'craftedRare', label:'Rare Crafts'},
    {key:'craftedSupreme', label:'Supreme Crafts'},
    {key:'craftedFantastic', label:'Fantastic Crafts'}
  ];
  function buildProfileStats(){
    var s = state.stats || {}, out = {};
    LB_STAT_METRICS.forEach(function(m){ out[m.key] = Math.max(0, Math.floor(s[m.key]||0)); });
    return out;
  }
  function computeProfileStats(){
    var skills = {}, total = 0;
    for(var i=0;i<ALL_MAIN_SKILL_IDS.length;i++){
      var lv = getLevel(state.xp[ALL_MAIN_SKILL_IDS[i]]||0);
      skills[ALL_MAIN_SKILL_IDS[i]] = lv; total += lv;
    }
    return { total_level: total, gold: Math.floor(state.gold||0), skills: skills, equipment: computeEquipment(), stats: buildProfileStats() };
  }
  // Currently-equipped weapons + armor (NOT tools), captured as display-ready
  // {slot,name,rarity} entries for a player's public leaderboard profile. Names are
  // escaped and rarity is resolved locally at render time, so none of this is trusted HTML.
  function computeEquipment(){
    var weapons = [], armor = [];
    if(state.equippedMainhand){
      var w = getEquippedWeaponItem(state);
      if(w && w !== WEAPON_BASE && w.name){ weapons.push({ slot:'Mainhand', name:w.name, rarity:state.equippedMainhandRarity||w.rarity||'normal' }); }
    }
    if(state.equippedOffhand){
      var off = getEquippedOffhandItem(state);
      if(off && off.name){ weapons.push({ slot:'Offhand', name:off.name, rarity:state.equippedOffhandRarity||off.rarity||'normal' }); }
    }
    ARMOR_SLOTS.forEach(function(slot){
      var tier = (state.armorSlots && state.armorSlots[slot.id]) || 0;
      if(tier > 0){
        var a = getEquippedSlotItem(slot, tier, state.armorRarities[slot.id]);
        if(a && a.name){ armor.push({ slot:slot.label, name:a.name, rarity:(state.armorRarities&&state.armorRarities[slot.id])||'normal' }); }
      }
    });
    BODY_ARMOR_SLOTS.forEach(function(slot){
      var s = state.bodyArmor && state.bodyArmor[slot];
      if(s && s.tier > 0){
        var item = BODY_ARMOR_ITEMS['bodyarmor_'+s.material+'_'+slot+'_t'+(s.tier-1)+'_'+s.rarity];
        if(item && item.name){ armor.push({ slot:(BODY_ARMOR_LABELS[slot]||slot), name:item.name, rarity:s.rarity||'normal' }); }
      }
    });
    return { weapons: weapons, armor: armor };
  }
  async function profileSync(force){
    if(!CHAT_ENABLED || !authUser || !authUser.id || cloudReloading) return;  // don't push a pre-pull state
    var now = Date.now();
    if(!force && now - profileLastSync < 90000) return;
    profileLastSync = now;
    if(!chatClient){ if(!(await authEnsureClient())) return; }
    var stats = computeProfileStats();
    try{
      // Writes go through the server-validated 'submit_profile' function (the profiles
      // table is no longer client-writable). id + username are derived server-side from
      // the auth token; a rejected submission just leaves the last accepted row intact.
      await chatClient.functions.invoke('submit_profile', {
        body: { total_level: stats.total_level, gold: stats.gold, skills: stats.skills, equipment: stats.equipment, stats: stats.stats }
      });
    }catch(e){}
  }
  async function leaderboardFetch(force){
    if(!CHAT_ENABLED){ leaderboardStatus = 'unconfigured'; return; }
    if(leaderboardStatus === 'loading') return;
    var now = Date.now();
    if(!force && leaderboardData.length && now - leaderboardLastFetch < 20000) return;
    leaderboardStatus = 'loading';
    if(currentCategory==='leaderboard' && !profileView) render();
    if(!chatClient){ if(!(await authEnsureClient())){ leaderboardStatus='error'; if(currentCategory==='leaderboard') render(); return; } }
    try{
      var res = await chatClient.from('profiles')
        .select('id,username,total_level,gold,skills,equipment,stats,updated_at')
        .order('total_level', { ascending:false })
        .limit(LEADERBOARD_LIMIT);
      if(res.error){
        // The stats column may not be migrated yet -- fall back so the board still loads
        // (lifetime-stat rankings just read as 0 until the migration + a profile re-sync).
        res = await chatClient.from('profiles')
          .select('id,username,total_level,gold,skills,equipment,updated_at')
          .order('total_level', { ascending:false })
          .limit(LEADERBOARD_LIMIT);
      }
      if(res.error) throw res.error;
      leaderboardData = res.data || [];
      leaderboardLastFetch = Date.now();
      leaderboardStatus = 'ready';
    }catch(e){ leaderboardStatus = 'error'; }
    if(currentCategory==='leaderboard' && !profileView) render();
  }
  function lbMetricValue(p, metric){
    if(metric==='gold') return p.gold||0;
    if(metric.indexOf('skill:')===0) return (p.skills && p.skills[metric.slice(6)])||0;
    if(metric.indexOf('stat:')===0) return (p.stats && p.stats[metric.slice(5)])||0;
    return p.total_level||0; // 'total'
  }
  function lbMetricLabel(metric){
    if(metric==='total') return 'Total Level';
    if(metric==='gold') return 'Gold';
    if(metric.indexOf('skill:')===0){ var s=metric.slice(6); return SKILL_LABELS[s]||s; }
    if(metric.indexOf('stat:')===0){ var k=metric.slice(5); var m=LB_STAT_METRICS.filter(function(x){return x.key===k;})[0]; return m?m.label:k; }
    return 'Total Level';
  }
  // Primary (ranked) value shown for a row under the current metric.
  function lbPrimaryText(p, metric){
    var v = lbMetricValue(p, metric);
    if(metric==='gold') return fmt(v)+'g';
    if(metric==='total' || metric.indexOf('skill:')===0) return 'Lv '+fmt(v);
    return fmt(v); // lifetime stat -> raw count
  }
  function lbRow(rank, p, isMe, metric){
    var medals = { 1:'\uD83E\uDD47', 2:'\uD83E\uDD48', 3:'\uD83E\uDD49' };
    // Secondary column gives context: show Total Level unless that's already the metric (then gold).
    var secondary = (metric==='total') ? (fmt(p.gold||0)+'g') : ('Lv '+fmt(p.total_level||0));
    return '<button class="lb-row'+(isMe?' me':'')+'" data-action="viewProfile" data-id="'+escapeHtml(String(p.id||''))+'">'
      +'<span class="lb-rank">'+(medals[rank]||('#'+rank))+'</span>'
      +'<span class="lb-name">'+escapeHtml(p.username||'anon')+'</span>'
      +'<span class="lb-lvl">'+lbPrimaryText(p, metric)+'</span>'
      +'<span class="lb-gold">'+secondary+'</span></button>';
  }
  // <select> options for the "Rank by" filter: Total Level, Gold, lifetime stats, then skills by group.
  function lbMetricOptions(){
    var cur = leaderboardMetric;
    var opt = function(val,label){ return '<option value="'+val+'"'+(cur===val?' selected':'')+'>'+escapeHtml(label)+'</option>'; };
    var html = '<optgroup label="Overall">'+opt('total','Total Level')+opt('gold','Gold')+'</optgroup>';
    html += '<optgroup label="Lifetime Stats">'+LB_STAT_METRICS.map(function(m){ return opt('stat:'+m.key, m.label); }).join('')+'</optgroup>';
    (typeof SKILL_GROUPS !== 'undefined' ? SKILL_GROUPS : []).forEach(function(g){
      html += '<optgroup label="'+escapeHtml(g.label)+'">'+g.skills.map(function(sk){ return opt('skill:'+sk, SKILL_LABELS[sk]||sk); }).join('')+'</optgroup>';
    });
    return html;
  }
  function renderProfileDetail(p){
    var html = '<div class="chat-wrap">';
    html += '<button class="action-btn" data-action="closeProfile" style="width:auto;flex:0 0 auto;">\u2039 Back</button>';
    html += '<div class="profile-head"><div class="profile-name">'+escapeHtml(p.username||'anon')+'</div>'
      +'<div class="profile-stats"><span>Total Level <b>'+fmt(p.total_level||0)+'</b></span><span>Gold <b>'+fmt(p.gold||0)+'</b></span></div></div>';
    var pst = p.stats || {};
    if(LB_STAT_METRICS.some(function(m){ return (pst[m.key]||0)>0; })){
      html += '<div class="profile-skills"><div class="profile-group"><div class="profile-group-head">Lifetime</div><div class="profile-group-body">';
      LB_STAT_METRICS.forEach(function(m){ html += '<span class="profile-skill">'+escapeHtml(m.label)+' <b>'+fmt(pst[m.key]||0)+'</b></span>'; });
      html += '</div></div></div>';
    }
    // Currently-equipped weapons + armor. Names/slots are escaped; rarity is a lookup key
    // into a fixed colour map -- nothing from the stored profile is injected as HTML.
    var eq = p.equipment;
    if(eq && ((eq.weapons && eq.weapons.length) || (eq.armor && eq.armor.length))){
      var rarityColor = { rare:'var(--rarity-rare)', supreme:'var(--rarity-superior)', fantastic:'var(--rarity-fantastic)' };
      var eqGroup = function(title, items){
        if(!items || !items.length) return '';
        var h = '<div class="profile-group"><div class="profile-group-head">'+title+'</div><div class="profile-group-body">';
        items.forEach(function(it){
          if(!it || !it.name) return;
          var c = rarityColor[it.rarity] || 'var(--text)';
          h += '<span class="profile-skill" style="color:'+c+'">'+escapeHtml(String(it.slot||''))+': '+escapeHtml(String(it.name||''))+'</span>';
        });
        return h + '</div></div>';
      };
      html += '<div class="profile-skills">'+eqGroup('Weapons', eq.weapons)+eqGroup('Armor', eq.armor)+'</div>';
    }
    var skills = p.skills || {};
    html += '<div class="profile-skills">';
    SKILL_GROUPS.forEach(function(g){
      var rows = g.skills.filter(function(sk){ return skills[sk] !== undefined; });
      if(!rows.length) return;
      rows = rows.slice().sort(function(a,b){ return (skills[b]||0)-(skills[a]||0); });
      html += '<div class="profile-group"><div class="profile-group-head" style="color:'+g.color+'">'+g.label+'</div><div class="profile-group-body">';
      rows.forEach(function(sk){ html += '<span class="profile-skill">'+escapeHtml(SKILL_LABELS[sk]||sk)+' <b>'+(skills[sk]||0)+'</b></span>'; });
      html += '</div></div>';
    });
    html += '</div></div>';
    return html;
  }
  function renderLeaderboardTab(){
    if(profileView) return renderProfileDetail(profileView);
    var html = '<div class="section-intro">Leaderboard &mdash; ranked by <b>'+escapeHtml(lbMetricLabel(leaderboardMetric))+'</b>. Use <b>Rank by</b> to sort by a skill or lifetime stat. Tap a name to view their profile.</div>';
    html += '<div class="chat-wrap">';
    if(!CHAT_ENABLED){
      var me = computeProfileStats();
      html += '<div class="empty-note">Local preview &mdash; connect a backend to see a real global leaderboard. Here\'s your own profile as a sample:</div>';
      html += '<div class="lb-list">'+lbRow(1, { id:'', username: chatName()||'You', total_level: me.total_level, gold: me.gold, skills: me.skills, stats: me.stats }, true, leaderboardMetric)+'</div>';
      html += '</div>'; return html;
    }
    html += '<div class="lb-controls"><button class="action-btn" data-action="leaderboardRefresh" style="width:auto;flex:0 0 auto;">Refresh</button>';
    if(authUser) html += '<button class="action-btn" data-action="viewMyProfile" style="width:auto;flex:0 0 auto;">My Profile</button>';
    html += '<label class="lb-metric"><span>Rank by</span><select id="lbMetricSelect" class="chat-input">'+lbMetricOptions()+'</select></label>';
    html += '</div>';
    if(leaderboardStatus==='loading' && !leaderboardData.length){ html += '<div class="empty-note">Loading the rankings\u2026</div>'; }
    else if(leaderboardStatus==='error'){ html += '<div class="empty-note">Couldn\'t load the leaderboard. Make sure the <code>profiles</code> table and its read policy exist.</div>'; }
    else if(!leaderboardData.length){ html += '<div class="empty-note">No ranked players yet &mdash; be the first to make your mark!</div>'; }
    else {
      var sorted = leaderboardData.slice().sort(function(a,b){ return lbMetricValue(b, leaderboardMetric) - lbMetricValue(a, leaderboardMetric); });
      html += '<div class="lb-list">';
      sorted.forEach(function(p, i){ html += lbRow(i+1, p, authUser && p.id===authUser.id, leaderboardMetric); });
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // ================= GUILDS =================
  // Shared guild state is server-authoritative: all mutations go through the
  // `guild_action` edge function (service role), and reads come from RLS-guarded
  // tables. The client never trusts guild data from any player's save blob.
  var GUILD_CREATE_COST = 50000;
  var GUILD_SUBS = [
    {id:'roster', label:'Roster', icon:svgIcon('person','var(--cat-guild)')},
    {id:'bank', label:'Bank', icon:svgIcon('chest','var(--cat-guild)')},
    {id:'estate', label:'Estate', icon:svgIcon('castle','var(--cat-guild)')},
    {id:'bosses', label:'Bosses', icon:svgIcon('hornedskull','var(--cat-guild)')}
  ];
  var guildSub = 'roster';
  var guildState = { status:'idle', guild:null, members:[], myRank:null, applications:[], busy:false, error:'' };
  var guildBrowseState = { status:'idle', list:[], appliedTo:null };

  function guildInvoke(action, payload){
    if(!chatClient || !authUser) return Promise.resolve({ ok:false, error:'Sign in to use guilds.' });
    var body = { action: action };
    if(payload){ for(var k in payload){ if(payload.hasOwnProperty(k)) body[k]=payload[k]; } }
    return chatClient.functions.invoke('guild_action', { body: body }).then(function(r){
      if(r && r.data) return r.data;
      return { ok:false, error:(r && r.error && r.error.message) || 'Request failed.' };
    }, function(){ return { ok:false, error:'Network error.' }; });
  }
  function guildEnsureLoaded(){ if(guildState.status==='idle') guildReload(false); }
  function guildReload(silent){
    if(!chatClient || !authUser || !authUser.id){ guildState.status='idle'; return; } // not ready yet; retry on next view
    if(!silent) guildState.status='loading';
    guildInvoke('get_state', {}).then(function(res){
      if(!res || !res.ok){ guildState.status='error'; guildState.error=(res&&res.error)||'Could not load guild.'; if(currentCategory==='guild'||currentCategory==='chat') render(); return; }
      guildState.status='ready';
      guildState.guild = res.guild || null;
      guildState.members = res.members || [];
      guildState.myRank = res.myRank || null;
      guildState.applications = res.applications || [];
      if(!guildState.guild){ if(guildBrowseState.status==='idle') guildBrowseLoad(); guildTeardownChat(); }
      else { guildChatMaybeSubscribe(); }
      if(currentCategory==='guild'||currentCategory==='chat') render();
    });
  }
  function guildBrowseLoad(){
    if(!chatClient || !authUser || !authUser.id){ return; }
    guildBrowseState.status='loading';
    chatClient.from('guilds').select('id,name,tag,description,member_count,min_total_level').eq('open',true).order('member_count',{ascending:false}).limit(50).then(function(res){
      guildBrowseState.list = (res && res.data) || [];
      chatClient.from('guild_applications').select('guild_id').eq('user_id', authUser.id).maybeSingle().then(function(a){
        guildBrowseState.appliedTo = (a && a.data && a.data.guild_id) || null;
        guildBrowseState.status='ready';
        if(currentCategory==='guild') render();
      });
    }, function(){ guildBrowseState.status='error'; if(currentCategory==='guild') render(); });
  }
  function guildCreate(){
    if(guildState.busy) return;
    var nameEl=document.getElementById('guildNameInput'), tagEl=document.getElementById('guildTagInput'), descEl=document.getElementById('guildDescInput');
    var name=(nameEl&&nameEl.value||'').trim(), tag=(tagEl&&tagEl.value||'').trim(), desc=(descEl&&descEl.value||'').trim();
    if((state.gold||0) < GUILD_CREATE_COST){ guildState.error='You need '+fmt(GUILD_CREATE_COST)+' gold to found a guild.'; render(); return; }
    guildState.busy=true; guildState.error='';
    state.gold -= GUILD_CREATE_COST; // deducted locally (client-authoritative economy); refunded on failure
    render();
    guildInvoke('create', { name:name, tag:tag, description:desc }).then(function(res){
      guildState.busy=false;
      if(!res || !res.ok){ state.gold += GUILD_CREATE_COST; guildState.error=(res&&res.error)||'Could not create guild.'; render(); return; }
      saveGame();
      guildState.error=''; guildBrowseState.status='idle'; guildReload(true);
    });
  }
  function guildApply(guildId){
    if(guildState.busy || !guildId) return;
    guildState.busy=true; guildState.error='';
    guildInvoke('apply', { guild_id:guildId, message:'' }).then(function(res){
      guildState.busy=false;
      if(!res.ok){ guildState.error=res.error||'Could not apply.'; render(); return; }
      guildBrowseState.appliedTo=guildId; render();
    });
  }
  function guildCancelApplication(){
    guildInvoke('cancel_application', {}).then(function(){ guildBrowseState.appliedTo=null; render(); });
  }
  function guildAct(action, targetId){
    if(guildState.busy) return;
    guildState.busy=true; guildState.error='';
    var payload={}; if(targetId) payload.user_id=targetId;
    guildInvoke(action, payload).then(function(res){
      guildState.busy=false;
      if(!res.ok){ guildState.error=res.error||'Action failed.'; render(); return; }
      if(res.left || res.disbanded){
        guildState.guild=null; guildState.members=[]; guildState.myRank=null; guildState.applications=[];
        guildBrowseState.status='idle'; guildBankState.status='idle'; guildBankState.guildId=null;
        guildEstateState.status='idle'; guildEstateState.guildId=null;
        guildBossState.status='idle'; guildBossState.guildId=null; guildBossState.active=null; guildBossState.claimable=null;
        guildTeardownChat(); guildReload(true); return;
      }
      guildReload(true);
    });
  }
  function guildSetOpen(open){ guildInvoke('set_open', { open:open }).then(function(){ guildReload(true); }); }

  function guildRankBadge(rank){
    if(rank==='leader') return '<span class="guild-rank leader">'+svgIcon('crown','#c9a84a')+'Leader</span>';
    if(rank==='officer') return '<span class="guild-rank officer">Officer</span>';
    return '<span class="guild-rank member">Member</span>';
  }
  function guildRankLabel(rank){ return rank==='leader'?'Leader':(rank==='officer'?'Officer':'Member'); }

  function renderGuildTab(){
    if(!authUser) return '<div class="empty-note">Sign in to access guilds.</div>';
    if(guildState.status==='idle'||guildState.status==='loading') return '<div class="section-intro">Guilds &mdash; team up, pool resources, and take on shared challenges.</div><div class="empty-note">Loading&hellip;</div>';
    var html='';
    if(guildState.error){ html += '<div class="empty-note" style="border-color:var(--hp-bad);color:var(--hp-bad);">'+escapeHtml(guildState.error)+'</div>'; }
    return html + (guildState.guild ? renderGuildHome() : renderGuildJoinView());
  }
  function renderGuildJoinView(){

  // ---- Guild Bank (Phase 2) ----
  var BANK_SLOT_BASE = 10000;
  function bankSlotCost(slots){ return Math.round(BANK_SLOT_BASE * Math.pow(1.25, Math.max(0, slots-5))); }
  var RANK_VAL = { member:1, officer:2, leader:3 };
  var guildBankState = { status:'idle', guildId:null, slots:5, used:0, items:[], minWithdrawRank:'member', busy:false, error:'' };
  function guildBankInvoke(action, payload){
    if(!chatClient || !authUser) return Promise.resolve({ ok:false, error:'Sign in first.' });
    var body = { action: action };
    if(payload){ for(var k in payload){ if(payload.hasOwnProperty(k)) body[k]=payload[k]; } }
    return chatClient.functions.invoke('guild_bank', { body: body }).then(function(r){
      if(r && r.data) return r.data;
      return { ok:false, error:(r && r.error && r.error.message) || 'Request failed.' };
    }, function(){ return { ok:false, error:'Network error.' }; });
  }
  function guildBankApply(res){
    guildBankState.status='ready';
    guildBankState.slots = res.slots; guildBankState.used = res.used;
    guildBankState.items = res.items || []; guildBankState.minWithdrawRank = res.min_withdraw_rank || 'member';
  }
  function guildBankLoad(){
    if(!guildState.guild) return;
    guildBankState.status='loading'; guildBankState.guildId = guildState.guild.id;
    guildBankInvoke('get', {}).then(function(res){
      if(!res.ok){ guildBankState.status='error'; guildBankState.error=res.error||'Could not load the bank.'; if(currentCategory==='guild') render(); return; }
      guildBankApply(res); guildBankState.error=''; if(currentCategory==='guild') render();
    });
  }
  function guildBankItemName(key){ var it=ALL_SELLABLE[key]; return it ? it.name : key; }
  function guildBankItemIcon(key){ var it=ALL_SELLABLE[key]; return it ? it.icon : svgIcon('question','var(--text-faint)'); }
  function guildBankCanWithdraw(){ return (RANK_VAL[guildState.myRank]||0) >= (RANK_VAL[guildBankState.minWithdrawRank]||1); }
  function guildBankDeposit(){
    if(guildBankState.busy) return;
    var sel=document.getElementById('guildBankDepositItem'), qtyEl=document.getElementById('guildBankDepositQty');
    if(!sel || !sel.value) return;
    var key=sel.value, owned=state.inventory[key]||0;
    var qty=parseInt((qtyEl&&qtyEl.value)||'0',10);
    if(!(owned>0)){ guildBankState.error='You no longer own that item.'; render(); return; }
    if(!(qty>0)) qty=owned;
    if(qty>owned) qty=owned;
    guildBankState.busy=true; guildBankState.error=''; render();
    guildBankInvoke('deposit', { item_key:key, qty:qty }).then(function(res){
      guildBankState.busy=false;
      if(!res.ok){ guildBankState.error=res.error||'Deposit failed.'; render(); return; }
      state.inventory[key] = Math.max(0, (state.inventory[key]||0) - qty); // only after the server accepted it
      saveGame(); guildBankApply(res); render();
    });
  }
  function guildBankWithdraw(key){
    if(guildBankState.busy) return;
    var stack = guildBankState.items.filter(function(x){ return x.item_key===key; })[0];
    if(!stack) return;
    var max = Number(stack.qty);
    var ans = prompt('Withdraw how many '+guildBankItemName(key)+'? (1–'+max+')', String(max));
    if(ans===null) return;
    var qty = parseInt(ans,10);
    if(!(qty>0)) return;
    if(qty>max) qty=max;
    guildBankState.busy=true; guildBankState.error=''; render();
    guildBankInvoke('withdraw', { item_key:key, qty:qty }).then(function(res){
      guildBankState.busy=false;
      if(!res.ok){ guildBankState.error=res.error||'Withdraw failed.'; render(); return; }
      addItem(key, res.granted||qty); saveGame(); guildBankApply(res); render();
    });
  }
  function guildBankBuySlot(){
    if(guildBankState.busy) return;
    var cost = bankSlotCost(guildBankState.slots);
    if((state.gold||0) < cost){ guildBankState.error='You need '+fmt(cost)+' gold for the next slot.'; render(); return; }
    guildBankState.busy=true; guildBankState.error=''; render();
    guildBankInvoke('buy_slot', {}).then(function(res){
      guildBankState.busy=false;
      if(!res.ok){ guildBankState.error=res.error||'Purchase failed.'; render(); return; }
      state.gold -= (res.cost||cost); saveGame(); guildBankApply(res); render();
    });
  }
  function guildBankSetWithdrawRank(rank){
    guildBankInvoke('set_withdraw_rank', { rank:rank }).then(function(res){
      if(res.ok){ guildBankApply(res); render(); }
      else { guildBankState.error=res.error||'Could not update.'; render(); }
    });
  }
  function renderGuildBank(){
    if(guildBankState.status==='idle' || guildBankState.guildId !== (guildState.guild&&guildState.guild.id)){ guildBankLoad(); }
    var canManage = guildState.myRank==='leader' || guildState.myRank==='officer';
    var isLeader = guildState.myRank==='leader';
    var canWithdraw = guildBankCanWithdraw();
    var html='';
    if(guildBankState.error){ html += '<div class="empty-note" style="border-color:var(--hp-bad);color:var(--hp-bad);">'+escapeHtml(guildBankState.error)+'</div>'; }
    if(guildBankState.status==='loading'||guildBankState.status==='idle'){ return html+'<div class="empty-note">Loading the vault&hellip;</div>'; }
    html += '<div class="guild-section-title" style="margin-top:0;">Vault &mdash; '+guildBankState.used+' / '+guildBankState.slots+' slots used</div>';
    if(canManage){
      if(guildBankState.slots>=500){ html += '<div class="empty-note" style="margin-bottom:8px;">Maxed at the 500-slot limit.</div>'; }
      else {
        var cost=bankSlotCost(guildBankState.slots), afford=(state.gold||0)>=cost;
        html += '<button class="action-btn" data-action="guildBankBuySlot" '+((afford&&!guildBankState.busy)?'':'disabled')+' style="width:auto;flex:0 0 auto;margin-bottom:10px;">'+(afford?'Buy slot '+(guildBankState.slots+1)+' &mdash; '+fmt(cost)+'g':'Next slot needs '+fmt(cost)+'g')+'</button>';
      }
    }
    var owned=[];
    Object.keys(ALL_SELLABLE).forEach(function(id){ if((state.inventory[id]||0)>0 && !state.lockedItems[id]) owned.push(id); });
    owned.sort(function(a,b){ return ALL_SELLABLE[a].name.localeCompare(ALL_SELLABLE[b].name); });
    html += '<div class="guild-section-title">Deposit</div>';
    if(!owned.length){ html += '<div class="empty-note" style="margin-bottom:8px;">Nothing to deposit (locked items are excluded).</div>'; }
    else {
      html += '<div class="char-row" style="gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:4px;">';
      html += '<select id="guildBankDepositItem" class="chat-input" style="flex:1 1 160px;min-width:120px;">'+owned.map(function(id){ return '<option value="'+id+'">'+escapeHtml(ALL_SELLABLE[id].name)+' (x'+fmt(state.inventory[id])+')</option>'; }).join('')+'</select>';
      html += '<input id="guildBankDepositQty" class="chat-input" type="number" min="1" placeholder="all" style="width:76px;flex:0 0 auto;">';
      html += '<button class="action-btn" data-action="guildBankDeposit" '+(guildBankState.busy?'disabled':'')+' style="width:auto;flex:0 0 auto;">Deposit</button>';
      html += '</div>';
    }
    html += '<div class="guild-section-title">Contents</div>';
    if(!guildBankState.items.length){ html += '<div class="empty-note">The vault is empty. Deposit something to get started.</div>'; }
    else guildBankState.items.forEach(function(it){
      html += '<div class="guild-member-row"><div style="display:flex;align-items:center;gap:8px;">'+guildBankItemIcon(it.item_key)+'<b>'+escapeHtml(guildBankItemName(it.item_key))+'</b> <span class="item-meta">x'+fmt(it.qty)+'</span></div>';
      if(canWithdraw) html += '<button class="mini-btn" data-action="guildBankWithdraw" data-item="'+escapeHtml(it.item_key)+'" '+(guildBankState.busy?'disabled':'')+'>Withdraw</button>';
      html += '</div>';
    });
    if(isLeader){
      html += '<div class="guild-section-title">Withdraw permission</div><div class="char-row" style="gap:4px;flex-wrap:wrap;">';
      [['member','Members'],['officer','Officers+'],['leader','Leader only']].forEach(function(o){
        html += '<button class="mini-btn'+(guildBankState.minWithdrawRank===o[0]?' active':'')+'" data-action="guildBankSetWithdrawRank" data-rank="'+o[0]+'">'+o[1]+'</button>';
      });
      html += '</div><div class="empty-note" style="margin-top:6px;">Anyone can deposit; this sets who may withdraw.</div>';
    } else if(!canWithdraw){
      html += '<div class="empty-note" style="margin-top:8px;">Withdrawals are restricted to '+(guildBankState.minWithdrawRank==='leader'?'the leader':'officers and above')+'.</div>';
    }
    return html;
  }

  // ---- Guild Estate (Phase 3): 5 shared estate-crafting task slots ----
  var GUILD_ESTATE_SKILLS = ['stonecutting','masonry','paving'];
  var guildEstateState = { status:'idle', guildId:null, tasks:[], busy:false, error:'', pickSkill:'stonecutting', pickBatches:10 };
  function guildEstateInvoke(action, payload){
    if(!chatClient || !authUser) return Promise.resolve({ ok:false, error:'Sign in first.' });
    var body={action:action}; if(payload){ for(var k in payload){ if(payload.hasOwnProperty(k)) body[k]=payload[k]; } }
    return chatClient.functions.invoke('guild_estate', { body: body }).then(function(r){
      if(r && r.data) return r.data;
      return { ok:false, error:(r && r.error && r.error.message) || 'Request failed.' };
    }, function(){ return { ok:false, error:'Network error.' }; });
  }
  function guildEstateApply(res){ guildEstateState.status='ready'; guildEstateState.tasks = res.tasks || []; }
  function guildEstateLoad(){
    if(!guildState.guild) return;
    guildEstateState.status='loading'; guildEstateState.guildId = guildState.guild.id;
    guildEstateInvoke('get', {}).then(function(res){
      if(!res.ok){ guildEstateState.status='error'; guildEstateState.error=res.error||'Could not load the estate.'; if(currentCategory==='guild') render(); return; }
      guildEstateApply(res); guildEstateState.error=''; if(currentCategory==='guild') render();
    });
  }
  function guildEstateMyTask(){ return guildEstateState.tasks.filter(function(t){ return authUser && t.user_id===authUser.id; })[0]; }
  function guildEstateFreeSlot(){ for(var i=0;i<5;i++){ if(!guildEstateState.tasks.some(function(t){ return t.slot===i; })) return i; } return -1; }
  function guildEstateRecipesFor(skill){
    var sk = CRAFTING_SKILLS[skill]; if(!sk) return [];
    var lvl = getLevel(state.xp[skill]||0);
    return sk.recipes.filter(function(r){ return r.levelReq <= lvl; });
  }
  function guildEstateInputsLabel(inputs){ return Object.keys(inputs).map(function(k){ var it=ALL_SELLABLE[k]; return (it?it.name:k)+' x'+inputs[k]; }).join(', '); }
  function guildEstateRemain(ms){ if(ms<=0) return 'Ready'; var s=Math.ceil(ms/1000); if(s<60) return '~'+s+'s left'; var m=Math.ceil(s/60); if(m<60) return '~'+m+'m left'; var h=Math.floor(m/60); return '~'+h+'h '+(m%60)+'m left'; }
  function guildEstateStart(){
    if(guildEstateState.busy) return;
    var skill=guildEstateState.pickSkill;
    var recipeSel=document.getElementById('guildEstateRecipe'), batchEl=document.getElementById('guildEstateBatches');
    var recipeId = recipeSel ? recipeSel.value : '';
    var batches = parseInt((batchEl&&batchEl.value)||'0',10);
    if(!(batches>0)) batches=1; if(batches>100) batches=100;
    var recipe = ALL_CRAFT_RECIPES[recipeId];
    if(!recipe){ guildEstateState.error='Pick a recipe.'; render(); return; }
    if(getLevel(state.xp[skill]||0) < recipe.levelReq){ guildEstateState.error='Your level is too low for that recipe.'; render(); return; }
    if(!hasInputs(recipe.inputs, batches)){ guildEstateState.error='Not enough materials for '+batches+'x '+recipe.name+'.'; render(); return; }
    if(guildEstateMyTask()){ guildEstateState.error='You already have an active estate task.'; render(); return; }
    var slot = guildEstateFreeSlot();
    if(slot<0){ guildEstateState.error='All 5 estate slots are busy.'; render(); return; }
    guildEstateState.busy=true; guildEstateState.error=''; guildEstateState.pickBatches=batches; render();
    guildEstateInvoke('start', { slot:slot, skill_id:skill, output_key:recipe.id, batches:batches, time_per_batch_ms:Math.round(recipe.time*1000) }).then(function(res){
      guildEstateState.busy=false;
      if(!res.ok){ guildEstateState.error=res.error||'Could not start the task.'; render(); return; }
      consumeInputs(recipe.inputs, batches); saveGame(); guildEstateApply(res); render();
    });
  }
  function guildEstateCollect(slot){
    if(guildEstateState.busy) return;
    guildEstateState.busy=true; guildEstateState.error=''; render();
    guildEstateInvoke('collect', { slot:slot }).then(function(res){
      guildEstateState.busy=false;
      if(!res.ok){ guildEstateState.error=res.error||'Collect failed.'; render(); return; }
      var c=res.collected;
      if(c){
        var nm = (ALL_SELLABLE[c.output_key] && ALL_SELLABLE[c.output_key].name) || c.output_key;
        if(authUser && c.owner===authUser.id){
          var recipe=ALL_CRAFT_RECIPES[c.output_key];
          if(recipe) addXp(c.skill, recipe.xp*(c.batches||1));
          addLog('Collected '+(c.qty||0)+'x '+nm+' into the guild bank (+'+c.skill+' XP).','chronicle');
          saveGame();
        } else {
          addLog('Collected '+(c.qty||0)+'x '+nm+' into the guild bank.','chronicle');
        }
      }
      guildEstateApply(res); guildBankState.status='idle'; render();
    });
  }
  function guildEstateCancel(slot){
    guildEstateInvoke('cancel', { slot:slot }).then(function(res){
      if(res.ok){ guildEstateApply(res); render(); }
      else { guildEstateState.error=res.error||'Could not cancel.'; render(); }
    });
  }
  function renderGuildEstate(){
    if(guildEstateState.status==='idle' || guildEstateState.guildId !== (guildState.guild&&guildState.guild.id)) guildEstateLoad();
    var html='';
    if(guildEstateState.error){ html += '<div class="empty-note" style="border-color:var(--hp-bad);color:var(--hp-bad);">'+escapeHtml(guildEstateState.error)+'</div>'; }
    if(guildEstateState.status==='loading'||guildEstateState.status==='idle'){ return html+'<div class="empty-note">Loading the estate&hellip;</div>'; }
    html += '<div class="section-intro">Five shared work slots. Each member can run one estate-crafting task; finished goods flow into the guild bank.</div>';
    var nowMs = Date.now(), canManage = guildState.myRank==='leader'||guildState.myRank==='officer';
    for(var i=0;i<5;i++){
      var t = guildEstateState.tasks.filter(function(x){ return x.slot===i; })[0];
      html += '<div class="guild-card">';
      if(!t){
        html += '<div class="char-row" style="justify-content:space-between;"><b>Slot '+(i+1)+'</b> <span class="item-meta">empty</span></div>';
      } else {
        var it = ALL_SELLABLE[t.output_key], nm = it?it.name:t.output_key, icon = it?it.icon:svgIcon('question','var(--text-faint)');
        var start = new Date(t.started_at).getTime(), fin = new Date(t.finish_at).getTime();
        var pct = fin>start ? Math.max(0,Math.min(100,(nowMs-start)/(fin-start)*100)) : 100;
        var done = nowMs >= fin, mine = authUser && t.user_id===authUser.id;
        html += '<div class="char-row" style="justify-content:space-between;align-items:center;"><div style="display:flex;align-items:center;gap:8px;">'+icon+'<b>'+escapeHtml(nm)+'</b> <span class="item-meta">x'+t.batches+'</span></div><span class="item-meta">'+escapeHtml(t.username)+(mine?' (you)':'')+'</span></div>';
        html += '<div class="gest-bar"><div class="gest-fill" id="gest-fill-'+i+'" style="width:'+pct.toFixed(1)+'%"></div></div>';
        html += '<div class="char-row" style="justify-content:space-between;align-items:center;margin-top:2px;"><span class="item-meta" id="gest-label-'+i+'">'+(done?'Ready to collect':guildEstateRemain(fin-nowMs))+'</span><span class="guild-row-actions">';
        if(done) html += '<button class="mini-btn" data-action="guildEstateCollect" data-slot="'+i+'" '+(guildEstateState.busy?'disabled':'')+'>Collect</button>';
        if(mine || canManage) html += '<button class="mini-btn danger" data-action="guildEstateCancel" data-slot="'+i+'">Cancel</button>';
        html += '</span></div>';
      }
      html += '</div>';
    }
    html += '<div class="guild-section-title">Start a task</div>';
    if(guildEstateMyTask()){ return html + '<div class="empty-note">You already have an active task (one per member). Collect or cancel it to start another.</div>'; }
    if(guildEstateFreeSlot()<0){ return html + '<div class="empty-note">All five slots are busy right now.</div>'; }
    html += '<div class="char-row" style="gap:4px;flex-wrap:wrap;margin-bottom:6px;">'+GUILD_ESTATE_SKILLS.map(function(sk){ return '<button class="mini-btn'+(guildEstateState.pickSkill===sk?' active':'')+'" data-action="guildEstatePickSkill" data-skill="'+sk+'">'+escapeHtml(CRAFTING_SKILLS[sk].label)+'</button>'; }).join('')+'</div>';
    var recs = guildEstateRecipesFor(guildEstateState.pickSkill);

  // ---- Guild Bosses (Phase 4): async damage-pool raids ----
  // Server-authoritative HP/gold/duration live in the guild_boss function; this roster
  // mirrors them for display and holds the loot table (loot is granted client-side on claim).
  var GUILD_BOSSES = {
    gorehoof:{ name:'Gorehoof the Trampler', icon:svgIcon('hornedskull','#8a5a3a'), hp:100000, gold:50000, hours:24, loot:[{key:'coal',qty:200},{key:'gem_ruby',qty:5}] },
    embermaw:{ name:'Embermaw Wyrm', icon:svgIcon('flame','#c0453a'), hp:500000, gold:200000, hours:24, loot:[{key:'gem_ruby',qty:10},{key:'gem_diamond',qty:5}] },
    hollowking:{ name:'The Hollow King', icon:svgIcon('ghost','#6a5a9a'), hp:2000000, gold:1000000, hours:48, loot:[{key:'gem_diamond',qty:10},{key:'gem_voidcrystal',qty:3}] }
  };
  var GUILD_BOSS_ORDER = ['gorehoof','embermaw','hollowking'];
  var guildBossState = { status:'idle', guildId:null, active:null, claimable:null, mine:null, contributors:[], busy:false, pinging:false, error:'', joined:false, lastPing:0 };
  function guildBossInvoke(action, payload){
    if(!chatClient || !authUser) return Promise.resolve({ ok:false, error:'Sign in first.' });
    var body={action:action}; if(payload){ for(var k in payload){ if(payload.hasOwnProperty(k)) body[k]=payload[k]; } }
    return chatClient.functions.invoke('guild_boss', { body: body }).then(function(r){
      if(r && r.data) return r.data;
      return { ok:false, error:(r && r.error && r.error.message) || 'Request failed.' };
    }, function(){ return { ok:false, error:'Network error.' }; });
  }
  function guildBossApply(res){
    guildBossState.status='ready';
    guildBossState.active = res.active || null;
    guildBossState.claimable = res.claimable || null;
    guildBossState.mine = res.mine || null;
    guildBossState.contributors = res.contributors || [];
    if(guildBossState.mine && guildBossState.mine.damage>0) guildBossState.joined = true;
    if(!guildBossState.active) guildBossState.joined = false;
  }
  function guildBossLoad(){
    if(!guildState.guild) return;
    guildBossState.status='loading'; guildBossState.guildId = guildState.guild.id;
    guildBossInvoke('get', {}).then(function(res){
      if(!res.ok){ guildBossState.status='error'; guildBossState.error=res.error||'Could not load bosses.'; if(currentCategory==='guild') render(); return; }
      guildBossApply(res); guildBossState.error=''; if(currentCategory==='guild') render();
    });
  }
  // A representative DPS proxy: avg weapon damage / attack interval, folding the always-on
  // multipliers. The server clamps this, so an inflated value can't dump impossible damage.
  function guildBossPower(){
    var weapon = getEquippedWeaponItem(state);
    var style = getWeaponStyle(state.equippedMainhand);
    var attackSpeed = (style && style.attackSpeed) ? style.attackSpeed : 4;
    var avg = (((weapon&&weapon.dmgMin)||1) + ((weapon&&weapon.dmgMax)||1))/2;
    var prof = state.equippedMainhand ? (1 + getLevel(state.xp[state.equippedMainhand]||0)/100) : 1;
    var relic = getEquippedRelicBonus(state)||0;
    var fam = getFamiliarDamageMult ? getFamiliarDamageMult() : 1;
    return Math.max(1, Math.round(avg * prof * (1+relic) * fam / attackSpeed));
  }
  function guildBossBar(cur, max){ return max>0 ? Math.max(0,Math.min(100,cur/max*100)) : 0; }
  function guildBossSummon(key){
    if(guildBossState.busy) return;
    guildBossState.busy=true; guildBossState.error=''; render();
    guildBossInvoke('summon', { boss_key:key }).then(function(res){
      guildBossState.busy=false;
      if(!res.ok){ guildBossState.error=res.error||'Could not summon.'; render(); return; }
      guildBossApply(res); render();
    });
  }
  function guildBossAssault(manual){
    if(!guildBossState.active || guildBossState.pinging) return;
    guildBossState.pinging=true; guildBossState.lastPing=Date.now();
    guildBossInvoke('assault', { power:guildBossPower() }).then(function(res){
      guildBossState.pinging=false;
      if(!res.ok){ if(manual){ guildBossState.error=res.error||'Assault failed.'; render(); } guildBossLoad(); return; }
      guildBossState.joined = true;
      var justDied = res.result && res.result.defeated;
      guildBossApply(res);
      if(justDied){ addLog('The guild boss has fallen! Claim your loot share in the Bosses tab.','important'); render(); }
      else if(manual){ render(); }
    });
  }
  function guildBossClaim(){
    if(!guildBossState.claimable || guildBossState.busy) return;
    var boss = guildBossState.claimable;
    guildBossState.busy=true; guildBossState.error=''; render();
    guildBossInvoke('claim', { boss_id:boss.id }).then(function(res){
      guildBossState.busy=false;
      if(!res.ok){ guildBossState.error=res.error||'Claim failed.'; render(); return; }
      var c=res.claim, roster=GUILD_BOSSES[c.boss_key];
      var frac = c.total_damage>0 ? c.my_damage/c.total_damage : 0, lines=[];
      if(roster && roster.loot){
        roster.loot.forEach(function(l){
          var qty = Math.floor(l.qty * frac);
          if(qty>0){ addItem(l.key, qty); var it=ALL_SELLABLE[l.key]; lines.push(qty+'x '+((it&&it.name)||l.key)); }
        });
      }
      saveGame();
      addLog('Claimed your boss loot ('+Math.round(frac*100)+'%): '+(lines.length?lines.join(', '):'no items at this damage share')+'. Boss gold went to the guild treasury.','important');
      guildBossApply(res); render();
    });
  }

    var ros=GUILD_BOSSES[b.boss_key], pct=guildBossBar(b.hp_current,b.hp_max);

  var chatChannel = 'global';   // 'global' | 'guild'
  var guildChatMessages = [];

  function guildChatMessagesHtml(){
    if(!guildChatMessages.length) return '<div class="chat-empty">No guild messages yet &mdash; say hello to your guildmates!</div>';
    return guildChatMessages.map(function(m){ return '<div class="chat-msg"><span class="chat-user">'+escapeHtml(m.username||'anon')+'</span><span class="chat-body">'+escapeHtml(m.body||'')+'</span></div>'; }).join('');
  }
  function guildChatRenderOnly(){ var el=document.getElementById('chatMessages'); if(el){ el.innerHTML=guildChatMessagesHtml(); el.scrollTop=el.scrollHeight; } }
  function guildChatOnIncoming(m){
    if(!m || guildChatMessages.some(function(x){ return x.id===m.id; })) return;
    guildChatMessages.push(m);
    if(guildChatMessages.length>120) guildChatMessages=guildChatMessages.slice(-120);
    if(currentCategory==='chat' && chatChannel==='guild') guildChatRenderOnly();
    else if(currentCategory!=='chat'){ chatHasUnread = true; renderCatTabs(); } // flash the Chat tab (tab bar only)
  }
  function guildChatMaybeSubscribe(){
    if(!chatClient || !guildState.guild) return;
    var gid = guildState.guild.id;
    if(guildChatSubGuildId===gid && guildChatChannelObj) return; // already subscribed to this guild
    guildTeardownChat();
    guildChatSubGuildId = gid;
    chatClient.from('guild_messages').select('id,created_at,username,body').eq('guild_id',gid).order('created_at',{ascending:false}).limit(80).then(function(res){
      guildChatMessages = ((res&&res.data)||[]).slice().reverse();
      if(currentCategory==='chat' && chatChannel==='guild') guildChatRenderOnly();
    });
    guildChatChannelObj = chatClient.channel('guild-chat-'+gid)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'guild_messages', filter:'guild_id=eq.'+gid }, function(p){ guildChatOnIncoming(p.new); })
      .subscribe();
  }
  function guildTeardownChat(){
    if(guildChatChannelObj){ try{ chatClient.removeChannel(guildChatChannelObj); }catch(e){} guildChatChannelObj=null; }
    guildChatSubGuildId=null; guildChatMessages=[];
  }
  function guildChatSend(){
    var input=document.getElementById('chatInput');
    if(!input || !guildState.guild) return;
    var text=(input.value||'').trim();
    if(!text) return;
    if(text.length>500) text=text.slice(0,500);
    var name=chatName(); if(!name) return;
    var now=Date.now(); if(now-guildChatLastSentAt<1200) return;
    input.value=''; guildChatDraft=''; guildChatLastSentAt=now;
    chatClient.from('guild_messages').insert({ guild_id:guildState.guild.id, username:name, body:text }).then(function(res){
      if(res && res.error) addLog('Guild message failed to send.','danger');
    }, function(){ addLog('Guild message failed to send.','danger'); });
  }

  // (Curiosity for all gathering, Tenacity + Sleight of Hand for all crafting, the combat set

  var SKILL_BENEFIT_EXTRA = {

  function physiqueBenefitsForSkill(skillId){
    var out = [], seen = {};
    function add(id, note){ if(!PHYSIQUE_SKILL_MAP[id] || seen[id]) return; seen[id]=1; out.push([id, note]); }
    if(GATHER_PHYSIQUE[skillId]){
      add('curiosity','Gathering XP');
      if(['digging','mining','forestry'].indexOf(skillId)!==-1) add('armStrength','rare heavy finds');
      if(PHYS_LONG_GATHER.indexOf(skillId)!==-1) add('endurance','faster gathering');
      if(PHYS_PLANT_GATHER.indexOf(skillId)!==-1) add('mentality','seed finds');
      if(skillId==='foraging') add('fineMotor','Powder & Artifact finds');
    }
    if(CRAFT_PHYSIQUE[skillId]){
      add('grossMotor','success rate'); add('sleightOfHand','speed'); add('logic','craft slots');
      if(PHYS_HAND_CRAFT.indexOf(skillId)!==-1) add('handStrength','speed');
      if(PHYS_ESTATE_CRAFT.indexOf(skillId)!==-1) add('coreStrength','speed');
      if(PHYS_MENTAL_CRAFT.indexOf(skillId)!==-1) add('solving','speed');
      if(PHYS_ALCH_GROUP.indexOf(skillId)!==-1) add('criticalThinking','success rate');
    }
    if(isCombatSkillId(skillId)){
      add('bodyStrength','melee damage'); add('bodyControl','bow damage'); add('balance','2H damage');
      add('criticalEye','crit chance'); add('exploitation','crit damage'); add('tenacity','low-HP surge');
      add('agility','dodge'); add('reflexes','block & dodge'); add('blocking','block chance');
      add('fortitude','max HP & shield'); add('resolve','armour');
    }
    if(FAITH_TRAINED_PHYSIQUE[skillId]){ add('focus','max Faith'); add('zen','max Faith'); add('meditation','max Faith'); }
    return out;
  }
  // Renders a physique as an inline chip (icon + name, with an optional effect note). Accepts
  // either a bare physique id or an [id, note] pair.
  function renderPhysiqueChipList(entries){
    if(!entries || !entries.length) return '<span style="color:var(--text-faint)">None</span>';
    return entries.map(function(entry){
      var id = Array.isArray(entry) ? entry[0] : entry;
      var note = Array.isArray(entry) ? entry[1] : null;
      var m = PHYSIQUE_SKILL_MAP[id];
      if(!m) return '';
      return '<span class="skill-info-chip">'+m.icon+' '+m.name+(note?' <span style="color:var(--text-faint)">('+note+')</span>':'')+'</span>';
    }).join('');
  }
  var skillInfoOpen = null;
  function skillInfoBtn(skillId){
    return '<button class="skill-info-btn" data-action="showSkillInfo" data-skill="'+skillId+'" title="What is this?">?</button>';
  }
  function renderSkillInfoPopup(){
    var overlay = document.getElementById('skillInfoOverlay');
    if(!overlay) return;
    var openId = skillInfoOpen;
    var physMeta = openId ? PHYSIQUE_SKILL_MAP[openId] : null;
    var isPhysique = !!physMeta && !SKILL_INFO[openId];
    if(!openId || (!SKILL_INFO[openId] && !isPhysique)){
      overlay.style.display = 'none';
      overlay.innerHTML = '';
      return;
    }
    overlay.style.display = 'flex';
    var body = '';
    if(isPhysique){
      body += '<div class="skill-info-title">'+physMeta.icon+' '+physMeta.name+'</div>';
      body += '<div class="skill-info-desc">'+physMeta.desc+'</div>';
      body += '<div class="skill-info-section"><div class="skill-info-section-label">Grows from</div><div class="skill-info-section-body">'+physMeta.levels+'</div></div>';
      body += '<div class="skill-info-section"><div class="skill-info-section-label">Affects</div><div class="skill-info-section-body">'+physMeta.affects+'</div></div>';
    } else {
      var label = SKILL_LABELS[openId] || (openId.charAt(0).toUpperCase()+openId.slice(1));
      body += '<div class="skill-info-title">'+label+'</div>';
      body += '<div class="skill-info-desc">'+SKILL_INFO[openId]+'</div>';
      body += '<div class="skill-info-section"><div class="skill-info-section-label">Physique trained by these actions</div><div class="skill-info-chips">'+renderPhysiqueChipList(physiqueTrainedBySkill(openId))+'</div></div>';
      body += '<div class="skill-info-section"><div class="skill-info-section-label">Physique that benefits these actions</div><div class="skill-info-chips">'+renderPhysiqueChipList(physiqueBenefitsForSkill(openId))+'</div></div>';
    }
    overlay.innerHTML = '<div class="skill-info-card">'+body+
      '<button class="action-btn" data-action="closeSkillInfo">Close</button>'+
      '</div>';
  }
  GATHER_SKILL_IDS.forEach(function(id){ SKILL_LABELS[id] = GATHERING_SKILLS[id].label; });
  CRAFT_SKILL_IDS.forEach(function(id){ SKILL_LABELS[id] = CRAFTING_SKILLS[id].label; });
  WEAPON_STYLES.forEach(function(w){ SKILL_LABELS[w.id] = w.name; });
  OFFHAND_STYLES.forEach(function(s){ SKILL_LABELS[s.id] = s.name; });
  ARMOR_PROFICIENCY_IDS.forEach(function(id){ SKILL_LABELS[id] = ARMOR_PROFICIENCY_LABELS[id]; });
  FAITH_SKILL_IDS.forEach(function(id){ SKILL_LABELS[id] = FAITH_SKILLS[id].label; });

  function skillBarColor(skillId){
    if(GATHERING_SKILLS[skillId]) return GATHERING_SKILLS[skillId].color || 'var(--cat-gathering)';
    if(CRAFTING_SKILLS[skillId]) return CRAFTING_SKILLS[skillId].color || 'var(--cat-crafting)';
    if(FAITH_SKILLS[skillId]) return FAITH_SKILLS[skillId].color || 'var(--cat-faith)';
    if(skillId==='farming' || skillId==='fiberharvesting' || skillId==='grainharvesting' || skillId==='herbharvesting') return 'var(--cat-farming)';
    if(ARMOR_PROFICIENCY_IDS.indexOf(skillId)!==-1) return 'var(--cat-combat)';
    return 'var(--gold)';
  }
  function renderSkillProgressBar(skillId){
    var lvl = getLevel(state.xp[skillId]||0);
    var pct = levelProgress(state.xp[skillId]||0);
    var label = SKILL_LABELS[skillId] || (skillId.charAt(0).toUpperCase()+skillId.slice(1));
    return '<div class="top-skill-bar">'+
      '<div class="top-skill-track"><div class="top-skill-fill" id="topbar-'+skillId+'" style="width:'+pct+'%;background:'+skillBarColor(skillId)+'"></div></div>'+
      '<div class="top-skill-label"><span>'+label+' '+(SKILL_INFO[skillId]?skillInfoBtn(skillId):'')+' &bull; Level <b>'+lvl+'</b></span><span id="topbar-pct-'+skillId+'">'+Math.round(pct)+'%</span></div>'+
    '</div>';
  }

  var SKILL_GROUPS = [
    {label:'Gathering', color:'var(--cat-gathering)', skills:GATHER_SKILL_IDS},
    {label:'Crafting',  color:'var(--cat-crafting)',  skills:CRAFT_SKILL_IDS},
    {label:'Farming',   color:'var(--cat-farming)',   skills:['fiberharvesting','grainharvesting','herbharvesting']},
    {label:'Combat',    color:'var(--cat-combat)',    skills:WEAPON_STYLE_IDS.concat(OFFHAND_STYLE_IDS).concat(ARMOR_PROFICIENCY_IDS)},
    {label:'Faith',     color:'var(--cat-faith)',     skills:FAITH_SKILL_IDS}
  ];

  function renderCharacterPanel(){
    var weapon = getEquippedWeaponItem(state);
    var weaponStyle = getWeaponStyle(state.equippedMainhand);
    var offhandStyle = getOffhandStyle(state.equippedOffhand);
    var offhand = getEquippedOffhandItem(state);
    var totalArmorDefense = getTotalArmorDefense(state);
    var equippedSlots = ARMOR_SLOTS.filter(function(s){ return (state.armorSlots[s.id]||0) > 0; }).length;
    var gatherToolsEquipped = GATHER_SKILL_IDS.filter(function(id){ return (state.gatherTools[id]||0) > 0; }).length;
    var craftToolsEquipped = CRAFT_SKILL_IDS.filter(function(id){ return (state.craftTools[id]||0) > 0; }).length;
    var hpPct = clamp(state.playerHp/maxHp(state)*100,0,100);
    var html = '<h3>Character</h3>';
    html += '<div class="hp-track"><div class="hp-fill" id="charHpFill" style="width:'+hpPct+'%;background:'+(hpPct>50?'var(--hp-good)':hpPct>20?'var(--hp-mid)':'var(--hp-bad)')+'"></div></div>';
    html += '<div class="hp-label"><span>HP</span><span id="charHpLabel">'+fmt(state.playerHp)+' / '+maxHp(state)+'</span></div>';
    html += '<button class="action-btn eat-btn" data-action="eat">Eat Food</button>';
    html += '<div style="height:8px"></div>';
    var faithMaxVal0 = faithMax(state);
